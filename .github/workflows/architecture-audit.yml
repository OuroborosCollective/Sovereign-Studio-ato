name: architecture-audit
on:
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '.github/workflows/architecture-audit.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - run: npm ci

      # 1. dependency-cruiser – cycles & forbidden layers
      - name: dependency-cruiser cycles
        run: |
          set -euo pipefail
          npx depcruise src --include-cycles --output-type err || (echo "::error ::dependency-cruiser found circular dependencies" && exit 1)

      # 2. ts-prune – unused exports
      - name: ts-prune dead exports
        run: |
          set -euo pipefail
          npx ts-prune | tee prune.log
          if [[ ${PIPESTATUS[0]} -ne 0 ]]; then echo "::error ::ts-prune failed" && exit 1; fi
          if [ -s prune.log ]; then echo "::error ::Unused exports detected" && cat prune.log && exit 1; fi

      # 3. knip – unused files / deps
      - name: knip unused resources
        run: npx knip --no-progress

      # 4. madge – graph + cycles (visual)
      - name: madge graph
        run: |
          set -euo pipefail
          npx madge --circular --extensions ts,tsx src || (echo "::error ::Madge found circular deps" && exit 1)
          npx madge --image arch.svg --extensions ts,tsx src

      # 5. eslint (import/no-cycle & friends)
      - name: eslint import cycles
        run: npm run lint

      # 6. Prepare graph comment & upload artifact
      - name: Prepare graph comment
        run: echo "![Arch Graph](attachment://arch.svg)" > arch-comment.md
      - name: Upload SVG
        uses: actions/upload-artifact@v4
        with:
          name: arch-graph
          path: arch.svg
      - name: Comment graph (same-repo PRs only)
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: marocchino/sticky-pull-request-comment@d24b05e359ad9e37e9b0ce3f4bfefd4dc2621c7a
        with:
          path: arch-comment.md
          header: ":gem: Architektur‑Graph"
