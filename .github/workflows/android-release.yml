name: Android Artifact Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Optional: Version Code'
        required: false
        type: string
      version_name:
        description: 'Optional: Version Name (e.g., 1.1.1)'
        required: false
        type: string
      validation_profile:
        description: 'Native validation profile requested by Sovereign'
        required: false
        default: release
        type: choice
        options:
          - standard
          - release

concurrency:
  group: android-artifact-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Signed Android Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write
    env:
      NODE_VERSION: 22
      JAVA_VERSION: 17
      ANDROID_COMPILE_SDK: 35
      ANDROID_BUILD_TOOLS: 35.0.0
      KEYSTORE_FILE: android/app/keystore/release.jks
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install Android SDK Packages
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER=""
          for candidate in \
            "${ANDROID_HOME:-}/cmdline-tools/latest/bin/sdkmanager" \
            "${ANDROID_HOME:-}/cmdline-tools/bin/sdkmanager" \
            "${ANDROID_SDK_ROOT:-}/cmdline-tools/latest/bin/sdkmanager" \
            "${ANDROID_SDK_ROOT:-}/cmdline-tools/bin/sdkmanager"
          do
            if [ -x "$candidate" ]; then
              SDKMANAGER="$candidate"
              break
            fi
          done
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager was not found. ANDROID_HOME=${ANDROID_HOME:-unset} ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-unset}" >&2
            find "${ANDROID_HOME:-/usr/local/lib/android/sdk}" -maxdepth 5 -type f -name sdkmanager -print || true
            exit 127
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Determine Versioning
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          INPUT_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$INPUT_NAME" ]; then
            INPUT_NAME=$(node -p "require('./package.json').version")
          fi
          if [ -z "$INPUT_NAME" ]; then
            echo "version_name must not be empty." >&2
            exit 1
          fi

          INPUT_CODE="${{ github.event.inputs.version_code }}"
          if [ -z "$INPUT_CODE" ]; then
            INPUT_CODE="${{ github.run_number }}"
          fi
          case "$INPUT_CODE" in
            ''|*[!0-9]*)
              echo "version_code must be a positive integer, got '$INPUT_CODE'." >&2
              exit 1
              ;;
          esac
          if [ "$INPUT_CODE" -lt 1 ]; then
            echo "version_code must be greater than zero." >&2
            exit 1
          fi

          echo "version_name=$INPUT_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$INPUT_CODE" >> "$GITHUB_OUTPUT"

      - name: Install Root Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env for GitHub OAuth
        env:
          VITE_GITHUB_OAUTH_CLIENT_ID_VALUE: ${{ secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf 'VITE_GITHUB_OAUTH_CLIENT_ID=%s\n' "$VITE_GITHUB_OAUTH_CLIENT_ID_VALUE" > .env
          test -s .env
          if [ -n "$VITE_GITHUB_OAUTH_CLIENT_ID_VALUE" ]; then
            echo "GitHub OAuth client id configured: true"
          else
            echo "GitHub OAuth client id configured: false"
          fi

      - name: Type Check
        run: pnpm run type-check

      - name: Runtime Unit Tests
        run: pnpm run test:unit
        env:
          CI: true

      - name: Build Root Web App
        run: |
          pnpm run build:web
          test -d dist
          test -s dist/index.html

      - name: Sync Capacitor Android
        run: |
          npx cap sync android
          test -d android/app/src/main/assets/public
          test -s android/app/src/main/assets/public/index.html

      - name: Prepare Android Signing Key
        env:
          ANDROID_KEYSTORE_BASE64_CURRENT: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD_CURRENT: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS_CURRENT: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD_CURRENT: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYSTORE_BASE64_LEGACY: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD_LEGACY: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS_LEGACY: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD_LEGACY: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          EFFECTIVE_KEYSTORE_BASE64="${ANDROID_KEYSTORE_BASE64_CURRENT:-${KEYSTORE_BASE64_LEGACY:-}}"
          EFFECTIVE_KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD_CURRENT:-${KEYSTORE_PASSWORD_LEGACY:-}}"
          EFFECTIVE_KEY_ALIAS="${ANDROID_KEY_ALIAS_CURRENT:-${KEYSTORE_ALIAS_LEGACY:-}}"
          EFFECTIVE_KEY_PASSWORD="${ANDROID_KEY_PASSWORD_CURRENT:-${KEY_PASSWORD_LEGACY:-${EFFECTIVE_KEYSTORE_PASSWORD:-}}}"

          if [ -z "$EFFECTIVE_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 or KEYSTORE_BASE64 is required for signed release artifacts." >&2
            exit 1
          fi
          if [ -z "$EFFECTIVE_KEYSTORE_PASSWORD" ]; then
            echo "ANDROID_KEYSTORE_PASSWORD or KEYSTORE_PASSWORD is required for signed release artifacts." >&2
            exit 1
          fi
          if [ -z "$EFFECTIVE_KEY_ALIAS" ]; then
            echo "ANDROID_KEY_ALIAS or KEYSTORE_ALIAS is required for signed release artifacts." >&2
            exit 1
          fi

          mkdir -p android/app/keystore
          if ! printf '%s' "$EFFECTIVE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"; then
            echo "Release keystore base64 could not be decoded." >&2
            exit 1
          fi
          test -s "$KEYSTORE_FILE"
          keytool -list -keystore "$KEYSTORE_FILE" -storepass "$EFFECTIVE_KEYSTORE_PASSWORD" -alias "$EFFECTIVE_KEY_ALIAS" >/dev/null
          KEYSTORE_CERT_SHA256="$(keytool -list -v -keystore "$KEYSTORE_FILE" -storepass "$EFFECTIVE_KEYSTORE_PASSWORD" -alias "$EFFECTIVE_KEY_ALIAS" \
            | sed -n 's/^[[:space:]]*SHA256: //p' \
            | head -n 1 \
            | tr '[:upper:]' '[:lower:]' \
            | tr -d ':[:space:]')"
          [[ "$KEYSTORE_CERT_SHA256" =~ ^[0-9a-f]{64}$ ]]

          echo "ANDROID_KEYSTORE_PATH=$PWD/$KEYSTORE_FILE" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$EFFECTIVE_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$EFFECTIVE_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$EFFECTIVE_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_EXPECTED_SIGNING_CERT_SHA256=$KEYSTORE_CERT_SHA256" >> "$GITHUB_ENV"

      - name: Android Release Readiness Check
        env:
          SOVEREIGN_REQUIRE_ANDROID_SIGNING: "1"
          SOVEREIGN_REQUIRE_ANDROID_PACKAGED_ASSETS: "1"
          ANDROID_READINESS_REPORT_PATH: android-release-readiness.md
        run: node scripts/check-android-release-readiness.mjs

      - name: Build Signed Release AAB and APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon --no-build-cache --rerun-tasks --stacktrace \
            -Pandroid.skipWebAssetBuild=true \
            -PversionCode=${{ steps.vars.outputs.version_code }} \
            -PversionName=${{ steps.vars.outputs.version_name }}
          test -s app/build/outputs/bundle/release/app-release.aab
          test -s app/build/outputs/apk/release/app-release.apk

      - name: Verify Signed Android Artifacts
        shell: bash
        run: |
          set -euo pipefail
          BUILD_TOOLS_DIR="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}/build-tools/${ANDROID_BUILD_TOOLS}"
          export PATH="$BUILD_TOOLS_DIR:$PATH"
          APK="android/app/build/outputs/apk/release/app-release.apk"
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          command -v apksigner >/dev/null
          command -v zipalign >/dev/null
          test -s "$APK"
          test -s "$AAB"
          apksigner verify --verbose --print-certs "$APK" 2>&1 | tee android-apk-signature-verification.txt
          zipalign -c -v -P 16 4 "$APK" 2>&1 | tee android-apk-alignment-verification.txt
          jarsigner -verify -certs "$AAB" 2>&1 | tee android-aab-signature-verification.txt
          grep -Fq 'jar verified.' android-aab-signature-verification.txt

          APK_CERT_SHA256="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' android-apk-signature-verification.txt \
            | head -n 1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
          AAB_CERT_SHA256="$(keytool -printcert -jarfile "$AAB" \
            | sed -n 's/^[[:space:]]*SHA256: //p' \
            | head -n 1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
          [[ "$APK_CERT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$AAB_CERT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          test "$APK_CERT_SHA256" = "$AAB_CERT_SHA256"
          test "$APK_CERT_SHA256" = "$ANDROID_EXPECTED_SIGNING_CERT_SHA256"
          printf 'SHA256=%s\n' "$APK_CERT_SHA256" > android-signing-certificate-sha256.txt
          test -s android-apk-signature-verification.txt
          test -s android-apk-alignment-verification.txt
          test -s android-aab-signature-verification.txt
          test -s android-signing-certificate-sha256.txt

      - name: Upload Release Signature Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-signature-diagnostics-${{ github.sha }}
          path: |
            android-apk-signature-verification.txt
            android-apk-alignment-verification.txt
            android-aab-signature-verification.txt
            android-signing-certificate-sha256.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Prepare Release Artifacts
        run: |
          rm -rf release-bundle SovereignStudio-PlayStore-Release.zip
          mkdir -p release-bundle
          cp android/app/build/outputs/bundle/release/app-release.aab release-bundle/SovereignStudio-release.aab
          cp android/app/build/outputs/apk/release/app-release.apk release-bundle/SovereignStudio-release.apk
          cp android-release-readiness.md release-bundle/android-release-readiness.md
          cp android-apk-signature-verification.txt release-bundle/android-apk-signature-verification.txt
          cp android-apk-alignment-verification.txt release-bundle/android-apk-alignment-verification.txt
          cp android-aab-signature-verification.txt release-bundle/android-aab-signature-verification.txt
          cp android-signing-certificate-sha256.txt release-bundle/android-signing-certificate-sha256.txt
          (cd release-bundle && sha256sum SovereignStudio-release.aab SovereignStudio-release.apk android-release-readiness.md android-apk-signature-verification.txt android-apk-alignment-verification.txt android-aab-signature-verification.txt android-signing-certificate-sha256.txt > CHECKSUMS.txt)
          (cd release-bundle && sha256sum -c CHECKSUMS.txt)
          zip -r SovereignStudio-PlayStore-Release.zip release-bundle/
          test -s release-bundle/SovereignStudio-release.aab
          test -s release-bundle/SovereignStudio-release.apk
          test -s SovereignStudio-PlayStore-Release.zip

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-release-aab-v${{ steps.vars.outputs.version_name }}
          path: release-bundle/SovereignStudio-release.aab
          retention-days: 30

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-release-apk-v${{ steps.vars.outputs.version_name }}
          path: release-bundle/SovereignStudio-release.apk
          retention-days: 30

      - name: Upload PlayStore Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-PlayStore-Release-v${{ steps.vars.outputs.version_name }}
          path: SovereignStudio-PlayStore-Release.zip
          retention-days: 30

      - name: Create Git Tag
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION="${{ steps.vars.outputs.version_name }}"
          TAG="v$VERSION"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Release Summary
        if: always()
        run: |
          {
            echo "## Android Artifact Release"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Version | ${{ steps.vars.outputs.version_name }} |"
            echo "| Version Code | ${{ steps.vars.outputs.version_code }} |"
            echo "| Validation profile | ${{ github.event.inputs.validation_profile || 'release' }} |"
            echo "| compileSdk / targetSdk | 35 / 35 |"
            echo "| Android SDK packages | platform 35, build-tools 35.0.0 |"
            echo "| Artifacts | signed AAB, signed APK, PlayStore ZIP |"
          } >> "$GITHUB_STEP_SUMMARY"
