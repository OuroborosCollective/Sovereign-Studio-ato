name: 🚀 Android Artifact Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Optional: Version Code'
        required: false
        type: string
      version_name:
        description: 'Optional: Version Name (e.g., 1.1.1)'
        required: false
        type: string

jobs:
  build:
    name: 🏗️ Build Android Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      NODE_VERSION: 22
    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 🏷️ Determine Versioning
        id: vars
        run: |
          INPUT_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$INPUT_NAME" ]; then
            INPUT_NAME=$(node -p "require('./package.json').version")
          fi

          INPUT_CODE="${{ github.event.inputs.version_code }}"
          if [ -z "$INPUT_CODE" ]; then
            INPUT_CODE="${{ github.run_number }}"
          fi

          echo "version_name=$INPUT_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$INPUT_CODE" >> $GITHUB_OUTPUT

      - name: 🔄 Check React Native App
        id: check_rn
        run: |
          if [ -d "sovereign-studio-rn" ] && [ -f "sovereign-studio-rn/app.json" ]; then
            echo "rn_exists=true" >> $GITHUB_OUTPUT
            echo "Found sovereign-studio-rn/"
          else
            echo "rn_exists=false" >> $GITHUB_OUTPUT
            echo "Using root app"
          fi

      - name: 📦 Install RN Dependencies
        if: steps.check_rn.outputs.rn_exists == 'true'
        run: |
          cd sovereign-studio-rn
          pnpm install --no-frozen-lockfile

      - name: 📦 Install Root Dependencies
        if: steps.check_rn.outputs.rn_exists == 'false'
        run: pnpm install --no-frozen-lockfile

      - name: 🔄 Copy RN App Files
        if: steps.check_rn.outputs.rn_exists == 'true'
        run: |
          cp sovereign-studio-rn/package.json ./package.json
          cp sovereign-studio-rn/app.json ./app.json
          cp sovereign-studio-rn/babel.config.js ./babel.config.js 2>/dev/null || true
          cp -r sovereign-studio-rn/src ./src
          cp -r sovereign-studio-rn/assets ./assets 2>/dev/null || true
          cp sovereign-studio-rn/tsconfig.json ./tsconfig.json 2>/dev/null || true
          cp sovereign-studio-rn/index.js ./index.js 2>/dev/null || true
          cp sovereign-studio-rn/metro.config.js ./metro.config.js 2>/dev/null || true

      - name: 🔄 Expo Prebuild
        if: steps.check_rn.outputs.rn_exists == 'true'
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: 🏗️ Build Web App
        if: steps.check_rn.outputs.rn_exists == 'false'
        run: pnpm run build

      - name: 🔄 Sync Capacitor
        if: steps.check_rn.outputs.rn_exists == 'false'
        run: npx cap sync android

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: 🔐 Decode Android Keystore
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 is missing."
            exit 1
          fi
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/release.jks

          if [ ! -s android/app/keystore/release.jks ]; then
            echo "Error: Failed to decode keystore."
            exit 1
          fi

      - name: 📦 Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/app/keystore/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PversionCode=${{ steps.vars.outputs.version_code }} \
            -PversionName=${{ steps.vars.outputs.version_name }}

      - name: 📦 Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/app/keystore/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PversionCode=${{ steps.vars.outputs.version_code }} \
            -PversionName=${{ steps.vars.outputs.version_name }}

      - name: 📁 Prepare Artifacts
        run: |
          mkdir -p release-bundle
          cp android/app/build/outputs/bundle/release/app-release.aab release-bundle/SovereignStudio-release.aab || true
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk release-bundle/SovereignStudio-release.apk
          fi
          zip -r SovereignStudio-PlayStore-Release.zip release-bundle/

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-PlayStore-Release
          path: SovereignStudio-PlayStore-Release.zip
          retention-days: 14

      - name: 🏷️ Create Git Tag
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.vars.outputs.version_name }}"
          TAG="v$VERSION"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag $TAG
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git $TAG
          fi
