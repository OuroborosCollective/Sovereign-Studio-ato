name: Android Artifact Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Optional: Version Code'
        required: false
        type: string
      version_name:
        description: 'Optional: Version Name (e.g., 1.1.1)'
        required: false
        type: string

concurrency:
  group: android-artifact-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Signed Android Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write
    env:
      NODE_VERSION: 22
      JAVA_VERSION: 21
      PNPM_VERSION: 10
      ANDROID_COMPILE_SDK: 35
      ANDROID_BUILD_TOOLS: 35.0.0
      KEYSTORE_FILE: android/app/keystore/release.jks
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install Android SDK Packages
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_SDK_ROOT or ANDROID_HOME is required." >&2
            exit 127
          fi

          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -path '*/bin/sdkmanager' -type f 2>/dev/null | sort | tail -n 1 || true)"
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under Android SDK root: $SDK_ROOT" >&2
            find "$SDK_ROOT" -maxdepth 5 -name sdkmanager -print >&2 || true
            exit 127
          fi

          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Determine Versioning
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          INPUT_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$INPUT_NAME" ]; then
            INPUT_NAME=$(node -p "require('./package.json').version")
          fi
          if [ -z "$INPUT_NAME" ]; then
            echo "version_name must not be empty." >&2
            exit 1
          fi

          INPUT_CODE="${{ github.event.inputs.version_code }}"
          if [ -z "$INPUT_CODE" ]; then
            INPUT_CODE="${{ github.run_number }}"
          fi
          case "$INPUT_CODE" in
            ''|*[!0-9]*)
              echo "version_code must be a positive integer, got '$INPUT_CODE'." >&2
              exit 1
              ;;
          esac
          if [ "$INPUT_CODE" -lt 1 ]; then
            echo "version_code must be greater than zero." >&2
            exit 1
          fi

          echo "version_name=$INPUT_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$INPUT_CODE" >> "$GITHUB_OUTPUT"

      - name: Install Root Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type Check
        run: pnpm run type-check

      - name: Runtime Unit Tests
        run: pnpm run test:unit
        env:
          CI: true

      - name: Build Root Web App
        run: |
          pnpm run build:web
          test -d dist
          test -s dist/index.html

      - name: Sync Capacitor Android
        run: |
          npx cap sync android
          test -d android/app/src/main/assets/public
          test -s android/app/src/main/assets/public/index.html

      - name: Prepare Android Signing Key
        env:
          ANDROID_KEYSTORE_BASE64_CURRENT: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD_CURRENT: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS_CURRENT: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD_CURRENT: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYSTORE_BASE64_LEGACY: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD_LEGACY: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS_LEGACY: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD_LEGACY: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          EFFECTIVE_KEYSTORE_BASE64="${ANDROID_KEYSTORE_BASE64_CURRENT:-${KEYSTORE_BASE64_LEGACY:-}}"
          EFFECTIVE_KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD_CURRENT:-${KEYSTORE_PASSWORD_LEGACY:-}}"
          EFFECTIVE_KEY_ALIAS="${ANDROID_KEY_ALIAS_CURRENT:-${KEYSTORE_ALIAS_LEGACY:-}}"
          EFFECTIVE_KEY_PASSWORD="${ANDROID_KEY_PASSWORD_CURRENT:-${KEY_PASSWORD_LEGACY:-${EFFECTIVE_KEYSTORE_PASSWORD:-}}}"

          if [ -z "$EFFECTIVE_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 or KEYSTORE_BASE64 is required for signed release artifacts." >&2
            exit 1
          fi
          if [ -z "$EFFECTIVE_KEYSTORE_PASSWORD" ]; then
            echo "ANDROID_KEYSTORE_PASSWORD or KEYSTORE_PASSWORD is required for signed release artifacts." >&2
            exit 1
          fi
          if [ -z "$EFFECTIVE_KEY_ALIAS" ]; then
            echo "ANDROID_KEY_ALIAS or KEYSTORE_ALIAS is required for signed release artifacts." >&2
            exit 1
          fi

          mkdir -p android/app/keystore
          if ! printf '%s' "$EFFECTIVE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"; then
            echo "Release keystore base64 could not be decoded." >&2
            exit 1
          fi
          test -s "$KEYSTORE_FILE"
          keytool -list -keystore "$KEYSTORE_FILE" -storepass "$EFFECTIVE_KEYSTORE_PASSWORD" -alias "$EFFECTIVE_KEY_ALIAS" >/dev/null

          echo "ANDROID_KEYSTORE_PATH=$PWD/$KEYSTORE_FILE" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$EFFECTIVE_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$EFFECTIVE_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$EFFECTIVE_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Android Release Readiness Check
        run: node scripts/check-android-release-readiness.mjs

      - name: Build Signed Release AAB and APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon --no-build-cache --rerun-tasks --stacktrace \
            -Pandroid.skipWebAssetBuild=true \
            -PversionCode=${{ steps.vars.outputs.version_code }} \
            -PversionName=${{ steps.vars.outputs.version_name }}
          test -s app/build/outputs/bundle/release/app-release.aab
          test -s app/build/outputs/apk/release/app-release.apk

      - name: Prepare Release Artifacts
        run: |
          rm -rf release-bundle SovereignStudio-PlayStore-Release.zip
          mkdir -p release-bundle
          cp android/app/build/outputs/bundle/release/app-release.aab release-bundle/SovereignStudio-release.aab
          cp android/app/build/outputs/apk/release/app-release.apk release-bundle/SovereignStudio-release.apk
          cp android-release-readiness.md release-bundle/android-release-readiness.md
          (cd release-bundle && sha256sum SovereignStudio-release.aab SovereignStudio-release.apk android-release-readiness.md > CHECKSUMS.txt)
          zip -r SovereignStudio-PlayStore-Release.zip release-bundle/
          test -s release-bundle/SovereignStudio-release.aab
          test -s release-bundle/SovereignStudio-release.apk
          test -s SovereignStudio-PlayStore-Release.zip

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-release-aab-v${{ steps.vars.outputs.version_name }}
          path: release-bundle/SovereignStudio-release.aab
          retention-days: 30

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-release-apk-v${{ steps.vars.outputs.version_name }}
          path: release-bundle/SovereignStudio-release.apk
          retention-days: 30

      - name: Upload PlayStore Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-PlayStore-Release-v${{ steps.vars.outputs.version_name }}
          path: SovereignStudio-PlayStore-Release.zip
          retention-days: 30

      - name: Create Git Tag
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.vars.outputs.version_name }}"
          TAG="v$VERSION"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag "$TAG"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git "$TAG"
          fi

      - name: Release Summary
        if: always()
        run: |
          {
            echo "## Android Artifact Release"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Version | ${{ steps.vars.outputs.version_name }} |"
            echo "| Version Code | ${{ steps.vars.outputs.version_code }} |"
            echo "| compileSdk / targetSdk | 35 / 35 |"
            echo "| Android SDK packages | platform 35, build-tools 35.0.0 |"
            echo "| Artifacts | signed AAB, signed APK, PlayStore ZIP |"
          } >> "$GITHUB_STEP_SUMMARY"
