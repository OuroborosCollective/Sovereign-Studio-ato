name: 🚀 Android Artifact Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Optional: Version Code'
        required: false
        type: string
      version_name:
        description: 'Optional: Version Name (e.g., 1.1.1)'
        required: false
        type: string

jobs:
  build:
    name: 🏗️ Build Android Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      NODE_VERSION: 22
    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🏷️ Determine Versioning
        id: vars
        run: |
          INPUT_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$INPUT_NAME" ]; then
            INPUT_NAME=$(node -p "require('./package.json').version")
          fi
          INPUT_CODE="${{ github.event.inputs.version_code }}"
          if [ -z "$INPUT_CODE" ]; then
            INPUT_CODE="${{ github.run_number }}"
          fi
          echo "version_name=$INPUT_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$INPUT_CODE" >> $GITHUB_OUTPUT

      - name: 🔄 Check RN App
        id: check_rn
        run: |
          if [ -d "sovereign-studio-rn" ] && [ -f "sovereign-studio-rn/app.json" ]; then
            echo "rn_exists=true" >> $GITHUB_OUTPUT
          else
            echo "rn_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Install Dependencies
        run: |
          if [ "${{ steps.check_rn.outputs.rn_exists }}" == "true" ]; then
            cd sovereign-studio-rn && pnpm install --no-frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: 🏗️ Build Web App
        if: steps.check_rn.outputs.rn_exists == 'false'
        run: |
          echo "🔨 Building web app..."
          pnpm run build
          echo "✅ Web build complete"
          ls -la dist/ || echo "dist not found"

      - name: 🔄 Sync Capacitor
        if: steps.check_rn.outputs.rn_exists == 'false'
        run: |
          echo "🔄 Syncing Capacitor..."
          npx cap sync android
          ls -la android/app/src/main/assets/public/ || echo "Assets not found"
          echo "✅ Sync complete"

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: ⚡ Clean Gradle Cache
        run: |
          rm -rf ~/.gradle/caches ~/.gradle/wrapper
          echo "✅ Gradle cache cleaned"

      - name: 🔐 Decode Android Keystore
        run: |
          echo "🔐 Checking for Android signing secrets..."
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "⚠️ Warning: ANDROID_KEYSTORE_BASE64 is missing. Building UNSIGNED APKs."
            echo "UNSIGNED_BUILD=true" >> $GITHUB_OUTPUT
          else
            echo "🔐 Keystore secret found. Creating signed build."
            mkdir -p android/app/keystore
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/release.jks
            ls -la android/app/keystore/release.jks
            echo "UNSIGNED_BUILD=false" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Build Release AAB
        if: env.UNSIGNED_BUILD != 'true'
        run: |
          cd android
          chmod +x gradlew
          echo "🔨 Building AAB..."
          ./gradlew bundleRelease --no-daemon --no-build-cache --rerun-tasks \
            -Pandroid.injected.signing.store.file=$(pwd)/app/keystore/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PversionCode=${{ steps.vars.outputs.version_code }} \
            -PversionName=${{ steps.vars.outputs.version_name }}
          echo "✅ AAB build complete"
          ls -la app/build/outputs/bundle/release/ || echo "AAB not found"

      - name: 📦 Build Release APK (unsigned fallback)
        if: env.UNSIGNED_BUILD == 'true'
        run: |
          cd android
          chmod +x gradlew
          echo "🔨 Building UNSIGNED APK..."
          ./gradlew assembleRelease --no-daemon --no-build-cache --rerun-tasks
          echo "✅ Unsigned APK build complete"
          ls -la app/build/outputs/apk/release/ || echo "APK not found"

      - name: 📦 Build Signed APK
        if: env.UNSIGNED_BUILD != 'true'
        run: |
          cd android
          chmod +x gradlew
          echo "🔨 Building SIGNED APK..."
          ./gradlew assembleRelease --no-daemon --no-build-cache --rerun-tasks \
            -Pandroid.injected.signing.store.file=$(pwd)/app/keystore/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PversionCode=${{ steps.vars.outputs.version_code }} \
            -PversionName=${{ steps.vars.outputs.version_name }}
          echo "✅ Signed APK build complete"
          ls -la app/build/outputs/apk/release/ || echo "APK not found"

      - name: 📁 Prepare Artifacts
        run: |
          mkdir -p release-bundle
          if [ -f android/app/build/outputs/bundle/release/app-release.aab ]; then
            cp android/app/build/outputs/bundle/release/app-release.aab release-bundle/SovereignStudio-release.aab
            echo "✅ AAB copied"
          fi
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk release-bundle/SovereignStudio-release.apk
            echo "✅ APK copied"
          fi
          ls -la release-bundle/
          if [ -f SovereignStudio-PlayStore-Release.zip ]; then
            rm SovereignStudio-PlayStore-Release.zip
          fi
          zip -r SovereignStudio-PlayStore-Release.zip release-bundle/
          echo "✅ ZIP created"
          ls -la SovereignStudio-PlayStore-Release.zip

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-PlayStore-Release-v${{ steps.vars.outputs.version_name }}
          path: SovereignStudio-PlayStore-Release.zip
          retention-days: 30

      - name: 🏷️ Create Git Tag
        if: github.ref == 'refs/heads/main' && env.UNSIGNED_BUILD != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.vars.outputs.version_name }}"
          TAG="v$VERSION"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag $TAG
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git $TAG
            echo "✅ Tag $TAG created and pushed"
          fi

      - name: ⚠️ Summary
        run: |
          echo "📋 Build Summary:"
          echo "   Version: ${{ steps.vars.outputs.version_name }}"
          echo "   Version Code: ${{ steps.vars.outputs.version_code }}"
          echo "   Signed: ${{ env.UNSIGNED_BUILD != 'true' }}"
          echo "   Artifacts: release-bundle/"
