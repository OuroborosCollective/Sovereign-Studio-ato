name: 🚀 Android Production Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      NODE_VERSION: 20

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏷️ Create Git Tag from package.json
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "Detected version: $TAG"

          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag already exists → skip"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $TAG
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git $TAG

      - name: 🏗️ Build Web App
        run: npm run build

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: ☕ Setup Java (required for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: 🔐 Decode Android Keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/release.jks
          ls -lh android/app/keystore/

      - name: 📝 Create gradle.properties securely
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=keystore/release.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=$MYAPP_UPLOAD_KEY_ALIAS" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=$MYAPP_UPLOAD_STORE_PASSWORD" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=$MYAPP_UPLOAD_KEY_PASSWORD" >> android/gradle.properties
        env:
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 📦 Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: 🔑 Prepare Play Store API Key
        run: |
          cd android
          echo "$PLAY_STORE_JSON_KEY" > key.json
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}

      - name: ⚙️ Generate Fastlane Config
        run: |
          cd android
          mkdir -p fastlane

          cat > fastlane/Appfile <<EOF
          package_name("${{ secrets.ANDROID_PACKAGE_NAME }}")
          json_key_file("key.json")
          EOF

          cat > fastlane/Fastfile <<EOF
          default_platform(:android)

          platform :android do
            desc "Deploy to Play Store Production"
            lane :deploy_production do
              upload_to_play_store(
                track: 'production',
                aab: '../android/app/build/outputs/bundle/release/app-release.aab',
                skip_upload_metadata: true,
                skip_upload_images: true,
                skip_upload_screenshots: true
              )
            end
          end
          EOF

      - name: 🚀 Install Fastlane
        run: |
          cd android
          gem install fastlane

      - name: 📤 Upload to Play Store
        run: |
          cd android
          fastlane deploy_production
