name: 🚀 Android Production Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Optional: Version Code (must be higher than previous Play uploads)'
        required: false
        type: string
      version_name:
        description: 'Optional: Version Name (e.g., 1.1.1)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NODE_VERSION: 22
    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏷️ Determine Versioning
        id: vars
        run: |
          # Ermittle Version Name aus package.json falls nicht übergeben
          INPUT_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$INPUT_NAME" ]; then
            INPUT_NAME=$(node -p "require('./package.json').version")
          fi
          
          # Ermittle Version Code aus Run Number falls nicht übergeben
          INPUT_CODE="${{ github.event.inputs.version_code }}"
          if [ -z "$INPUT_CODE" ]; then
            INPUT_CODE="${{ github.run_number }}"
          fi
          
          echo "version_name=$INPUT_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$INPUT_CODE" >> $GITHUB_OUTPUT
          echo "Building with Version Name: $INPUT_NAME, Version Code: $INPUT_CODE"

      - name: 🏷️ Create Git Tag from package.json
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.vars.outputs.version_name }}"
          TAG="v$VERSION"
          echo "Detected version: $TAG"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag already exists → skip"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $TAG
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git $TAG

      - name: 🏗️ Build Web App
        run: npm run build

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: ☕ Setup Java (required for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: 🔐 Decode Android Keystore
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 secret is empty!"
            exit 1
          fi
          mkdir -p android/app/keystore
          # Verwende --decode mit --ignore-garbage um robustere Dekodierung zu ermöglichen
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/release.jks
          
          # Überprüfe ob die Datei valide ist (keine 0 Byte Datei)
          if [ ! -s android/app/keystore/release.jks ]; then
            echo "Error: Decoded keystore file is empty!"
            exit 1
          fi
          ls -lh android/app/keystore/

      - name: 📦 Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/app/keystore/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -PversionCode=${{ steps.vars.outputs.version_code }} \
            -PversionName=${{ steps.vars.outputs.version_name }}

      - name: 📁 Prepare Artifacts for Download
        run: |
          mkdir -p release-bundle
          cp android/app/build/outputs/bundle/release/app-release.aab release-bundle/SovereignStudio-release.aab
          # Proguard mapping file, if minification is enabled
          if [ -f android/app/build/outputs/mapping/release/mapping.txt ]; then
            cp android/app/build/outputs/mapping/release/mapping.txt release-bundle/SovereignStudio-proguard-mapping.txt
          fi
          echo "Version: ${{ steps.vars.outputs.version_name }}" > release-bundle/version.txt
          echo "Build Number: ${{ steps.vars.outputs.version_code }}" >> release-bundle/version.txt
          zip -r SovereignStudio-PlayStore-Release.zip release-bundle/

      - name: 📤 Upload Play Store Release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: SovereignStudio-PlayStore-Release
          path: SovereignStudio-PlayStore-Release.zip
          retention-days: 7

      - name: 🚀 Upload to Google Play (Optional/Manual)
        if: false
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: com.arestudio.nocode.aab
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          tracks: production
          status: completed
