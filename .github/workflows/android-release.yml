name: 🚀 Android Production Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NODE_VERSION: 22
    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏷️ Create Git Tag from package.json
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "Detected version: $TAG"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag already exists → skip"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $TAG
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git $TAG

      - name: 🏗️ Build Web App
        run: npm run build

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: ☕ Setup Java (required for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: 🔐 Decode Android Keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/release.jks
          ls -lh android/app/keystore/

      - name: 📦 Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          # Wir übergeben die Parameter als Projekt-Properties (-P), damit Gradle sie sicher erkennt
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=keystore/release.jks \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: $(node -p "require('../package.json').version")

      - name: 📁 Prepare Artifacts for Download
        run: |
          mkdir -p release-bundle
          cp android/app/build/outputs/bundle/release/app-release.aab release-bundle/
          cp android/app/keystore/release.jks release-bundle/
          echo "Version: $(node -p "require('./package.json').version")" > release-bundle/version.txt
          echo "Build Number: ${{ github.run_number }}" >> release-bundle/version.txt

      - name: 📤 Upload Signed AAB & Keystore
        uses: actions/upload-artifact@v4
        with:
          name: signed-android-release-bundle
          path: release-bundle/
          retention-days: 7

      - name: 🚀 Upload to Google Play (Optional/Manual)
        if: false
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: ${{ secrets.ANDROID_PACKAGE_NAME }}
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          tracks: production
          status: completed
