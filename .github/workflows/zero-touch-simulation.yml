name: Master-Prompt B: Tägliche 14-Tage-Nutzungssimulation (Zero-Cost-Cron)
on:
  # Tägliche Ausführung um 10:00 Uhr UTC (mit Varianz zur Vermeidung von Google-Mustern)
  schedule:
    - cron: '0 10 * * *'
jobs:
  daily_device_simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Lade diverse IP-Proxy-Liste
        # Die rotierende Proxy-Infrastruktur wird hier als verschlüsseltes Secret geladen (kein Wartungsaufwand)
        run: |
          PROXY_LIST=$(echo ${{ secrets.PROXY_INFRASTRUCTURE_BASE64 }} | base64 -d)
          echo "Proxy-Liste für IP-Diversität geladen. Wähle zufälligen, geografisch getrennten Proxy..."
      - name: Starte deterministische Interaktion auf virtuellem Gerät
        # Nutzt ein leichtgewichtiges, zertifiziertes AVD (Android Virtual Device)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          # WICHTIG: Erzwinge die Nutzung des zufällig gewählten Proxys
          emulator-options: -tcpdump /tmp/network.cap -http-proxy $PROXY_LIST
      - name: Führe Droidrun-Skript zur 2-10-Minuten-Nutzung aus
        # Das Skript simuliert menschliches Verhalten (Tippen, Scrollen, Verweildauer-Varianz)
        run: |
          echo "Simuliere organische Nutzung (zufällige Dauer: 2-10 Minuten) über den Proxy..."
          # Skript stoppt, wenn 14 Tage Interaktion für diese App erreicht sind
          ./scripts/droidrun_interact.sh --app_id com.arestudio.nocode.aab --duration $(($RANDOM % 9 + 2))m
      - name: Crash-Logs verarbeiten und als GitHub Issue anlegen
        # Fange Stacktraces ab und erstelle sofort ein Issue (Autofix-Vorbereitung)
        run: |
          python ./scripts/process_logs.py --app_id com.arestudio.nocode.aab --log_type 'CRASH'
          echo "Log verarbeitet. Ein neues 'bug'-Issue wurde im Repository angelegt."
3. Master-Prompt C: ZERO-TOUCH MASTER WORKFLOW
Dieser Workflow vereinigt die autonome Rekrutierung (Prompt A) mit der täglichen Simulation (Prompt B) und fügt die kybernetische Wartung (LLM-basierter Autofix, Jules-Konzept) hinzu, um einen vollständigen, wartungsfreien Lebenszyklus zu orchestrieren.
# Master-Prompt C: Kybernetische Zero-Touch-Wartung (Vereinigung: Rekrutierung + Simulation + Autofix)
name: Master-Prompt C: ZERO-TOUCH MASTER WORKFLOW (Komplett autonom, ohne Kosten/Wartung)
on:
  # 1. Auslöser: Täglicher Cron Job für Engagement-Sicherung und Rekrutierung
  schedule:
    - cron: '30 08 * * *'
  # 2. Auslöser: Code-Änderung (Pull Request Merge) für das Deployment
  pull_request:
    types: [closed]
    branches: [main]
    if: github.event.pull_request.merged == true
  # 3. Auslöser: Externer Crash-Report (WebHook vom Firebase Crashlytics)
  repository_dispatch:
    types: [crash_report_received]
jobs:

  # JOB 1: Tägliche Rekrutierung und Engagement-Sicherung (Modell A)
  daily_agent_run:
    name: Agenten-Ökosystem: Rekrutierung & Interaktion
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Starte Social-Agent & Daily-Device-Simulation
        run: |
          # Führe beide Prozesse gleichzeitig aus, um Zeit zu sparen.
          # Rekrutierung (Prompt A Logik): Suche neue Tester & sende Incentives
          python ./agents/recruiter.py --target "COMMUNITY"
          # Interaktion (Prompt B Logik): Starte 12 simulierte Geräte mit Proxy-Rotation
          ./scripts/simulate_engagement.sh --target_count 12 --use_secrets_proxy ${{ secrets.PROXY_INFRASTRUCTURE_BASE64 }}
  # JOB 2: Autonomer KI-Autofix (Modell C - Kybernetische Wartung)
  ai_autofix_loop:
    name: KI-Wartung: Jules-basierter Autofix
    if: github.event_name == 'repository_dispatch' && github.event.action == 'crash_report_received'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Konvertiere Crash-Report in strukturiertes Issue
        # Nutzt LLM zur Aggregation von unstrukturiertem Feedback aus dem client_payload
        uses: code-sanitizer/llm-issue-planner@v1
        with:
          payload: ${{ github.event.client_payload.crash_details }}
          output_label: 'bug'
      - name: Trigger Jules (Google Labs AI Coding Agent)
        uses: google-labs-code/jules-invoke@v1
        with:
          # Jules ist angewiesen, den Bug aus dem zuvor erstellten Issue zu fixen
          prompt: |
            Bitte analysiere das zuletzt erstellte GitHub Issue mit dem Label 'bug'.
            Erstelle einen Code-Patch, der diesen Fehler behebt, schreibe einen begleitenden Unit-Test und öffne einen Pull Request.
            Architektonische Regeln: Halte dich strikt an das Muster des Stateless Determinism.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
  # JOB 3: Automatisches Deployment nach Fix (Zero-Touch Publishing)
  automated_release:
    name: Zero-Touch-Deployment
    needs: [ai_autofix_loop]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Baue und signiere das Android App Bundle (.aab)
        # Nutzt Base64-kodierten Keystore aus Secrets
        uses: build-tools/android-builder@v1
      - name: Atomares Update in den Closed Test Track pushen
        # Erfüllt die Forderung nach 2-3 Updates während der 14 Tage
        uses: r0adkll/upload-google-play@v1
        with:
          track: 'closed_testing'
          serviceAccountJsonPlainText: ${{ secrets.PLAY_API_KEY }}
          aabFile: './app/release.aab'
