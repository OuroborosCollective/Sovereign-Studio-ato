name: "Quarantined: Zero-Touch Usage Simulation Workflow"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quarantined:
    name: Block unsafe usage simulation automation
    runs-on: ubuntu-latest
    steps:
      - name: Explain quarantine
        run: |
          echo "This legacy usage simulation workflow is intentionally quarantined."
          echo "Reason: scheduled proxy-based usage simulation can create misleading engagement signals and does not represent real user runtime truth."
          echo "Sovereign rules require real runtime evidence, no fake engagement, no fake success, and no hidden automation that pretends organic use."
          echo "If device smoke testing is needed later, rebuild it as a transparent E2E/Playwright or Android emulator test with no store-engagement claims."
          exit 1
