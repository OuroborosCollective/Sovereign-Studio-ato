name: Build Android APK & AAB

on:
  push:
    branches: [ main, fix/*, feat/* ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/sovereign-studio-release.keystore
          ls -la android/app/*.keystore

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build Debug APK
        if: inputs.build_type == 'debug' || github.event_name == 'workflow_dispatch'
        run: |
          cd android && ./gradlew assembleDebug
        continue-on-error: true

      - name: Build Release APK
        if: env.ANDROID_KEYSTORE_PATH != ''
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$ANDROID_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD

      - name: Build Release AAB
        if: env.ANDROID_KEYSTORE_PATH != ''
        run: |
          cd android && ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$ANDROID_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD

      - name: Prepare APK for upload
        if: always()
        run: |
          mkdir -p build-output
          # Find all APKs
          find android -name "*.apk" -type f -exec cp {} build-output/ \;
          find android -name "*.aab" -type f -exec cp {} build-output/ \;
          # Create ZIP with all outputs
          cd build-output && zip sovereign-studio-${{ github.sha }}.zip *.apk *.aab 2>/dev/null || true
          ls -la build-output/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sovereign-studio-android-${{ github.sha }}
          path: |
            build-output/*.apk
            build-output/*.aab
            build-output/*.zip
          retention-days: 30

      - name: Upload to Google Play (Optional)
        if: github.ref == 'refs/heads/main' && env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        run: |
          echo "Google Play upload would happen here"
          echo "Requires: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret"

  build-web:
    name: Build Web Version
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sovereign-studio-web-${{ github.sha }}
          path: dist/
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.apk artifacts/**/*.aab
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify on completion
    needs: [build-android]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- APK: $(find artifacts -name '*.apk' | head -1 || echo 'Not generated')" >> $GITHUB_STEP_SUMMARY
          echo "- AAB: $(find artifacts -name '*.aab' | head -1 || echo 'Not generated')" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.build-android.result }}" >> $GITHUB_STEP_SUMMARY