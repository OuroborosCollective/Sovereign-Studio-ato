name: Generate NOCode Studio Draft Update

on:
  workflow_dispatch:

jobs:
  draft-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Launch Assets and Posts
        run: node launch-bot-v1/server/services/postGenerator.js
        env:
          NODE_ENV: production

      - name: Prepare Branch and Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -b auto/launch-bot-update
          git add .
          git commit -m "feat: auto-generated launch assets + posts" || echo "No changes to commit"
          git push origin auto/launch-bot-update --force

      - name: Create Draft Pull Request
        uses: repo-sync/pull-request@v2
        with:
          destination_branch: "main"
          source_branch: "auto/launch-bot-update"
          pr_title: "🚀 Auto Launch Update (NOCode Studio ATO)"
          pr_body: "Automated update generated by NOCode Studio Launch Bot. Includes fresh assets and platform-specific posts."
          pr_draft: true
          github_token: ${{ secrets.GITHUB_TOKEN }}