name: Generate Sovereign Studio Draft Update

on:
  workflow_dispatch:

jobs:
  draft-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies with Retry
        run: |
          set -e
          for i in 1 2 3; do
            echo "Attempt $i/3: Installing dependencies..."
            if npm install; then
              echo "Dependencies installed successfully."
              break
            fi
            echo "Install attempt $i failed. Retrying in 5 seconds..."
            sleep 5
          done

      - name: Generate Launch Assets and Posts
        run: |
          set -e
          echo "Starting launch asset generation..."
          if node launch-bot-v1/server/services/postGenerator.js; then
            echo "Launch assets generated successfully."
          else
            echo "Warning: Launch asset generation returned non-zero. Checking if files exist..."
            ls -la launch-bot-v1/server/services/ || true
          fi
        env:
          NODE_ENV: production

      - name: Prepare Branch and Commit
        run: |
          set -e
          echo "Preparing branch and commit..."
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check for changes
          if git diff --exit-code; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi
          
          git checkout -b auto/launch-bot-update || git checkout auto/launch-bot-update
          git add .
          if git commit -m "feat: auto-generated launch assets + posts"; then
            echo "Commit created successfully."
          else
            echo "No changes to commit. Exiting gracefully."
            exit 0
          fi
          
          echo "Pushing branch..."
          if git push origin auto/launch-bot-update --force 2>&1; then
            echo "Branch pushed successfully."
          else
            echo "Push failed. This might be a permissions issue."
            exit 1
          fi

      - name: Create Draft Pull Request
        uses: repo-sync/pull-request@v2
        with:
          destination_branch: "main"
          source_branch: "auto/launch-bot-update"
          pr_title: "🚀 Auto Launch Update (Sovereign Studio ATO)"
          pr_body: |
            Automated update generated by Sovereign Studio Launch Bot.
            
            Includes fresh assets and platform-specific posts.
            
            ---
            *This PR was created automatically by Sovereign Studio.*
          pr_draft: true
          github_token: ${{ secrets.GITHUB_TOKEN }}