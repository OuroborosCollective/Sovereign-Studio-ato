name: Launch Bot

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version_bump:
        description: 'Version Bump Type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      generate_assets:
        description: 'Regenerate Capacitor Assets'
        required: true
        type: boolean
        default: true
  push:
    tags:
      - 'launch-v*'

jobs:
  launch-orchestrator:
    name: Sovereign Studio Asset & Release Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Application (Vite)
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_APP_ENV: ${{ github.event.inputs.environment || 'production' }}

      - name: Synchronize Capacitor Bridge
        run: npx cap sync

      - name: Generate Native Assets
        if: github.event.inputs.generate_assets == 'true' || startsWith(github.ref, 'refs/tags/launch-v')
        run: |
          npm install @capacitor/assets --save-dev
          npx @capacitor/assets generate --android
          npx @capacitor/assets generate --ios

      - name: Commit Asset Updates
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "Sovereign-Bot"
          git config --global user.email "bot@sovereign-studio.ai"
          git add .
          git diff-index --quiet HEAD || git commit -m "chore(assets): automated asset generation for ${{ github.ref_name }}"
          git push origin HEAD

      - name: Trigger Android Scaling Workflow
        if: success()
        run: |
          echo "Initiating automated CI/CD scaling for Android environments via Capacitor..."
          # Placeholder for secondary workflow trigger or Fastlane invocation