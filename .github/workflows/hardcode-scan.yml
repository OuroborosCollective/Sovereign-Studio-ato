name: Hardcode & Logic Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

env:
  PNPM_VERSION: 10

jobs:
  hardcode-scan:
    name: Scan for Hardcoded Values & Logic Issues
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@${PNPM_VERSION}
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Hardcode Scanner
        id: scan
        run: |
          echo "### 🔍 Hardcode & Logic Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Date | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SCAN_OUTPUT=$(pnpm run hardcode:scan 2>&1 || true)
          echo "$SCAN_OUTPUT"

          ERROR_COUNT=$(echo "$SCAN_OUTPUT" | grep -oP "(\d+) errors" | grep -oP "\d+" | head -1 || echo "0")
          WARNING_COUNT=$(echo "$SCAN_OUTPUT" | grep -oP "(\d+) warnings" | grep -oP "\d+" | head -1 || echo "0")

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ ERROR | ${ERROR_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️  WARNING | ${WARNING_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${ERROR_COUNT:-0}" -gt 0 ]; then
            echo ""
            echo "❌ SCAN FAILED: ${ERROR_COUNT:-0} hardcode errors detected"
            echo "   See detailed report above"
            exit 1
          fi

          echo ""
          echo "✅ SCAN PASSED: No critical hardcode errors"
          if [ "${WARNING_COUNT:-0}" -gt 0 ]; then
            echo "   ⚠️  ${WARNING_COUNT:-0} warnings (informational)"
          fi

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@${PNPM_VERSION}
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript Check
        run: pnpm run type-check

      - name: Run ESLint
        continue-on-error: true
        run: pnpm run lint 2>&1 || true

      - name: Code Quality Summary
        run: |
          echo "### 🔧 Code Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ TypeScript type-check: PASS" >> $GITHUB_STEP_SUMMARY
          echo "✅ ESLint: Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Logic issues are caught by TypeScript strict mode and ESLint rules." >> $GITHUB_STEP_SUMMARY
