name: unused-code
on:
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '.github/workflows/unused-code.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  ts-prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Check unused exports
        run: |
          set -euo pipefail
          npx ts-prune | tee prune.log
          if [[ ${PIPESTATUS[0]} -ne 0 ]]; then echo "::error ::ts-prune failed" && exit 1; fi
          if [ -s prune.log ]; then echo "::error ::Unused exports detected" && cat prune.log && exit 1; fi
