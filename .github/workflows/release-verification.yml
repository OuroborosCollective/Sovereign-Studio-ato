name: Release Verification

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'android/**'
      - 'tests/**'
      - 'config/architecture/SOVEREIGN_RUNTIME_CANARY_MATRIX.v1.json'
      - 'docs/SOVEREIGN_ARCHITECTURE_MANIFEST.md'
      - '.github/workflows/release-verification.yml'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'capacitor.config.*'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Require complete revision-bound live-canary evidence'
        required: false
        default: false
        type: boolean
      runtime_canary_evidence_path:
        description: 'Repository-relative JSON evidence path used only in release mode'
        required: false
        default: ''
        type: string

concurrency:
  group: release-verification-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

# pull_request uses a synthetic merge SHA by default. Every PR and Draft PR must
# instead bind build, test and receipt evidence to the immutable source head.
env:
  SOVEREIGN_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact authoritative revision
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOVEREIGN_REVISION }}
          fetch-depth: 1

      - name: Revision Integrity Gate
        id: revision_integrity
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          EVENT_WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          [[ "$SOVEREIGN_REVISION" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::SOVEREIGN_REVISION is not a full lowercase Git SHA"
            exit 1
          }
          ACTUAL_HEAD="$(git rev-parse HEAD)"
          [[ "$ACTUAL_HEAD" == "$SOVEREIGN_REVISION" ]] || {
            echo "::error::Checked-out HEAD $ACTUAL_HEAD does not match authoritative revision $SOVEREIGN_REVISION"
            exit 1
          }
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            [[ "$EVENT_PR_HEAD_SHA" == "$SOVEREIGN_REVISION" ]] || {
              echo "::error::PR head revision was not bound correctly"
              exit 1
            }
          else
            [[ "$EVENT_WORKFLOW_SHA" == "$SOVEREIGN_REVISION" ]] || {
              echo "::error::Workflow revision was not bound correctly"
              exit 1
            }
          fi
          {
            echo "## Revision Integrity Gate"
            echo ""
            echo "- Event: \`$EVENT_NAME\`"
            echo "- Authoritative revision: \`$SOVEREIGN_REVISION\`"
            echo "- Checked-out HEAD: \`$ACTUAL_HEAD\`"
            echo "- Binding: **PASS**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Runtime Canary Matrix Contract Gate
        id: runtime_canary_contract
        shell: bash
        run: |
          set -Eeuo pipefail
          node scripts/runtime-canary-matrix-gate.mjs \
            --mode contract \
            --revision "$SOVEREIGN_REVISION"

      - name: Runtime Canary Matrix Gate Tests
        id: runtime_canary_tests
        shell: bash
        run: node --test scripts/runtime-canary-matrix-gate.test.mjs

      - name: Runtime Canary Release Evidence Gate
        id: runtime_canary_release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode == true }}
        shell: bash
        env:
          RUNTIME_CANARY_EVIDENCE_PATH: ${{ inputs.runtime_canary_evidence_path }}
        run: |
          set -Eeuo pipefail
          [[ -n "$RUNTIME_CANARY_EVIDENCE_PATH" ]] || {
            echo "::error::runtime_canary_evidence_path is required in release mode"
            exit 1
          }
          node scripts/runtime-canary-matrix-gate.mjs \
            --mode release \
            --revision "$SOVEREIGN_REVISION" \
            --evidence "$RUNTIME_CANARY_EVIDENCE_PATH" \
            --report .security-reports/runtime-canary-release-evidence-gate.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Type Check
        id: type_check
        run: pnpm run type-check

      - name: Runtime Unit Tests
        id: unit_tests
        run: pnpm run test:unit
        env:
          CI: true

      - name: Build Web + Android Sync
        id: build_sync
        run: pnpm run build

      - name: Install Playwright browsers
        id: playwright_install
        run: pnpm exec playwright install chromium

      - name: Artifact Smoke Gate
        id: artifact_smoke
        run: pnpm run test:artifact-smoke
        env:
          CI: true

      - name: Playwright Smoke Gate
        id: playwright_smoke
        run: pnpm run test:e2e
        env:
          CI: true

      - name: Integration Gate
        id: integration
        run: pnpm run test:integration
        env:
          CI: true

      - name: Upload Runtime Canary Matrix Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-canary-matrix-reports
          path: .security-reports/runtime-canary-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Release Verification Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release Verification"
            echo ""
            echo "| Gate | Result |"
            echo "| --- | --- |"
            echo "| Revision Integrity | ${{ steps.revision_integrity.outcome }} |"
            echo "| Canary Matrix Contract | ${{ steps.runtime_canary_contract.outcome }} |"
            echo "| Canary Matrix Tests | ${{ steps.runtime_canary_tests.outcome }} |"
            echo "| Canary Release Evidence | ${{ steps.runtime_canary_release.outcome }} |"
            echo "| Type Check | ${{ steps.type_check.outcome }} |"
            echo "| Runtime Unit Tests | ${{ steps.unit_tests.outcome }} |"
            echo "| Build Web + Android Sync | ${{ steps.build_sync.outcome }} |"
            echo "| Artifact Smoke Gate | ${{ steps.artifact_smoke.outcome }} |"
            echo "| Playwright Smoke Gate | ${{ steps.playwright_smoke.outcome }} |"
            echo "| Integration Gate | ${{ steps.integration.outcome }} |"
            echo ""
            echo "The Release Gate is revision-bound and release-blocking for every PR and Draft PR. Integration tests remain release-blocking. A workflow_dispatch with release_mode=true additionally fails closed unless every required live-canary receipt is passed, revision-bound and cleanup-complete."
          } >> "$GITHUB_STEP_SUMMARY"
