name: Release Verification

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'android/**'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'capacitor.config.*'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'android/**'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'capacitor.config.*'
  workflow_dispatch:

concurrency:
  group: release-verification-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Type Check
        id: type_check
        run: pnpm run type-check

      - name: Runtime Unit Tests
        id: unit_tests
        run: pnpm run test:unit
        env:
          CI: true

      - name: Build Web + Android Sync
        id: build_sync
        run: pnpm run build

      - name: Install Playwright browsers
        id: playwright_install
        run: pnpm exec playwright install chromium

      - name: Artifact Smoke Gate
        id: artifact_smoke
        run: pnpm run test:artifact-smoke
        env:
          CI: true

      - name: Playwright Smoke Gate
        id: playwright_smoke
        run: pnpm run test:e2e
        env:
          CI: true

      - name: Integration Gate
        id: integration
        run: pnpm run test:integration
        env:
          CI: true

      - name: Release Verification Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release Verification"
            echo ""
            echo "| Gate | Result |"
            echo "| --- | --- |"
            echo "| Type Check | ${{ steps.type_check.outcome }} |"
            echo "| Runtime Unit Tests | ${{ steps.unit_tests.outcome }} |"
            echo "| Build Web + Android Sync | ${{ steps.build_sync.outcome }} |"
            echo "| Artifact Smoke Gate | ${{ steps.artifact_smoke.outcome }} |"
            echo "| Playwright Smoke Gate | ${{ steps.playwright_smoke.outcome }} |"
            echo "| Integration Gate | ${{ steps.integration.outcome }} |"
            echo ""
            echo "Integration tests are release-blocking. Closed issues #255 and #257 are no longer used as a non-blocking exception."
          } >> "$GITHUB_STEP_SUMMARY"
