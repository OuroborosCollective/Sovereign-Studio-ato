name: dependency-graph
on:
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '.github/workflows/dependency-graph.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  madge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
          run_install: true
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Generate dependency graph
        run: |
          set -euo pipefail
          pnpm madge --circular --extensions ts,tsx src || (echo "::error ::Circular deps detected" && exit 1)
          pnpm madge --image deps.svg --extensions ts,tsx src
      - name: Prepare graph comment
        run: echo "![Dependency Graph](attachment://deps.svg)" > graph-comment.md
      - name: Upload SVG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deps-graph
          path: deps.svg
      - name: Comment graph (same-repo PRs only)
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: marocchino/sticky-pull-request-comment@d24b05e359ad9e37e9b0ce3f4bfefd4dc2621c7a
        with:
          path: graph-comment.md
          header: ":chart_with_upwards_trend: Dependency Graph"
