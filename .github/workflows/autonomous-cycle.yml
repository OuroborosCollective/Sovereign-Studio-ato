name: Sovereign Studio V3 ATO Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_optimization:
        description: 'Force deep code optimization'
        required: false
        default: 'false'
      create_existing_branch_pr:
        description: 'Recovery: create a Draft PR for the dispatched branch only'
        required: false
        default: 'false'
  push:
    branches:
      - main
    paths:
      - 'src/logic/ato/**'
      - 'scripts/ato/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-existing-branch-pr:
    if: github.event_name == 'workflow_dispatch' && inputs.create_existing_branch_pr == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout exact dispatched branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Create one idempotent Draft PR for the current branch
        id: create_pr
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.SOVEREIGN_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          family="unknown"
          exit_code=1
          if [[ -z "${GH_TOKEN:-}" ]]; then
            family="protected-token-missing"
          elif [[ "$GITHUB_REF_TYPE" != "branch" || "$GITHUB_REF_NAME" == "main" ]]; then
            family="unsafe-ref"
          elif gh pr view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json number >/dev/null 2>&1; then
            family="already-exists"
            exit_code=0
          else
            set +e
            output="$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --base main \
              --head "$GITHUB_REF_NAME" \
              --title "feat(knowledge): add revision-bound GitHub live canary" \
              --body "Implements #873. Recovery-created Draft PR after the direct PR API returned HTTP 500; exact branch CI remains authoritative." 2>&1)"
            exit_code=$?
            set -e
            if [[ $exit_code -eq 0 ]]; then
              family="created"
            elif grep -Eqi 'not permitted to create|Resource not accessible by integration|permission' <<<"$output"; then
              family="permission-disabled"
            elif grep -Eqi 'No commits between|no commits' <<<"$output"; then
              family="no-diff"
            elif grep -Eqi 'Head sha.*blank|head.*missing|head.*invalid' <<<"$output"; then
              family="head-missing"
            elif grep -Eqi 'not a git repository' <<<"$output"; then
              family="git-context-missing"
            elif grep -Eqi 'HTTP 500|Internal Server Error|internal error' <<<"$output"; then
              family="github-internal-error"
            elif grep -Eqi 'already exists|A pull request already exists' <<<"$output"; then
              family="already-exists"
              exit_code=0
            fi
          fi
          printf 'family=%s\n' "$family" >> "$GITHUB_OUTPUT"
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$family" > pr-create-family.txt
          exit "$exit_code"

      - name: Persist bounded PR-create failure family
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-create-${{ steps.create_pr.outputs.family || 'unknown' }}
          path: pr-create-family.txt
          retention-days: 1

      - name: Fail when Draft PR was not created
        if: steps.create_pr.outcome == 'failure'
        run: exit 1

  autonomous-cycle:
    if: github.event_name != 'workflow_dispatch' || inputs.create_existing_branch_pr != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Initialize ATO Environment
        run: |
          mkdir -p .ato/logs
          mkdir -p .ato/artifacts

      - name: Execute Autonomous Tuning & Optimization (v2)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_ENV: production
          FORCE_OPT: ${{ github.event.inputs.force_optimization }}
        run: npx tsx scripts/ato/autonomous-pipeline.ts

      - name: Run Quality Assurance & Mobile Validation
        run: |
          npm run lint
          npm run build
          npx cap sync android

      - name: Publish autonomous changes as Draft PR only
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --local user.email "ato-bot@sovereign-studio.ai"
          git config --local user.name "Sovereign ATO Bot"
          git add .
          if git diff --cached --quiet; then
            echo "No changes detected in this cycle."
            exit 0
          fi

          BRANCH="sovereign/ato-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          git commit -m "chore(ato): autonomous optimization cycle [skip ci]"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --draft \
            --base main \
            --head "$BRANCH" \
            --title "chore(ato): autonomous optimization cycle" \
            --body "Automated ATO output. Draft only; requires human review and explicit merge."

      - name: Archive ATO Cycle Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ato-cycle-logs-${{ github.run_id }}
          path: .ato/logs/
          retention-days: 7
