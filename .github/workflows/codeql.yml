name: "Sovereign CodeQL Security"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "31 22 * * 3"
  workflow_dispatch:

concurrency:
  group: sovereign-codeql-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.12.2"
  CI: "true"

jobs:
  analyze:
    name: CodeQL Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 75

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java for Android analysis
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK for Android analysis
        if: matrix.language == 'java-kotlin'
        uses: android-actions/setup-android@v4

      - name: Setup pnpm for Android analysis
        if: matrix.language == 'java-kotlin'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js for Android analysis
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies for Android analysis
        if: matrix.language == 'java-kotlin'
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality
          config: |
            name: Sovereign Tool CodeQL Config
            threat-models: local
            paths:
              - src
              - scripts
              - android
              - .github/workflows
              - package.json
              - pnpm-lock.yaml
              - capacitor.config.ts
              - capacitor.config.json
              - vite.config.ts
              - tsconfig.json
            paths-ignore:
              - node_modules
              - dist
              - build
              - coverage
              - .gradle
              - android/.gradle
              - android/app/build
              - android/build
              - "**/*.generated.*"
              - "**/*.map"

      - name: Manual Android build for Java/Kotlin analysis
        if: matrix.language == 'java-kotlin' && matrix.build-mode == 'manual'
        shell: bash
        run: |
          set -euo pipefail

          has_script() {
            node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts[process.argv[1]] ? 0 : 1)" "$1"
          }

          run_first_present() {
            for script in "$@"; do
              if has_script "$script"; then
                echo "::group::pnpm run $script"
                pnpm run "$script"
                echo "::endgroup::"
                return 0
              fi
            done

            echo "skip: none of scripts found: $*"
            return 0
          }

          run_first_present build web:build

          if [ -f capacitor.config.ts ] || [ -f capacitor.config.json ]; then
            if pnpm exec cap --version >/dev/null 2>&1; then
              echo "::group::Capacitor sync Android"
              pnpm exec cap sync android
              echo "::endgroup::"
            else
              echo "Capacitor CLI not available through pnpm; using existing android project."
            fi
          fi

          if [ -f android/gradlew ]; then
            echo "::group::Android assembleDebug for CodeQL"
            chmod +x android/gradlew
            (cd android && ./gradlew :app:assembleDebug --no-daemon --stacktrace)
            echo "::endgroup::"
          elif [ -f gradlew ]; then
            echo "::group::Root Gradle assembleDebug for CodeQL"
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon --stacktrace
            echo "::endgroup::"
          else
            echo "No Gradle wrapper found for java-kotlin manual build."
            exit 1
          fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

      - name: Write CodeQL summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Sovereign CodeQL Security"
            echo ""
            echo "- Language: \`${{ matrix.language }}\`"
            echo "- Build mode: \`${{ matrix.build-mode }}\`"
            echo "- Query suite: \`security-and-quality\`"
            echo "- Target: React/TypeScript app, GitHub Actions, Android/Capacitor shell"
          } >> "$GITHUB_STEP_SUMMARY"
