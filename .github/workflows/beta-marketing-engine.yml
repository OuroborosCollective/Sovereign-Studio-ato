name: Beta Marketing Engine

on:
  workflow_dispatch: # Allow manual triggering
  schedule:
    - cron: '0 10 * * 1,3,5' # Run automatically at 10:00 AM on Mon, Wed, Fri

permissions:
  contents: read
  actions: write

concurrency:
  group: beta-marketing-engine
  cancel-in-progress: false

jobs:
  generate-marketing-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        working-directory: ./launch-bot-v1
        run: npm install --no-package-lock --ignore-scripts

      - name: Run Marketing Content Generator
        working-directory: ./launch-bot-v1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Use first 5 beta codes from promo-codes.txt
          BETA_CODES=$(head -5 ./marketing/promo-codes.txt 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          echo "Using beta codes: $BETA_CODES"
          node marketing/generate-posts.js "$BETA_CODES"

      - name: Upload Generated Content
        uses: actions/upload-artifact@v4
        with:
          name: nocode-studio-marketing-materials
          path: marketing-output/
          retention-days: 7
