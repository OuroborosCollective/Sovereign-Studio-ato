name: Beta Marketing Engine

on:
  workflow_dispatch: # Allow manual triggering
  schedule:
    - cron: '0 10 * * 1,3,5' # Run automatically at 10:00 AM on Mon, Wed, Fri

permissions:
  contents: read
  actions: write

concurrency:
  group: beta-marketing-engine
  cancel-in-progress: false

jobs:
  generate-marketing-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'launch-bot-v1/package.json'

      - name: Install Dependencies
        working-directory: ./launch-bot-v1
        run: npm install

      - name: Run Marketing Content Generator
        working-directory: ./launch-bot-v1
        env:
          GEMINI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: node marketing/generate-posts.js

      - name: Upload Generated Content
        uses: actions/upload-artifact@v4
        with:
          name: nocode-studio-marketing-materials
          path: marketing-output/
          retention-days: 7
