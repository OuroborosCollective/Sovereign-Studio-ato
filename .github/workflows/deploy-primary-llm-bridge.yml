name: Legacy Primary LLM Bridge Disabled

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legacy-primary-llm-bridge-disabled
  cancel-in-progress: true

jobs:
  explain:
    name: Explain private LiteLLM routing
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report canonical routing contract
        shell: bash
        run: |
          cat <<'EOF'
          This legacy public bridge is permanently disabled.
          Online model traffic must use:
          App -> Sovereign Backend -> direct OpenRouter Paid or direct FreeLLM Free -> owner-verified provider.
          Add providers only through /admin -> LLM Routes and the protected owner-input flow.
          No Worker deployment, repository-variable mutation, provider secret or direct browser route is allowed here.
          EOF
