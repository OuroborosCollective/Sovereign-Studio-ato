name: Finalize Secure SSH Documentation

on:
  push:
    branches:
      - security/contain-runner-and-secrets-20260711
    paths:
      - '.github/workflows/finalize-doc-sanitization.yml'

permissions:
  contents: write

jobs:
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/contain-runner-and-secrets-20260711
          fetch-depth: 0

      - name: Remove permissive host-key examples
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          for name in ("AGENTS_KNOWLEDGE.md", "AGENTS_SKILLS.md"):
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              old = (
                  "import paramiko\n\n"
                  "client = paramiko.SSHClient()\n"
                  "client.set_missing_host_key_policy(paramiko.AutoAddPolicy())\n"
                  "client.load_system_host_keys()"
              )
              new = (
                  "import os\n"
                  "import paramiko\n\n"
                  "client = paramiko.SSHClient()\n"
                  "client.load_system_host_keys()"
              )
              if old not in text:
                  raise SystemExit(f"expected SSH example not found in {name}")
              path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git diff --check

      - name: Commit only to the security branch
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-doc-sanitization.yml
          git config user.name "Sovereign Security Guard"
          git config user.email "security-guard@users.noreply.github.com"
          git add -A
          git commit -m "docs(security): require verified SSH host keys"
          git push origin "HEAD:${GITHUB_REF_NAME}"
