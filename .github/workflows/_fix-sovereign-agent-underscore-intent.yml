name: Fix Sovereign Agent Underscore Intent

on:
  push:
    branches:
      - refactor/sovereign-agent-internal-runtime-v2
    paths:
      - '.github/workflows/_fix-sovereign-agent-underscore-intent.yml'

permissions:
  contents: write

concurrency:
  group: sovereign-agent-underscore-intent-fix
  cancel-in-progress: true

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: refactor/sovereign-agent-internal-runtime-v2
          fetch-depth: 0

      - name: Apply exact runtime patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          target = Path('src/features/product/runtime/workerIntentDetector.ts')
          content = target.read_text(encoding='utf-8')
          old = "  'sovereign agent', 'sovereign-agent', 'draft pr', 'draft-pr', 'pull request', 'pr erstellen',"
          new = "  'sovereign agent', 'sovereign-agent', 'sovereign_agent', 'draft pr', 'draft-pr', 'pull request', 'pr erstellen',"
          if content.count(old) != 1:
              raise SystemExit(f'Expected execution token anchor exactly once, found {content.count(old)}')
          target.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY
          git diff --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.12.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify intent and contracts
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec vitest run src/features/product/containers/BuilderContainer.intent.test.ts
          pnpm exec tsc --noEmit
          node --test scripts/sovereign-agent-internal-live-path.test.mjs

      - name: Commit runtime fix
        shell: bash
        run: |
          set -euo pipefail
          git add src/features/product/runtime/workerIntentDetector.ts
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(intent): normalize Sovereign Agent underscore alias'
          git push origin HEAD:refactor/sovereign-agent-internal-runtime-v2
