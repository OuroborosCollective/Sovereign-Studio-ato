name: Create architecture manifest open-point issues

run-name: Create manifest issues from verified bundle

on:
  workflow_dispatch:
    inputs:
      bundle_path:
        description: Versioned JSON bundle under docs/architecture
        required: true
        default: docs/architecture/SOVEREIGN_MANIFEST_OPEN_ISSUES.json
        type: string
      expected_bundle_sha256:
        description: Exact SHA-256 of the issue bundle
        required: true
        type: string
      owner_approved:
        description: Explicit repository-owner approval
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: architecture-manifest-open-issues
  cancel-in-progress: false

jobs:
  create-issues:
    name: Create idempotent manifest issues
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4

      - name: Validate bundle and create issues
        uses: actions/github-script@v7
        env:
          BUNDLE_PATH: ${{ inputs.bundle_path }}
          EXPECTED_BUNDLE_SHA256: ${{ inputs.expected_bundle_sha256 }}
          OWNER_APPROVED: ${{ inputs.owner_approved }}
        with:
          script: |
            const fs = require('fs');
            const crypto = require('crypto');
            const path = require('path');

            const bundlePath = String(process.env.BUNDLE_PATH || '').trim();
            const expectedHash = String(process.env.EXPECTED_BUNDLE_SHA256 || '').trim().toLowerCase();
            const ownerApproved = String(process.env.OWNER_APPROVED || '').trim().toLowerCase();

            if (ownerApproved !== 'true') {
              core.setFailed('explicit owner approval is required');
              return;
            }
            if (!/^docs\/architecture\/[A-Za-z0-9._/-]+\.json$/.test(bundlePath) || bundlePath.includes('..')) {
              core.setFailed('bundle_path is outside the allowlisted docs/architecture JSON surface');
              return;
            }
            if (!/^[0-9a-f]{64}$/.test(expectedHash)) {
              core.setFailed('expected_bundle_sha256 must be an exact SHA-256');
              return;
            }

            const absolutePath = path.resolve(process.cwd(), bundlePath);
            const root = path.resolve(process.cwd(), 'docs/architecture');
            if (!absolutePath.startsWith(root + path.sep)) {
              core.setFailed('resolved bundle path escaped docs/architecture');
              return;
            }
            const raw = fs.readFileSync(absolutePath);
            const actualHash = crypto.createHash('sha256').update(raw).digest('hex');
            if (actualHash !== expectedHash) {
              core.setFailed(`bundle SHA mismatch: expected ${expectedHash}, got ${actualHash}`);
              return;
            }

            const bundle = JSON.parse(raw.toString('utf8'));
            if (bundle.schemaVersion !== 'sovereign.manifest-open-issues.v1' || !Array.isArray(bundle.issues)) {
              core.setFailed('unsupported issue bundle schema');
              return;
            }
            if (bundle.issues.length < 1 || bundle.issues.length > 40) {
              core.setFailed('issue bundle size is outside the bounded range');
              return;
            }

            const allIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });
            const created = [];
            const reused = [];
            const seenKeys = new Set();

            const bullets = (items) => (items || []).map((item) => `- ${item}`).join('\n');
            const numbered = (items) => (items || []).map((item, index) => `${index + 1}. ${item}`).join('\n');

            for (const item of bundle.issues) {
              const key = String(item.key || '').trim();
              const title = String(item.title || '').trim();
              if (!/^[a-z0-9][a-z0-9-]{2,80}$/.test(key) || seenKeys.has(key)) {
                core.setFailed(`invalid or duplicate issue key: ${key}`);
                return;
              }
              seenKeys.add(key);
              if (title.length < 12 || title.length > 200) {
                core.setFailed(`invalid title length for ${key}`);
                return;
              }
              for (const field of ['evidence', 'goal', 'example']) {
                if (typeof item[field] !== 'string' || item[field].trim().length < 8) {
                  core.setFailed(`missing ${field} for ${key}`);
                  return;
                }
              }
              for (const field of ['paths', 'rules', 'workflow', 'integrationPlan', 'acceptance']) {
                if (!Array.isArray(item[field]) || item[field].length < 1) {
                  core.setFailed(`missing ${field} list for ${key}`);
                  return;
                }
              }

              const marker = `<!-- sovereign-manifest-issue:${key} -->`;
              const matches = allIssues.filter((candidate) => !candidate.pull_request && String(candidate.body || '').includes(marker));
              if (matches.length > 1) {
                core.setFailed(`multiple issues already contain marker ${key}`);
                return;
              }
              if (matches.length === 1) {
                reused.push({ key, number: matches[0].number, url: matches[0].html_url });
                continue;
              }

              const body = [
                marker,
                '',
                `**Audit-Baseline:** \`${bundle.auditBaseline}\``,
                '',
                '## Ausgangslage',
                '',
                item.evidence.trim(),
                '',
                '## Ziel',
                '',
                item.goal.trim(),
                '',
                '## Relevante Pfade und Dateien',
                '',
                bullets(item.paths),
                '',
                '## Verbindliche Regeln',
                '',
                bullets(item.rules),
                '',
                '## Arbeitsablauf',
                '',
                numbered(item.workflow),
                '',
                '## Integrationsplan',
                '',
                numbered(item.integrationPlan),
                '',
                '## Beispielcode / Vertragsform',
                '',
                '```text',
                item.example.trim(),
                '```',
                '',
                '## Akzeptanzkriterien',
                '',
                bullets(item.acceptance),
                '',
                '## Abschlussvertrag',
                '',
                '- Keine Statusänderung auf `BELEGT`, bevor Tests, CI-Gates und erforderliche Live-Canaries am exakten unveränderten Head grün sind.',
                '- `docs/SOVEREIGN_ARCHITECTURE_MANIFEST.md` bei Abschluss in Abschnitt 24.2, 25.1 und 26 aktualisieren.',
                '- Vor Merge `repository_revision_resolve` gegen den exakten PR-Head ausführen und nach Merge die neue `main`-Revision erneut ermitteln.',
                '- PR-Head, Merge-SHA, relevante Workflow-Runs, immutable Digest/Runtime-Evidence und Rollbackbezug dokumentieren.',
                '- Keine Secrets, Tokens, Providerantworten oder personenbezogenen Inhalte in Issue, Logs, Tests oder Manifest aufnehmen.',
                '',
              ].join('\n');

              if (body.length > 60000) {
                core.setFailed(`issue body too large for ${key}`);
                return;
              }
              const response = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
              created.push({ key, number: response.data.number, url: response.data.html_url });
              allIssues.push(response.data);
            }

            const rows = [
              [{ data: 'Key', header: true }, { data: 'Issue', header: true }, { data: 'Result', header: true }],
              ...created.map((entry) => [entry.key, `#${entry.number}`, 'created']),
              ...reused.map((entry) => [entry.key, `#${entry.number}`, 'existing']),
            ];
            await core.summary
              .addHeading('Architecture manifest issues')
              .addRaw(`Bundle SHA-256: \`${actualHash}\`\n\n`)
              .addTable(rows)
              .write();

            core.setOutput('created_count', String(created.length));
            core.setOutput('existing_count', String(reused.length));
            core.setOutput('bundle_sha256', actualHash);
            core.setOutput('issue_map_json', JSON.stringify([...created, ...reused]));
