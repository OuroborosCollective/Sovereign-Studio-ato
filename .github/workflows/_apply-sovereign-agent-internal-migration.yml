name: Apply Sovereign Agent Internal Runtime Migration

on:
  push:
    branches:
      - refactor/sovereign-agent-internal-runtime-v2
    paths:
      - 'scripts/patches/apply_sovereign_agent_internal_migration.py'
      - 'scripts/patches/finalize_sovereign_agent_internal_contract.py'
      - '.github/workflows/_apply-sovereign-agent-internal-migration.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/patches/apply_sovereign_agent_internal_migration.py'
      - 'scripts/patches/finalize_sovereign_agent_internal_contract.py'
      - '.github/workflows/_apply-sovereign-agent-internal-migration.yml'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: sovereign-agent-internal-runtime-migration
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact main base
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          expected='c5d7f83d4282341554bd2d9d94e86a04de5ba9a0'
          actual="$(git merge-base HEAD origin/main)"
          test "$actual" = "$expected" || {
            echo "Main base changed: expected $expected, got $actual" >&2
            exit 1
          }

      - name: Validate and apply deterministic migration
        shell: bash
        run: |
          set +e
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          migration = Path('scripts/patches/apply_sovereign_agent_internal_migration.py')
          content = migration.read_text(encoding='utf-8')
          old = "anchor = 'COPY agent_runtime ./agent_runtime\\n'"
          new = "anchor = 'COPY agent_runtime/ ./agent_runtime/\\n'"
          if content.count(old) != 1:
              raise SystemExit(f'Dockerfile anchor patch expected once, found {content.count(old)}')
          migration.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY
            python -m py_compile \
              scripts/patches/apply_sovereign_agent_internal_migration.py \
              scripts/patches/finalize_sovereign_agent_internal_contract.py
            python scripts/patches/apply_sovereign_agent_internal_migration.py
            python scripts/patches/finalize_sovereign_agent_internal_contract.py
            git diff --check
            node --test scripts/sovereign-agent-internal-live-path.test.mjs
            bash -n scripts/sovereign-backend/auto-migrate.sh
          } > /tmp/sovereign-agent-migration.log 2>&1
          status=$?
          cat /tmp/sovereign-agent-migration.log
          exit $status

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sovereign-agent-migration-diagnostics
          path: /tmp/sovereign-agent-migration.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.12.2 --activate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Runtime contract tests
        run: |
          pnpm exec vitest run \
            src/features/product/runtime/sovereignAgentRuntime.test.ts \
            src/features/product/runtime/sovereignAgentClient.test.ts \
            src/features/product/runtime/sovereignAgentPatternGatewayBridge.test.ts \
            src/features/product/runtime/sovereignRepoEvidenceScopeRuntime.test.ts \
            src/features/product/runtime/agentWorkspaceRuntime.test.ts \
            src/features/product/runtime/workerIntentDetector.test.ts

      - name: Capability router tests
        run: pnpm exec vitest run src/features/product/runtime/sovereignCapabilityRouter.test.ts

      - name: Tool capability tests
        run: pnpm exec vitest run src/features/product/runtime/sovereignToolCapabilityRuntime.test.ts

      - name: Executor runtime tests
        run: pnpm exec vitest run src/features/product/runtime/sovereignExecutorRuntime.test.ts

      - name: Internal operator tests
        run: pnpm exec vitest run src/runtime/sovereignInternalOperatorRuntime.test.ts

      - name: Truth card tests
        run: pnpm exec vitest run src/features/product/components/SovereignAgentJobTruthCard.test.tsx

      - name: Builder integration tests
        run: pnpm exec vitest run src/features/product/containers/BuilderContainer.test.tsx

      - name: Build web product
        run: pnpm exec vite build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r scripts/sovereign-backend/requirements.txt pytest

      - name: Run backend runtime tests
        shell: bash
        run: |
          python -m py_compile backend/agent_runtime/*.py backend/agent_runtime/tools/*.py
          python -m py_compile scripts/sovereign-backend/app.py scripts/sovereign-backend/agent_runtime/*.py scripts/sovereign-backend/agent_runtime/tools/*.py
          pytest backend/tests scripts/sovereign-backend/tests -q
          diff -qr backend/agent_runtime scripts/sovereign-backend/agent_runtime --exclude='__pycache__' --exclude='*.pyc'

      - name: Commit verified product migration
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/patches/apply_sovereign_agent_internal_migration.py
          rm -f scripts/patches/finalize_sovereign_agent_internal_contract.py
          rm -f .github/workflows/_apply-sovereign-agent-internal-migration.yml
          rm -f migration-diagnostic.txt
          git add -A
          git diff --cached --check
          test -n "$(git status --porcelain)" || {
            echo 'Migration produced no changes.' >&2
            exit 1
          }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'refactor(agent): make Sovereign runtime internal-only'
          git push origin HEAD:refactor/sovereign-agent-internal-runtime-v2

  builder-diagnostic:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm and install
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.12.2 --activate
          pnpm install --frozen-lockfile --reporter=silent

      - name: Apply same migration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          migration = Path('scripts/patches/apply_sovereign_agent_internal_migration.py')
          content = migration.read_text(encoding='utf-8')
          old = "anchor = 'COPY agent_runtime ./agent_runtime\\n'"
          new = "anchor = 'COPY agent_runtime/ ./agent_runtime/\\n'"
          if content.count(old) != 1:
              raise SystemExit(f'Dockerfile anchor patch expected once, found {content.count(old)}')
          migration.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY
          python scripts/patches/apply_sovereign_agent_internal_migration.py >/dev/null
          python scripts/patches/finalize_sovereign_agent_internal_contract.py >/dev/null

      - name: Build compact Builder diagnostic
        id: builder-test
        shell: bash
        run: |
          set +e
          pnpm exec vitest run src/features/product/containers/BuilderContainer.test.tsx \
            --reporter=json --outputFile=/tmp/builder-results.json >/dev/null 2>&1
          status=$?
          node - <<'NODE' | tee /tmp/builder-failures.txt
          const fs = require('fs');
          const file = '/tmp/builder-results.json';
          if (!fs.existsSync(file)) {
            console.log('Builder JSON result missing.');
            process.exit(0);
          }
          const data = JSON.parse(fs.readFileSync(file, 'utf8'));
          const failed = [];
          for (const suite of data.testResults || []) {
            for (const result of suite.assertionResults || []) {
              if (result.status === 'failed') {
                failed.push({
                  name: [...(result.ancestorTitles || []), result.title].filter(Boolean).join(' > '),
                  messages: result.failureMessages || [],
                });
              }
            }
          }
          console.log(`BUILDER_FAILED_TESTS=${failed.length}`);
          for (const item of failed) {
            console.log(`TEST: ${item.name}`);
            for (const message of item.messages) console.log(message);
          }
          NODE
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Upload compact Builder diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compact-builder-diagnostic
          path: /tmp/builder-failures.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce Builder result
        if: always()
        shell: bash
        run: test '${{ steps.builder-test.outputs.status }}' = '0'

  builder-diagnostic-output:
    needs: builder-diagnostic
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Download compact Builder diagnostic
        uses: actions/download-artifact@v4
        with:
          name: compact-builder-diagnostic
          path: /tmp/builder-diagnostic
      - name: Print compact Builder diagnostic
        shell: bash
        run: cat /tmp/builder-diagnostic/builder-failures.txt
