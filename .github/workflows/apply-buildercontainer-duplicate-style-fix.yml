name: Apply BuilderContainer Duplicate Style Fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-buildercontainer-duplicate-style-fix.yml
  workflow_dispatch:

permissions:
  contents: write

env:
  TARGET_FILE: src/features/product/containers/BuilderContainer.tsx

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch duplicate textarea style attribute
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/features/product/containers/BuilderContainer.tsx')
          text = path.read_text(encoding='utf-8')

          old = """          style={{
            flex: 1, background: 'transparent', border: 'none', outline: 'none',
            fontFamily: 'system-ui, -apple-system, sans-serif',
            fontSize: 14, lineHeight: 1.5, color: C.text,
            resize: 'none', maxHeight: 120, minHeight: 24,
            overflowY: 'auto',
          }}
          style={{
            // Placeholder color via CSS variable fallback
            '--placeholder-color': C.textMuted,
          } as React.CSSProperties}
"""

          new = """          style={{
            flex: 1,
            background: 'transparent',
            border: 'none',
            outline: 'none',
            fontFamily: 'system-ui, -apple-system, sans-serif',
            fontSize: 14,
            lineHeight: 1.5,
            color: C.text,
            resize: 'none',
            maxHeight: 120,
            minHeight: 24,
            overflowY: 'auto',
            '--placeholder-color': C.textMuted,
          } as React.CSSProperties}
"""

          if old not in text:
            raise SystemExit('Expected duplicate textarea style block was not found; refusing broad rewrite.')

          updated = text.replace(old, new, 1)

          if updated.count("style={{\n            // Placeholder color via CSS variable fallback"):
            raise SystemExit('Duplicate placeholder style block still exists after patch.')

          path.write_text(updated, encoding='utf-8')
          PY

      - name: Verify duplicate style is gone
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('src/features/product/containers/BuilderContainer.tsx').read_text(encoding='utf-8')
          marker = "textarea\n          ref={textareaRef}"
          if marker not in text:
            raise SystemExit('Textarea marker missing after patch.')
          if "style={{\n            flex: 1, background: 'transparent'" in text and "style={{\n            // Placeholder color" in text:
            raise SystemExit('Duplicate textarea style attributes remain.')
          print('BuilderContainer duplicate textarea style attribute fixed.')
          PY

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$TARGET_FILE"
          if git diff --cached --quiet; then
            echo "No file changes to commit."
            exit 0
          fi
          git commit -m "fix(ui): remove duplicate builder textarea style"
          git push
