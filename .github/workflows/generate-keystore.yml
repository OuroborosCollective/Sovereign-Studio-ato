name: "Setup: Generate Keystore (Run Once)"

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Password for the keystore'
        required: true
      key_password:
        description: 'Password for the key'
        required: true

jobs:
  generate:
    name: Generate Android Keystore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Generate Keystore and Base64 String
        run: |
          # Generiert den Keystore mit den im Release-Workflow erwarteten Alias und Passwörtern
          # Using environment variables to pass passwords securely to keytool
          export STORE_PASS="${{ github.event.inputs.keystore_password }}"
          export KEY_PASS="${{ github.event.inputs.key_password }}"
          keytool -genkey -v -keystore release.jks -alias sovereign_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass:env STORE_PASS -keypass:env KEY_PASS -dname "CN=Sovereign, OU=Dev, O=App, C=DE"
          
          # Erstellt die Base64-Version ohne Zeilenumbrüche für GitHub Secrets
          base64 release.jks | tr -d '\n' > keystore_base64.txt

          echo "Bitte fügen Sie die folgenden Secrets zu Ihrem GitHub Repository hinzu:"
          echo "ANDROID_KEYSTORE_BASE64: Inhalt von keystore_base64.txt"
          echo "ANDROID_KEY_ALIAS: sovereign_alias"
          echo "ANDROID_KEYSTORE_PASSWORD: $STORE_PASS"
          echo "ANDROID_KEY_PASSWORD: $KEY_PASS"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Keystore-Files
          path: |
            release.jks
            keystore_base64.txt
          retention-days: 1
