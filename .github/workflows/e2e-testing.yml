name: Sovereign E2E Smoke

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'android/**'
      - 'tests/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'capacitor.config.*'
      - '.github/workflows/e2e-testing.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'android/**'
      - 'tests/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'capacitor.config.*'
      - '.github/workflows/e2e-testing.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.12.2'
  CI: 'true'
  VITE_SOVEREIGN_LLM_PROXY_URL: https://sovereign-llm-proxy.projectouroboroscollective.workers.dev
  VITE_SOVEREIGN_LLM_MODEL: deepseek-r1

concurrency:
  group: sovereign-e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: Current App E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build web and sync Android handoff
        shell: bash
        run: pnpm run build

      - name: Install Playwright browsers
        shell: bash
        run: pnpm exec playwright install chromium

      - name: Run artifact smoke gate
        shell: bash
        run: pnpm run test:artifact-smoke

      - name: Run Playwright smoke gate
        shell: bash
        run: pnpm run test:e2e

      - name: Write E2E smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Sovereign E2E Smoke"
            echo ""
            echo "- Scope: current Android-first web/Capacitor app"
            echo "- Artifact Gate: pnpm run test:artifact-smoke (validates build handoff)"
            echo "- Browser Gate: pnpm run test:e2e (Playwright smoke tests)"
            echo "- Legacy RN path retired: sovereign-studio-rn/** is no longer required"
          } >> "$GITHUB_STEP_SUMMARY"
