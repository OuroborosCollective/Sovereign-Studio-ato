name: Deploy Cloudflare Worker AI Proxy

on:
  push:
    branches:
      - main
    paths:
      - 'cloudflare-worker-ai-proxy/**'
  workflow_dispatch:
    inputs:
      deploy_reason:
        description: 'Deployment reason'
        required: false
        default: 'Manual deployment'

jobs:
  deploy-worker:
    name: Deploy LLM Proxy
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd cloudflare-worker-ai-proxy
          npm install

      - name: Deploy to Cloudflare Workers
        env:
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd cloudflare-worker-ai-proxy
          echo "$CF_AI_TOKEN" | npx wrangler secret put CF_AI_TOKEN --name sovereign-llm-proxy
          echo "$CF_ACCOUNT_ID" | npx wrangler secret put CF_ACCOUNT_ID --name sovereign-llm-proxy
          npx wrangler deploy

      - name: Get Worker URL
        run: |
          echo "✅ Worker deployed successfully!"
          echo "Worker URL: https://sovereign-llm-proxy.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
          
      - name: Test Worker API
        run: |
          curl -X POST "https://sovereign-llm-proxy.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "@cf/meta/llama-3-8b-instruct",
              "messages": [{"role": "user", "content": "Say hello in one word"}]
            }' | head -c 500
