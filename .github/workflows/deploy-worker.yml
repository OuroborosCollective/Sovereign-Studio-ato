name: Deploy Cloudflare Worker AI Proxy

on:
  push:
    branches:
      - main
    paths:
      - 'cloudflare-worker-ai-proxy/**'
  workflow_dispatch:

jobs:
  deploy-worker:
    name: Deploy LLM Proxy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            cd cloudflare-worker-ai-proxy
            printf '%s' "$CF_AI_TOKEN" | wrangler secret put CF_AI_TOKEN
            printf '%s' "$CF_ACCOUNT_ID" | wrangler secret put CF_ACCOUNT_ID
            wrangler deploy
        env:
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
