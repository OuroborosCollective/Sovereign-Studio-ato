name: Marketing Engine

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Android Release"]
    types:
      - completed

permissions:
  contents: read
  actions: write

concurrency:
  group: marketing-engine
  cancel-in-progress: false

jobs:
  marketing-dry-run:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'launch-bot-v1/package.json'

      - name: Validate Required Secrets
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_SERVICE_KEY: ${{ secrets.DB_SERVICE_KEY }}
        run: |
          echo "Validating autonomous marketing environment..."

          test -n "$AI_API_KEY" || (echo "Missing AI_API_KEY" && exit 1)
          test -n "$DB_URL" || (echo "Missing DB_URL" && exit 1)
          test -n "$DB_SERVICE_KEY" || (echo "Missing DB_SERVICE_KEY" && exit 1)

          echo "Environment validation complete"

      - name: Generate Safe Marketing Context
        run: |
          mkdir -p marketing-output

          echo '{"status":"dry-run","mode":"safe","posting":"disabled"}' > marketing-output/status.json

          echo "Ghost Pilot marketing foundation initialized"

      - name: Upload Dry Run Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marketing-engine-dry-run
          path: marketing-output/
