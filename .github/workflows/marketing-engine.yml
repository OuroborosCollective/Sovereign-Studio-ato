name: Marketing Engine

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Android Release"]
    types:
      - completed

permissions:
  contents: read
  actions: write

concurrency:
  group: marketing-engine
  cancel-in-progress: false

jobs:
  marketing-dry-run:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'launch-bot-v1/package.json'

      - name: Install Dependencies
        working-directory: ./launch-bot-v1
        run: npm install --no-package-lock --ignore-scripts

      - name: Run Marketing Content Generator
        working-directory: ./launch-bot-v1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Use first 5 beta codes from promo-codes.txt
          BETA_CODES=$(head -5 ./marketing/promo-codes.txt 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          echo "Using beta codes: $BETA_CODES"
          node marketing/generate-posts.js "$BETA_CODES"

      - name: Upload Generated Content
        uses: actions/upload-artifact@v4
        with:
          name: marketing-engine-dry-run
          path: marketing-output/
          retention-days: 7
