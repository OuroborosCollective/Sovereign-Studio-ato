name: Marketing Engine

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Android Release"]
    types:
      - completed

permissions:
  contents: read
  actions: write

concurrency:
  group: marketing-engine
  cancel-in-progress: false

jobs:
  marketing-dry-run:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'launch-bot-v1/package.json'

      - name: Generate Safe Marketing Context
        run: |
          mkdir -p marketing-output

          echo '{"status":"dry-run","mode":"safe","posting":"disabled"}' > marketing-output/status.json

          echo "Ghost Pilot marketing foundation initialized"

      - name: Upload Dry Run Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marketing-engine-dry-run
          path: marketing-output/
