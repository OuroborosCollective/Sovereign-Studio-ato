name: Runtime Trace Contract Check

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.12.2"
  CI: "true"

jobs:
  check:
    name: RuntimeIntelligence trace contract
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Run trace contract test
        shell: bash
        run: pnpm exec vitest run src/runtime/RuntimeIntelligence.test.ts --runInBand
