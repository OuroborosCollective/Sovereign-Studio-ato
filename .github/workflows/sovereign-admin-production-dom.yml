name: Sovereign Admin Production DOM Gate

on:
  workflow_dispatch:
    inputs:
      expected_revision:
        description: Exact deployed 40-character backend revision
        required: true
        type: string
      base_url:
        description: Backend origin serving the canonical /admin surface
        required: true
        type: string
        default: https://sovereign-backend.arelorian.de
  workflow_call:
    inputs:
      expected_revision:
        description: Exact deployed 40-character backend revision
        required: true
        type: string
      base_url:
        description: Backend origin serving the canonical /admin surface
        required: false
        type: string
        default: https://sovereign-backend.arelorian.de
    secrets:
      SOVEREIGN_ADMIN_E2E_KEY:
        required: true

permissions:
  contents: read

concurrency:
  group: sovereign-admin-production-dom-${{ inputs.expected_revision }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.12.2'
  CI: 'true'
  SOVEREIGN_EXPECTED_REVISION: ${{ inputs.expected_revision }}
  SOVEREIGN_ADMIN_E2E_BASE_URL: ${{ inputs.base_url }}
  SOVEREIGN_ADMIN_E2E_KEY: ${{ secrets.SOVEREIGN_ADMIN_E2E_KEY }}

jobs:
  production-admin-dom:
    name: Exact revision React admin DOM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate revision-bound inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$SOVEREIGN_EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "expected_revision must be one exact lowercase 40-character commit SHA" >&2
            exit 1
          fi
          if [[ ! "$SOVEREIGN_ADMIN_E2E_BASE_URL" =~ ^https://[^[:space:]]+$ ]]; then
            echo "base_url must be an HTTPS origin" >&2
            exit 1
          fi
          if [ -z "$SOVEREIGN_ADMIN_E2E_KEY" ]; then
            echo "Missing protected secret: SOVEREIGN_ADMIN_E2E_KEY" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        shell: bash
        run: pnpm exec playwright install chromium --with-deps

      - name: Verify real production DOM for exact revision
        shell: bash
        run: pnpm exec playwright test --config=playwright.admin-production.config.ts

      - name: Upload failed DOM evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-production-dom-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Report revision-bound result
        if: always()
        shell: bash
        run: |
          {
            echo "## Sovereign Admin Production DOM Gate"
            echo ""
            echo "- Expected revision: \`$SOVEREIGN_EXPECTED_REVISION\`"
            echo "- Origin: \`$SOVEREIGN_ADMIN_E2E_BASE_URL\`"
            echo "- Producer header required: \`X-Sovereign-Admin-Surface: react\`"
            echo "- Required DOM: React admin, Free Revolver, FreeLLM managed-provider registration"
            echo "- Browser/API mocks: none"
          } >> "$GITHUB_STEP_SUMMARY"
