name: 🔄 Auto-Run Until Real Success

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'sovereign-studio-rn/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

env:
  NODE_VERSION: '22'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ============================================
  # REAL APP VERIFICATION - The only true test
  # ============================================
  app-verification:
    name: 🧪 App Verification (Real Test)
    runs-on: ubuntu-latest
    timeout-minutes: 600
    outputs:
      verification_id: ${{ steps.verify.outputs.verification_id }}
      success: ${{ steps.verify.outputs.success }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sovereign-studio-rn/package-lock.json

      - name: Install dependencies
        run: |
          cd sovereign-studio-rn
          npm ci

      # ============================================
      # RUN APP VERIFICATION - The REAL test
      # ============================================
      - name: 🧪 Run App Verification
        id: verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd sovereign-studio-rn
          
          echo "========================================"
          echo "🧪 SOVEREIGN STUDIO APP VERIFICATION"
          echo "========================================"
          echo ""
          echo "This is the REAL test - not just unit tests."
          echo "We verify that the app can ACTUALLY WORK:"
          echo "  1. Generate code ✅"
          echo "  2. Create files ✅"
          echo "  3. Push to GitHub ✅"
          echo ""
          
          # Run app verification
          node scripts/verify-app.js
          
          # Check if files were created
          VERIFICATION_ID=$(ls e2e/app-verify/verify_*.ts 2>/dev/null | head -1 | sed 's/.ts$//' | xargs basename 2>/dev/null || echo "")
          
          if [ -n "$VERIFICATION_ID" ]; then
            echo ""
            echo "✅ Verification file created: $VERIFICATION_ID"
            echo "verification_id=$VERIFICATION_ID" >> $GITHUB_OUTPUT
            echo "success=true" >> $GITHUB_OUTPUT
            echo "APP_SUCCESS=true" >> $GITHUB_ENV
          else
            echo ""
            echo "❌ Verification file NOT created"
            echo "verification_id=none" >> $GITHUB_OUTPUT
            echo "success=false" >> $GITHUB_OUTPUT
            echo "APP_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: 📊 Show Final Status
        run: |
          echo ""
          echo "========================================"
          echo "📊 FINAL STATUS"
          echo "========================================"
          echo "   App Can Generate Code: ${APP_SUCCESS:-false}"
          echo ""
          
          if [ "${APP_SUCCESS}" == "true" ]; then
            echo "✅ APP VERIFICATION: PASSED"
            echo "   Sovereign Studio can generate and push code!"
          else
            echo "❌ APP VERIFICATION: FAILED"
            echo "   Sovereign Studio cannot produce output!"
          fi

  # ============================================
  # AUTO-FIX IF APP VERIFICATION FAILED
  # ============================================
  auto-fix:
    name: 🔧 Auto-Fix (if verification failed)
    needs: app-verification
    if: needs.app-verification.outputs.success == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd sovereign-studio-rn
          npm ci

      - name: 🔧 Run Self-Learning Auto-Fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd sovereign-studio-rn
          
          echo "========================================"
          echo "🔧 AUTO-FIX MODE ACTIVATED"
          echo "========================================"
          echo ""
          echo "App verification failed. Running auto-fix..."
          echo "This will run until the app can successfully"
          echo "generate and push code."
          echo ""
          
          # Run self-learning cycle
          npx tsx e2e/self-learn/self-learning-orchestrator.ts run || true
          
          # Run auto-fix loop (unlimited)
          npx tsx e2e/auto-fix/auto-fix-loop.ts --max=Infinity --verbose || true
          
          echo ""
          echo "🔄 Auto-fix complete. Committing changes..."

      - name: 📤 Commit and Push Fixes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd sovereign-studio-rn
          
          git config --local user.email "auto-fix@sovereign-studio.dev"
          git config --local user.name "Auto-Fix Bot"
          
          # Stage all changes
          git add -A
          
          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔧 Auto-fix: Iterative improvements

- Applied self-learning fixes
- Updated code generation
- Improved GitHub integration

Co-authored-by: Auto-Fix Bot <auto-fix@sovereign-studio.dev>"
            
            # Push
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/OuroborosCollective/Sovereign-Studio-ato.git HEAD:feature/app-verification
            echo "✅ Pushed fixes - workflow will restart automatically"
          fi

  # ============================================
  # SUCCESS - APP CAN WORK
  # ============================================
  success:
    name: ✅ App Verified - Working!
    needs: app-verification
    if: needs.app-verification.outputs.success == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🎉 Report Success
        run: |
          echo "========================================"
          echo "🎉 APP VERIFICATION SUCCESSFUL!"
          echo "========================================"
          echo ""
          echo "✅ Sovereign Studio CAN:"
          echo "   - Generate code ✅"
          echo "   - Create files ✅"
          echo "   - Push to GitHub ✅"
          echo ""
          echo "Verification ID: ${{ needs.app-verification.outputs.verification_id }}"
          echo ""
          echo "🟢 THE APP IS WORKING!"

      - name: 📝 Create Success Marker
        run: |
          cd sovereign-studio-rn
          mkdir -p e2e/app-verify
          echo "# ✅ APP VERIFICATION SUCCESS
          
**Date:** $(date -Iseconds)
**Status:** OPERATIONAL
**Verification ID:** ${{ needs.app-verification.outputs.verification_id }}

The Sovereign Studio app has been verified to work correctly.
" > e2e/app-verify/SUCCESS.md
          
          git config --local user.email "verification@sovereign-studio.dev"
          git config --local user.name "Sovereign Studio"
          git add e2e/app-verify/
          git commit -m "✅ Mark verification success"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/OuroborosCollective/Sovereign-Studio-ato.git HEAD:feature/app-verification || true

  # ============================================
  # FAILURE - APP CANNOT WORK
  # ============================================
  failure:
    name: ❌ App Failed - Needs Fix
    needs: app-verification
    if: always() && needs.app-verification.outputs.success == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Generate Failure Report
        run: |
          echo "========================================"
          echo "❌ APP VERIFICATION FAILED"
          echo "========================================"
          echo ""
          echo "The Sovereign Studio app cannot:"
          echo "   ❌ Generate code"
          echo "   ❌ Create files"
          echo "   ❌ Push to GitHub"
          echo ""
          echo "This is more serious than test failures."
          echo "The app itself needs to be fixed."
          echo ""
          echo "⏳ Auto-fix workflow will trigger..."

      - name: 📢 Report Failure
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ App Verification Failed

### 🔍 Real App Test Results

| Test | Result |
|------|--------|
| Code Generation | ❌ FAILED |
| File Creation | ❌ FAILED |
| GitHub Push | ❌ FAILED |

### ⚠️ Critical Issue

The app **cannot produce working output**. This is more serious
than test failures - the app itself needs fixing.

🔄 **Auto-Fix Mode** will now run until the app can:
1. Generate code
2. Create files
3. Push to GitHub

This may take several iterations. Please wait...
`
            })