name: Sovereign ChatGPT MCP

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/sovereign-chatgpt-mcp/**'
      - 'deploy/sovereign-litellm/**'
      - '.github/workflows/sovereign-chatgpt-mcp.yml'
  push:
    branches: [main]
    paths:
      - 'tools/sovereign-chatgpt-mcp/**'
      - 'deploy/sovereign-litellm/**'
      - '.github/workflows/sovereign-chatgpt-mcp.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: ghcr.io/ouroboroscollective/sovereign-chatgpt-mcp
  KAPPA_POS: '1000000'
  CROSS_RUNTIME_PARITY: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate MCP operator
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: tools/sovereign-chatgpt-mcp
    env:
      SOVEREIGN_MCP_WORKSPACE_ROOT: /tmp/sovereign-mcp-workspaces
      SOVEREIGN_MCP_HOST: 127.0.0.1
      SOVEREIGN_MCP_PORT: '8090'
      SOVEREIGN_MCP_REPOSITORY: OuroborosCollective/Sovereign-Studio-ato
      SOVEREIGN_ANDROID_NATIVE_BUILD_MODE: github_actions
      SOVEREIGN_KAPPA_POS: '1000000'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/sovereign-chatgpt-mcp/requirements.txt

      - name: Setup Node.js parity runtime
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Validate deterministic constants
        run: |
          set -euo pipefail
          test "${KAPPA_POS}" = '1000000'
          [[ "${KAPPA_POS}" =~ ^[1-9][0-9]*$ ]]
          python - <<'PY'
          import os

          kappa_pos = int(os.environ['KAPPA_POS'])
          assert kappa_pos == 1_000_000
          assert str(kappa_pos) == os.environ['SOVEREIGN_KAPPA_POS']
          print({'kappa_pos': kappa_pos, 'deterministic_constant': True})
          PY

      - name: Compile Python runtime
        run: python -m py_compile policy.py runtime.py database.py command_contract.py command_queue.py command_worker.py operations.py admin_mode.py github_admin.py self_update.py broker.py broker_client.py owner_input_client.py a2a_runtime_client.py document_pipeline.py owner_input_widget.py self_heal.py litellm_stack.py managed_compose.py patchmon_operator.py android_hardening.py android_validation_router.py mcp_protocol_health.py sovereign_cognitive_widget.py repository_skill_tools.py proven_learning_tools.py skill_supply_chain_tools.py deterministic_contract.py deterministic_architecture_tools.py enterprise_backend_tools.py freemium_product_architect_tools.py openai_project_access_tools.py operational_governance_tools.py operational_assurance_tools.py server.py tool_extensions.py launcher.py templates/sovereign-litellm/sovereign-entrypoint.py ../../deploy/sovereign-litellm/sovereign-entrypoint.py

      - name: Validate fixed shell and systemd assets
        run: |
          set -euo pipefail
          bash -n deploy/deploy-sovereign-backend
          bash -n deploy/rollback-sovereign-backend
          bash -n deploy/bootstrap-database.sh
          bash -n deploy/install-secure-tunnel.sh
          bash -n deploy/self-update-chatgpt-mcp.sh
          bash -n deploy/install-on-vps.sh
          if grep -n 'curl ' deploy/deploy-sovereign-backend deploy/rollback-sovereign-backend deploy/install-secure-tunnel.sh deploy/sovereign-openai-tunnel.service; then
            echo 'Operator deployment path must not depend on curl.' >&2
            exit 1
          fi
          grep -q 'admin_mode.py' deploy/install-on-vps.sh
          grep -q 'github_admin.py' deploy/install-on-vps.sh
          grep -q 'android_hardening.py' deploy/install-on-vps.sh
          grep -q 'android_validation_router.py' deploy/install-on-vps.sh
          grep -q 'mcp_protocol_health.py' deploy/install-on-vps.sh
          grep -q 'sovereign_cognitive_widget.py' deploy/install-on-vps.sh
          grep -q 'command_contract.py' deploy/install-on-vps.sh
          grep -q 'command_queue.py' deploy/install-on-vps.sh
          grep -q 'command_worker.py' deploy/install-on-vps.sh
          grep -q 'owner_input_client.py' deploy/install-on-vps.sh
          grep -q 'a2a_runtime_client.py' deploy/install-on-vps.sh
          grep -q 'document_pipeline.py' deploy/install-on-vps.sh
          grep -q 'owner_input_widget.py' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_OWNER_REQUEST_KEY' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_BACKEND_INTERNAL_URL' deploy/install-on-vps.sh
          grep -q 'sovereign-chatgpt-command-worker.service' deploy/install-on-vps.sh
          grep -q 'tool_extensions.py' deploy/install-on-vps.sh
          grep -q 'repository_skill_tools.py' deploy/install-on-vps.sh
          grep -q 'proven_learning_tools.py' deploy/install-on-vps.sh
          grep -q 'skill_supply_chain_tools.py' deploy/install-on-vps.sh
          grep -q 'enterprise_backend_tools.py' deploy/install-on-vps.sh
          grep -q 'freemium_product_architect_tools.py' deploy/install-on-vps.sh
          grep -q 'openai_project_access_tools.py' deploy/install-on-vps.sh
          grep -q 'operational_governance_tools.py' deploy/install-on-vps.sh
          grep -q 'operational_assurance_tools.py' deploy/install-on-vps.sh
          test -f skills/sovereign-operational-governance/SKILL.md
          test -f skills/sovereign-operational-assurance/SKILL.md
          grep -q 'launcher.py' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_ADMIN_SQL' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_MAIN_PUSH' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_PR_MERGE' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_WORKFLOW_CONTROL' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_SELF_UPDATE' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_COMPOSE_WRITE' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_PATCHMON_PATCH_WRITE' deploy/install-on-vps.sh
          grep -q 'PATCHMON_MCP_ADMIN_TOKEN_FILE=/opt/patchmon-sovereign/mcp-admin.jwt' deploy/install-on-vps.sh
          grep -q 'litellm_stack.py' deploy/install-on-vps.sh
          grep -q 'managed_compose.py' deploy/install-on-vps.sh
          grep -q 'patchmon_operator.py' deploy/install-on-vps.sh
          test -f templates/sovereign-litellm/docker-compose.yml
          test -f templates/sovereign-litellm/config.yaml
          test -f templates/sovereign-litellm/sovereign-entrypoint.py
          test -f templates/pgbackweb-wq5r/docker-compose.yml
          test -f templates/patchmon-sovereign/docker-compose.yml
          test -f templates/code-server-46bq/docker-compose.yml
          cat > /tmp/code-server-test.env <<'EOF'
          PUID='1000'
          PGID='1000'
          TZ='Europe/Berlin'
          PASSWORD='ci-only-password'
          HASHED_PASSWORD=''
          SUDO_PASSWORD=''
          SUDO_PASSWORD_HASH=''
          PROXY_DOMAIN=''
          DEFAULT_WORKSPACE='/config/workspace'
          EOF
          docker compose --project-name code-server-46bq --env-file /tmp/code-server-test.env --file templates/code-server-46bq/docker-compose.yml config --format json > /tmp/code-server-rendered.json
          python - /tmp/code-server-rendered.json <<'PY'
          import json
          import sys
          from pathlib import Path

          rendered = json.loads(Path(sys.argv[1]).read_text('utf-8'))
          service = (rendered.get('services') or {}).get('code-server') or {}
          assert service.get('image') == 'lscr.io/linuxserver/code-server@sha256:dfc5e74083f43f3cb217fedfead149f32b319ee663744351c001bdc5e4245441', service
          ports = service.get('ports') or []
          assert len(ports) == 1, ports
          assert str(ports[0].get('host_ip') or '') == '127.0.0.1', ports[0]
          assert str(ports[0].get('published') or '') == '32782', ports[0]
          assert str(ports[0].get('target') or '') == '8443', ports[0]
          volumes = service.get('volumes') or []
          assert len(volumes) == 2, volumes
          config_mount = next((item for item in volumes if str(item.get('target') or '') == '/config'), None)
          workspace_mount = next((item for item in volumes if str(item.get('target') or '') == '/config/sovereign-agent-workspaces'), None)
          assert config_mount is not None, volumes
          assert workspace_mount is not None, volumes
          assert str(workspace_mount.get('type') or '') == 'bind', workspace_mount
          assert str(workspace_mount.get('source') or '') == '/opt/sovereign-agent-workspaces', workspace_mount
          named = rendered.get('volumes') or {}
          assert (named.get('code-server-config') or {}).get('name') == 'code-server-46bq_code-server-config', named
          assert service.get('environment', {}).get('PASSWORD') == 'ci-only-password', service.get('environment')
          PY
          rm -f /tmp/code-server-test.env /tmp/code-server-rendered.json
          cmp templates/sovereign-litellm/docker-compose.yml ../../deploy/sovereign-litellm/docker-compose.yml
          cmp templates/sovereign-litellm/config.yaml ../../deploy/sovereign-litellm/config.yaml
          cmp templates/sovereign-litellm/sovereign-entrypoint.py ../../deploy/sovereign-litellm/sovereign-entrypoint.py
          printf 'PG_BACKWEB_DB_PASSWORD=%064d\nPG_BACKWEB_ENCRYPTION_KEY=%064d\n' 0 1 > /tmp/pgbackweb-test.env
          docker compose --project-name pgbackweb-wq5r --env-file /tmp/pgbackweb-test.env --file templates/pgbackweb-wq5r/docker-compose.yml config --format json > /tmp/pgbackweb-rendered.json
          python - /tmp/pgbackweb-rendered.json <<'PY'
          import json
          import sys
          from pathlib import Path

          rendered = json.loads(Path(sys.argv[1]).read_text('utf-8'))
          services = rendered.get('services') or {}
          web_ports = (services.get('pgbackweb') or {}).get('ports') or []
          db_ports = (services.get('db') or {}).get('ports') or []
          assert len(web_ports) == 1, web_ports
          port = web_ports[0]
          assert str(port.get('host_ip') or '') == '127.0.0.1', port
          assert str(port.get('published') or '') == '32829', port
          assert str(port.get('target') or '') == '8085', port
          assert db_ports == [], db_ports
          PY
          rm -f /tmp/pgbackweb-test.env /tmp/pgbackweb-rendered.json
          python - <<'PY'
          from pathlib import Path

          postgres_password = '0' * 64
          redis_password = '1' * 64
          values = {
              'POSTGRES_PASSWORD': postgres_password,
              'REDIS_PASSWORD': redis_password,
              'JWT_SECRET': '2' * 128,
              'SESSION_SECRET': '3' * 128,
              'AI_ENCRYPTION_KEY': '4' * 64,
              'POSTGRES_HOST': 'database',
              'POSTGRES_USER': 'patchmon_user',
              'POSTGRES_DB': 'patchmon_db',
              'DATABASE_URL': f'postgresql://patchmon_user:{postgres_password}@database:5432/patchmon_db',
              'REDIS_HOST': 'redis',
              'REDIS_PORT': '6379',
              'REDIS_DB': '0',
              'GUACD_ADDRESS': 'guacd:4822',
              'CORS_ORIGIN': 'http://127.0.0.1:32830',
              'SERVER_PROTOCOL': 'http',
              'SERVER_HOST': '127.0.0.1',
              'SERVER_PORT': '32830',
              'PORT': '3000',
              'APP_ENV': 'production',
              'TRUST_PROXY': 'false',
              'ENABLE_HSTS': 'false',
              'TZ': 'Europe/Berlin',
              'AGENT_UPDATE_BODY_LIMIT': '5mb',
          }
          Path('/tmp/patchmon-test.env').write_text(
              ''.join(f'{key}={value}\n' for key, value in values.items()),
              'utf-8',
          )
          PY
          docker compose --project-name patchmon-sovereign --env-file /tmp/patchmon-test.env --file templates/patchmon-sovereign/docker-compose.yml config --format json > /tmp/patchmon-rendered.json
          python - /tmp/patchmon-rendered.json <<'PY'
          import json
          import sys
          from pathlib import Path

          rendered = json.loads(Path(sys.argv[1]).read_text('utf-8'))
          services = rendered.get('services') or {}
          assert set(services) == {'server', 'database', 'redis', 'guacd'}, services
          server = services['server']
          server_ports = server.get('ports') or []
          assert len(server_ports) == 1, server_ports
          port = server_ports[0]
          assert str(port.get('host_ip') or '') == '127.0.0.1', port
          assert str(port.get('published') or '') == '32830', port
          assert str(port.get('target') or '') == '3000', port
          assert (services['database'].get('ports') or []) == []
          assert (services['redis'].get('ports') or []) == []
          assert (services['guacd'].get('ports') or []) == []
          assert services['redis'].get('command') == ['redis-server', '/usr/local/etc/redis/redis.conf']
          for service in services.values():
              assert not str(service.get('image') or '').endswith(':latest'), service
          networks = rendered.get('networks') or {}
          assert set(networks) == {'patchmon-internal', 'patchmon-edge'}, networks
          assert networks['patchmon-internal'].get('internal') is True
          PY
          rm -f /tmp/patchmon-test.env /tmp/patchmon-rendered.json
          grep -q '^ExecStart=/usr/bin/python3 /opt/sovereign-chatgpt-tools/broker/broker.py$' deploy/sovereign-chatgpt-broker.service
          grep -q '^EnvironmentFile=/opt/sovereign-chatgpt-tools/broker.env$' deploy/sovereign-chatgpt-broker.service
          grep -q '^ExecStart=/usr/bin/python3 /opt/sovereign-chatgpt-tools/broker/command_worker.py$' deploy/sovereign-chatgpt-command-worker.service
          grep -q '^Environment=SOVEREIGN_MCP_COMMAND_QUEUE=/opt/sovereign-chatgpt-tools/command-queue$' deploy/sovereign-chatgpt-command-worker.service
          grep -q '^ReadWritePaths=.* /opt/sovereign-agent-workspaces ' deploy/sovereign-chatgpt-command-worker.service
          grep -q 'BACKEND_WORKSPACE_HOST_ROOT="/opt/sovereign-agent-workspaces"' deploy/install-on-vps.sh
          grep -q '^RuntimeDirectoryPreserve=yes$' deploy/sovereign-chatgpt-broker.service
          grep -q '^ExecStart=/opt/sovereign-chatgpt-tools/bin/self-update-chatgpt-mcp$' deploy/sovereign-chatgpt-mcp-self-update.service
          grep -q '^StateDirectory=sovereign-chatgpt-self-update$' deploy/sovereign-chatgpt-mcp-self-update.service
          grep -q '^ExecStartPre=/usr/bin/python3 /opt/sovereign-chatgpt-tools/mcp_protocol_health.py ' deploy/sovereign-openai-tunnel.service
          grep -q '^Restart=on-failure$' deploy/sovereign-openai-tunnel.service
          grep -q '^StartLimitIntervalSec=60$' deploy/sovereign-openai-tunnel.service
          grep -q '^StartLimitBurst=3$' deploy/sovereign-openai-tunnel.service
          grep -q 'http://127.0.0.1:8090/mcp' deploy/sovereign-openai-tunnel.service
          if grep -q 'curl ' deploy/sovereign-openai-tunnel.service; then
            echo 'Tunnel health check must not use curl.' >&2
            exit 1
          fi
          if grep -q 'for command in curl ' deploy/install-secure-tunnel.sh; then
            echo 'Tunnel installer must not require curl.' >&2
            exit 1
          fi
          grep -q '^ExecStart=/usr/local/bin/tunnel-client run --profile ${TUNNEL_PROFILE}$' deploy/sovereign-openai-tunnel.service
          grep -q '^EnvironmentFile=/opt/sovereign-chatgpt-tools/tunnel.env$' deploy/sovereign-openai-tunnel.service
          grep -q '^    image: ${SOVEREIGN_MCP_IMAGE:' docker-compose.yml
          grep -q 'docker pull "$MCP_TAGGED_IMAGE"' deploy/install-on-vps.sh
          grep -q 'org.opencontainers.image.revision' deploy/install-on-vps.sh
          if grep -q 'docker compose build' deploy/install-on-vps.sh; then
            echo 'The VPS must not build the MCP image.' >&2
            exit 1
          fi
          if grep -q '"pnpm", "install"' runtime.py; then
            echo 'The running MCP must not install Node dependencies.' >&2
            exit 1
          fi

      - name: Run policy and runtime tests
        run: python -m pytest -q

      - name: Prove Python and TypeScript deterministic parity
        run: |
          set -euo pipefail
          python tests/deterministic_vector_harness.py tests/fixtures/deterministic_contract_vectors.json > /tmp/deterministic-python.json
          node --experimental-strip-types tests/run_deterministic_contract_vectors.ts tests/fixtures/deterministic_contract_vectors.json > /tmp/deterministic-typescript.json
          python - <<'PY'
          import json
          from pathlib import Path

          python_result = json.loads(Path('/tmp/deterministic-python.json').read_text('utf-8'))
          typescript_result = json.loads(Path('/tmp/deterministic-typescript.json').read_text('utf-8'))
          assert python_result == typescript_result, {
              'python': python_result,
              'typescript': typescript_result,
          }
          print({
              'cross_runtime_parity': True,
              'schema_version': python_result['sourceSchemaVersion'],
              'decimal_vectors': len(python_result['decimalVectors']),
              'canonical_vectors': len(python_result['canonicalVectors']),
              'transition_vectors': len(python_result['transitionVectors']),
              'replay_vectors': len(python_result['replayVectors']),
          })
          PY

      - name: Import MCP launcher and inspect contracts
        run: |
          python - <<'PY'
          import launcher
          import enterprise_backend_tools
          import freemium_product_architect_tools
          import operational_assurance_tools
          import operational_governance_tools
          import server
          import self_heal
          import tool_extensions
          assert launcher.mcp is server.mcp
          assert server.runtime.config.repository == 'OuroborosCollective/Sovereign-Studio-ato'
          assert server.broker.socket_path.name == 'operator.sock'
          assert self_heal.REPAIR_ENGINE is not None
          assert getattr(server.android, '_native_validation_router_installed', False) is True
          for name in (
              'postgres_admin_sql',
              'repository_push_main',
              'repository_pr_status',
              'repository_rerun_failed_workflows',
              'repository_merge_pr',
              'android_project_inventory',
              'android_failure_family_scan',
              'android_runtime_evidence_analyze',
              'android_repair_plan',
              'android_run_validation_suite',
              'android_artifact_inspect',
              'mcp_self_update_schedule',
              'mcp_self_update_status',
              'mcp_control_plane_status',
              'mcp_host_command_status',
              'owner_approval_request_create',
              'owner_approval_request_status',
              'litellm_provider_route_activate',
              'owner_approval_widget_open',
              'controller_run_start',
              'controller_run_list',
              'controller_run_status',
              'controller_run_external_event',
              'controller_run_resume',
              'a2a_live_canary',
              'document_pipeline_live_canary',
              'memory_gateway_collection_canary',
              'managed_compose_stack_plan',
              'deploy_managed_compose_stack',
          ):
              assert callable(getattr(server, name)), name
          assert callable(tool_extensions.repository_dispatch_workflow)
          assert callable(tool_extensions.repository_workflow_run_status)
          for name in (
              'backend_engineering_tool_inventory',
              'backend_architecture_assess',
              'backend_stack_select',
              'backend_delivery_plan',
              'backend_api_security_plan',
              'repository_revision_resolve',
          ):
              assert callable(getattr(enterprise_backend_tools, name)), name
          for name in (
              'freemium_product_tool_inventory',
              'freemium_market_opportunity_score',
              'freemium_offer_contract_build',
              'freemium_product_contract_validate',
              'freemium_product_bundle_manifest',
          ):
              assert callable(getattr(freemium_product_architect_tools, name)), name
          for name in (
              'operational_skill_inventory',
              'mcp_tool_contract_registry',
              'tool_recommend_for_mission',
              'mcp_registry_snapshot_verify',
              'evidence_graph_build',
              'schema_migration_reconcile',
              'llm_route_reliability_assess',
              'agent_run_liveness_assess',
              'semantic_intent_boundary_audit',
              'cost_credit_settlement_reconcile',
              'backup_restore_evidence_verify',
              'slo_error_budget_assess',
              'configuration_drift_assess',
              'runtime_runbook_generate',
              'ownership_codeowners_guard',
              'compliance_evidence_export',
          ):
              assert callable(getattr(operational_governance_tools, name)), name
          assurance_names = (
              'operational_assurance_skill_inventory',
              'vps_capacity_resource_pressure_assess',
              'runtime_dependency_health_matrix',
              'outbox_queue_liveness_assess',
              'scheduled_maintenance_coordinate',
              'runtime_topology_change_audit',
              'postgres_query_index_performance_assess',
              'data_integrity_invariant_audit',
              'data_repair_plan_build',
              'vector_memory_consistency_assess',
              'memory_poisoning_provenance_guard',
              'learning_pattern_lifecycle_preview',
              'data_retention_privacy_audit',
              'multi_tenant_isolation_verify',
              'mcp_schema_compatibility_audit',
              'mcp_protocol_conformance_fuzz_plan',
              'tool_permission_minimize',
              'dynamic_execution_containment_audit',
              'skill_capability_coverage_map',
              'skill_lifecycle_deprecation_preview',
              'skill_regression_benchmark',
              'tool_idempotency_verify',
              'owner_approval_policy_evaluate',
              'secret_lifecycle_rotation_assess',
              'secret_literal_triage',
              'sbom_provenance_image_signing_verify',
              'dependency_vulnerability_remediation_plan',
              'authentication_chaos_negative_test_assess',
          )
          for name in assurance_names:
              assert callable(getattr(operational_assurance_tools, name)), name
          assurance_inventory = operational_assurance_tools.operational_assurance_skill_inventory()
          assert assurance_inventory.status == 'OPERATIONAL_ASSURANCE_SKILLS_READY', assurance_inventory
          tool_names = {tool.name for tool in server.mcp._tool_manager.list_tools()}
          assert {
              'backend_engineering_tool_inventory',
              'backend_architecture_assess',
              'backend_stack_select',
              'backend_delivery_plan',
              'backend_api_security_plan',
              'repository_revision_resolve',
          }.issubset(tool_names)
          assert {
              'freemium_product_tool_inventory',
              'freemium_market_opportunity_score',
              'freemium_offer_contract_build',
              'freemium_product_contract_validate',
              'freemium_product_bundle_manifest',
          }.issubset(tool_names)
          assert {
              'operational_skill_inventory',
              'mcp_tool_contract_registry',
              'tool_recommend_for_mission',
              'mcp_registry_snapshot_verify',
              'evidence_graph_build',
              'schema_migration_reconcile',
              'llm_route_reliability_assess',
              'agent_run_liveness_assess',
              'semantic_intent_boundary_audit',
              'cost_credit_settlement_reconcile',
              'backup_restore_evidence_verify',
              'slo_error_budget_assess',
              'configuration_drift_assess',
              'runtime_runbook_generate',
              'ownership_codeowners_guard',
              'compliance_evidence_export',
          }.issubset(tool_names)
          assert set(assurance_names).issubset(tool_names), sorted(set(assurance_names) - tool_names)
          registry = operational_governance_tools.mcp_tool_contract_registry(include_schemas=True)
          assert registry.status == 'MCP_TOOL_REGISTRY_READY', registry
          assert registry.toolCount == len(tool_names), (registry.toolCount, len(tool_names))
          resource_uris = {str(resource.uri) for resource in server.mcp._resource_manager.list_resources()}
          assert 'sovereign_cognitive_architecture_status' in tool_names
          assert 'ui://sovereign/dev_dashboard.html' in resource_uris
          assert 'ui://sovereign/owner_input.html' in resource_uris
          print('MCP launcher, cognitive and owner-input widgets, Android validation routing, PR lifecycle, workflow control, admin and self-update contracts passed.')
          PY

      - name: Build and inspect unprivileged MCP container
        run: |
          set -euo pipefail
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "io.ouroboros.sovereign.kappa-pos=${KAPPA_POS}" \
            --label "io.ouroboros.sovereign.cross-runtime-parity=${CROSS_RUNTIME_PARITY}" \
            --tag "sovereign-chatgpt-mcp:${GITHUB_SHA}" \
            .
          REVISION_LABEL="$(docker image inspect "sovereign-chatgpt-mcp:${GITHUB_SHA}" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')"
          KAPPA_LABEL="$(docker image inspect "sovereign-chatgpt-mcp:${GITHUB_SHA}" --format '{{index .Config.Labels "io.ouroboros.sovereign.kappa-pos"}}')"
          PARITY_LABEL="$(docker image inspect "sovereign-chatgpt-mcp:${GITHUB_SHA}" --format '{{index .Config.Labels "io.ouroboros.sovereign.cross-runtime-parity"}}')"
          test "$REVISION_LABEL" = "$GITHUB_SHA"
          test "$KAPPA_LABEL" = "$KAPPA_POS"
          test "$PARITY_LABEL" = "$CROSS_RUNTIME_PARITY"

      - name: Assert Docker socket is absent from MCP container contract
        run: |
          set -euo pipefail
          if grep -RIn '/var/run/docker.sock' Dockerfile docker-compose.yml server.py owner_input_widget.py sovereign_cognitive_widget.py operational_governance_tools.py operational_assurance_tools.py launcher.py tool_extensions.py command_contract.py command_queue.py broker_client.py self_heal.py android_hardening.py android_validation_router.py mcp_protocol_health.py; then
            echo 'MCP container must not receive the Docker socket.' >&2
            exit 1
          fi
          grep -q '/run/sovereign-chatgpt-broker' docker-compose.yml
          grep -q '/opt/sovereign-chatgpt-tools/command-queue:/opt/sovereign-chatgpt-tools/command-queue' docker-compose.yml
          grep -q '/opt/android-sdk:/opt/android-sdk:ro' docker-compose.yml

      - name: Scan tracked files for forbidden private material
        run: |
          set -euo pipefail
          if git grep -IlE \
            '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk-proj-[A-Za-z0-9_-]{20,})' \
            -- . ':!.env.example' ':!.tunnel.env.example'; then
            echo 'Forbidden secret-shaped material found.' >&2
            exit 1
          fi

  publish-mcp-image:
    name: Publish immutable MCP image
    needs: validate
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish exact MCP revision
        id: publish
        uses: docker/build-push-action@v6
        with:
          context: tools/sovereign-chatgpt-mcp
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            io.ouroboros.sovereign.kappa-pos=${{ env.KAPPA_POS }}
            io.ouroboros.sovereign.cross-runtime-parity=${{ env.CROSS_RUNTIME_PARITY }}
          provenance: true
          sbom: true

  verify-published-mcp-image:
    name: Verify published MCP digest
    needs: publish-mcp-image
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    env:
      EXPECTED_IMAGE_DIGEST: ${{ needs.publish-mcp-image.outputs.digest }}
    steps:
      - name: Validate published digest
        run: |
          set -euo pipefail
          [[ "${EXPECTED_IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          test "${KAPPA_POS}" = '1000000'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and inspect exact published image
        run: |
          set -euo pipefail
          IMAGE_REFERENCE="${IMAGE_REPOSITORY}@${EXPECTED_IMAGE_DIGEST}"
          docker pull "$IMAGE_REFERENCE"
          REVISION_LABEL="$(docker image inspect "$IMAGE_REFERENCE" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')"
          KAPPA_LABEL="$(docker image inspect "$IMAGE_REFERENCE" --format '{{index .Config.Labels "io.ouroboros.sovereign.kappa-pos"}}')"
          PARITY_LABEL="$(docker image inspect "$IMAGE_REFERENCE" --format '{{index .Config.Labels "io.ouroboros.sovereign.cross-runtime-parity"}}')"
          test "$REVISION_LABEL" = "$GITHUB_SHA"
          test "$KAPPA_LABEL" = "$KAPPA_POS"
          test "$PARITY_LABEL" = "$CROSS_RUNTIME_PARITY"

  deploy-vps:
    name: Bootstrap MCP on VPS
    needs: [validate, publish-mcp-image, verify-published-mcp-image]
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment:
      name: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || secrets.SSH_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD || secrets.VPS_PW || secrets.SSH_PW || secrets.SSH_PASSWORD }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || secrets.SSH_PORT || '22' }}
      RELEASE_RELATIVE_DIR: .sovereign-releases/sovereign-chatgpt-mcp-${{ github.run_id }}-${{ github.run_attempt }}
      EXPECTED_REVISION: ${{ github.sha }}
      EXPECTED_IMAGE_DIGEST: ${{ needs.publish-mcp-image.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate deploy parameters
        run: |
          set -euo pipefail
          test -n "${VPS_HOST:-}" || { echo 'VPS_HOST/SSH_HOST secret is not configured.' >&2; exit 1; }
          test -n "${VPS_USER:-}" || { echo 'VPS_USER/SSH_USER secret is not configured.' >&2; exit 1; }
          test -n "${VPS_PASSWORD:-}" || { echo 'VPS password secret is not configured.' >&2; exit 1; }
          [[ "${VPS_SSH_PORT}" =~ ^[0-9]+$ ]] || { echo 'VPS SSH port must be numeric.' >&2; exit 1; }
          [[ "${EXPECTED_REVISION}" =~ ^[0-9a-f]{40}$ ]] || { echo 'Expected revision must be a full commit SHA.' >&2; exit 1; }
          [[ "${EXPECTED_IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo 'Published image digest is missing or invalid.' >&2; exit 1; }
          test "${KAPPA_POS}" = '1000000' || { echo 'KAPPA_POS invariant mismatch.' >&2; exit 1; }
          case "${RELEASE_RELATIVE_DIR}" in
            .sovereign-releases/sovereign-chatgpt-mcp-*) ;;
            *) echo "Unsafe relative release directory: ${RELEASE_RELATIVE_DIR}" >&2; exit 1 ;;
          esac
          [[ "${RELEASE_RELATIVE_DIR}" != /* ]]
          [[ "${RELEASE_RELATIVE_DIR}" != *".."* ]]

      - name: Create deterministic MCP release archive
        run: |
          set -euo pipefail
          COMMIT_EPOCH="$(git show -s --format=%ct "${EXPECTED_REVISION}")"
          [[ "$COMMIT_EPOCH" =~ ^[0-9]+$ ]]
          tar \
            --sort=name \
            --mtime="@${COMMIT_EPOCH}" \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --format=posix \
            --pax-option=delete=atime,delete=ctime \
            -cf - tools/sovereign-chatgpt-mcp \
            | gzip -n > sovereign-chatgpt-mcp.tar.gz
          tar -tzf sovereign-chatgpt-mcp.tar.gz >/dev/null
          printf '%s\n' "${EXPECTED_REVISION}" > sovereign-chatgpt-mcp.revision
          printf '%s\n' "${EXPECTED_IMAGE_DIGEST}" > sovereign-chatgpt-mcp.image-digest
          printf '%s\n' "${KAPPA_POS}" > sovereign-chatgpt-mcp.kappa-pos
          sha256sum \
            sovereign-chatgpt-mcp.tar.gz \
            sovereign-chatgpt-mcp.revision \
            sovereign-chatgpt-mcp.image-digest \
            sovereign-chatgpt-mcp.kappa-pos \
            > sovereign-chatgpt-mcp.sha256
          sha256sum --check sovereign-chatgpt-mcp.sha256

      - name: Prepare remote release directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -eu
            RELEASE_RELATIVE_DIR='${{ env.RELEASE_RELATIVE_DIR }}'
            case "$RELEASE_RELATIVE_DIR" in
              .sovereign-releases/sovereign-chatgpt-mcp-*) ;;
              *) echo "Unsafe relative release directory: $RELEASE_RELATIVE_DIR" >&2; exit 1 ;;
            esac
            case "$RELEASE_RELATIVE_DIR" in *..*) echo 'Release directory traversal is forbidden.' >&2; exit 1 ;; esac
            RELEASE_DIR="$HOME/$RELEASE_RELATIVE_DIR"
            umask 077
            mkdir -p "$RELEASE_DIR"
            chmod 0700 "$RELEASE_DIR"
            test -d "$RELEASE_DIR" && test ! -L "$RELEASE_DIR"
            test -w "$RELEASE_DIR" && test -x "$RELEASE_DIR"
            rm -f \
              "$RELEASE_DIR/sovereign-chatgpt-mcp.tar.gz" \
              "$RELEASE_DIR/sovereign-chatgpt-mcp.revision" \
              "$RELEASE_DIR/sovereign-chatgpt-mcp.image-digest" \
              "$RELEASE_DIR/sovereign-chatgpt-mcp.kappa-pos" \
              "$RELEASE_DIR/sovereign-chatgpt-mcp.sha256"

      - name: Upload exact MCP release
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          source: 'sovereign-chatgpt-mcp.tar.gz,sovereign-chatgpt-mcp.revision,sovereign-chatgpt-mcp.image-digest,sovereign-chatgpt-mcp.kappa-pos,sovereign-chatgpt-mcp.sha256'
          target: ${{ env.RELEASE_RELATIVE_DIR }}
          overwrite: true

      - name: Install and verify private MCP on VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          SUDO_PASSWORD: ${{ env.VPS_PASSWORD }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          command_timeout: 35m
          envs: SUDO_PASSWORD,GHCR_USERNAME,GHCR_TOKEN,KAPPA_POS,CROSS_RUNTIME_PARITY
          script: |
            set -Eeuo pipefail
            run_root() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
                return
              fi
              if sudo -n true >/dev/null 2>&1; then
                sudo -n "$@"
                return
              fi
              test -n "${SUDO_PASSWORD:-}" || { echo 'sudo password is unavailable for VPS bootstrap.' >&2; exit 1; }
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' "$@"
            }
            RELEASE_RELATIVE_DIR='${{ env.RELEASE_RELATIVE_DIR }}'
            case "$RELEASE_RELATIVE_DIR" in
              .sovereign-releases/sovereign-chatgpt-mcp-*) ;;
              *) echo "Unsafe relative release directory: $RELEASE_RELATIVE_DIR" >&2; exit 1 ;;
            esac
            case "$RELEASE_RELATIVE_DIR" in *..*) echo 'Release directory traversal is forbidden.' >&2; exit 1 ;; esac
            RELEASE_DIR="$HOME/$RELEASE_RELATIVE_DIR"
            EXPECTED_REVISION='${{ env.EXPECTED_REVISION }}'
            EXPECTED_IMAGE_DIGEST='${{ env.EXPECTED_IMAGE_DIGEST }}'
            IMAGE_REPOSITORY='${{ env.IMAGE_REPOSITORY }}'
            KAPPA_POS='${{ env.KAPPA_POS }}'
            EXPECTED_IMAGE_REFERENCE="${IMAGE_REPOSITORY}@${EXPECTED_IMAGE_DIGEST}"
            ARCHIVE="$RELEASE_DIR/sovereign-chatgpt-mcp.tar.gz"
            REVISION_FILE="$RELEASE_DIR/sovereign-chatgpt-mcp.revision"
            IMAGE_DIGEST_FILE="$RELEASE_DIR/sovereign-chatgpt-mcp.image-digest"
            KAPPA_FILE="$RELEASE_DIR/sovereign-chatgpt-mcp.kappa-pos"
            CHECKSUM_FILE="$RELEASE_DIR/sovereign-chatgpt-mcp.sha256"
            WORK_DIR="$RELEASE_DIR/work"
            DOCKER_AUTH_DIR="$RELEASE_DIR/docker-auth"
            STATUS_DIR=/var/lib/sovereign-chatgpt-self-update
            STATUS_FILE="$STATUS_DIR/status.json"

            cleanup() {
              run_root rm -rf "$RELEASE_DIR" || true
            }
            trap cleanup EXIT

            test -n "${HOME:-}" || { echo 'Remote HOME is unavailable.' >&2; exit 1; }
            case "$RELEASE_DIR" in
              "$HOME"/.sovereign-releases/sovereign-chatgpt-mcp-*) ;;
              *) echo "Unsafe resolved release directory: $RELEASE_DIR" >&2; exit 1 ;;
            esac
            [[ "$EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]] || { echo 'Invalid expected revision.' >&2; exit 1; }
            [[ "$EXPECTED_IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo 'Invalid expected image digest.' >&2; exit 1; }
            test "$KAPPA_POS" = '1000000' || { echo 'Invalid KAPPA_POS invariant.' >&2; exit 1; }
            for release_file in "$ARCHIVE" "$REVISION_FILE" "$IMAGE_DIGEST_FILE" "$KAPPA_FILE" "$CHECKSUM_FILE"; do
              test -f "$release_file" || { echo "Release evidence file missing: $release_file" >&2; exit 1; }
            done
            (
              cd "$RELEASE_DIR"
              sha256sum --check "$(basename "$CHECKSUM_FILE")"
            )
            test "$(tr -d '\r\n' < "$REVISION_FILE")" = "$EXPECTED_REVISION"
            test "$(tr -d '\r\n' < "$IMAGE_DIGEST_FILE")" = "$EXPECTED_IMAGE_DIGEST"
            test "$(tr -d '\r\n' < "$KAPPA_FILE")" = "$KAPPA_POS"
            ARCHIVE_SHA256="$(sha256sum "$ARCHIVE" | awk '{print $1}')"
            [[ "$ARCHIVE_SHA256" =~ ^[0-9a-f]{64}$ ]]
            python3 - "$ARCHIVE" <<'PY'
            from pathlib import PurePosixPath
            import sys
            import tarfile

            archive = sys.argv[1]
            with tarfile.open(archive, 'r:gz') as bundle:
                members = bundle.getmembers()
                if not members:
                    raise SystemExit('release archive is empty')
                for member in members:
                    path = PurePosixPath(member.name)
                    if path.is_absolute() or '..' in path.parts:
                        raise SystemExit(f'unsafe archive path: {member.name}')
                    if member.issym() or member.islnk() or member.isdev():
                        raise SystemExit(f'unsupported archive entry: {member.name}')
            PY
            tar -tzf "$ARCHIVE" >/dev/null
            rm -rf "$WORK_DIR"
            install -d -m 0700 "$WORK_DIR"
            tar -xzf "$ARCHIVE" -C "$WORK_DIR"

            SOURCE_DIR="$WORK_DIR/tools/sovereign-chatgpt-mcp"
            for required in Dockerfile docker-compose.yml command_contract.py command_queue.py command_worker.py owner_input_client.py a2a_runtime_client.py document_pipeline.py owner_input_widget.py enterprise_backend_tools.py freemium_product_architect_tools.py operational_governance_tools.py operational_assurance_tools.py skills/sovereign-operational-governance/SKILL.md skills/sovereign-operational-assurance/SKILL.md launcher.py server.py mcp_protocol_health.py sovereign_cognitive_widget.py litellm_stack.py managed_compose.py patchmon_operator.py templates/sovereign-litellm/docker-compose.yml templates/sovereign-litellm/config.yaml templates/sovereign-litellm/sovereign-entrypoint.py templates/pgbackweb-wq5r/docker-compose.yml templates/patchmon-sovereign/docker-compose.yml templates/code-server-46bq/docker-compose.yml deploy/install-on-vps.sh deploy/sovereign-chatgpt-command-worker.service; do
              test -f "$SOURCE_DIR/$required" || { echo "Required MCP release file is missing: $required" >&2; exit 1; }
            done
            bash -n "$SOURCE_DIR/deploy/install-on-vps.sh"
            test -n "${GHCR_USERNAME:-}" || { echo 'GHCR username is unavailable on the VPS session.' >&2; exit 1; }
            test -n "${GHCR_TOKEN:-}" || { echo 'GHCR package-read token is unavailable on the VPS session.' >&2; exit 1; }
            install -d -m 0700 "$DOCKER_AUTH_DIR"
            python3 - "$DOCKER_AUTH_DIR/config.json" <<'PY'
            from pathlib import Path
            import base64
            import json
            import os
            import sys

            username = os.environ.get('GHCR_USERNAME', '')
            token = os.environ.get('GHCR_TOKEN', '')
            if not username or not token:
                raise SystemExit('ephemeral GHCR credentials are incomplete')
            encoded = base64.b64encode(f'{username}:{token}'.encode('utf-8')).decode('ascii')
            Path(sys.argv[1]).write_text(
                json.dumps({'auths': {'ghcr.io': {'auth': encoded}}}, separators=(',', ':')) + '\n',
                'utf-8',
            )
            PY
            chmod 0600 "$DOCKER_AUTH_DIR/config.json"
            unset GHCR_TOKEN
            run_root env \
              DOCKER_CONFIG="$DOCKER_AUTH_DIR" \
              SOVEREIGN_MCP_EXPECTED_REVISION="$EXPECTED_REVISION" \
              SOVEREIGN_MCP_TUNNEL_MODE=disabled \
              bash "$SOURCE_DIR/deploy/install-on-vps.sh"

            CONTAINER_STATE="$(run_root docker inspect sovereign-chatgpt-mcp --format '{{.State.Status}} {{if .State.Health}}{{.State.Health.Status}}{{else}}no-health{{end}}')"
            test "$CONTAINER_STATE" = 'running healthy'
            CONTAINER_IMAGE_REFERENCE="$(run_root docker inspect sovereign-chatgpt-mcp --format '{{.Config.Image}}')"
            CONTAINER_IMAGE_ID="$(run_root docker inspect sovereign-chatgpt-mcp --format '{{.Image}}')"
            test "$CONTAINER_IMAGE_REFERENCE" = "$EXPECTED_IMAGE_REFERENCE"
            [[ "$CONTAINER_IMAGE_ID" =~ ^sha256:[0-9a-f]{64}$ ]]
            INSTALLED_REVISION="$(run_root docker image inspect "$CONTAINER_IMAGE_ID" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')"
            INSTALLED_KAPPA_POS="$(run_root docker image inspect "$CONTAINER_IMAGE_ID" --format '{{index .Config.Labels "io.ouroboros.sovereign.kappa-pos"}}')"
            INSTALLED_CROSS_RUNTIME_PARITY="$(run_root docker image inspect "$CONTAINER_IMAGE_ID" --format '{{index .Config.Labels "io.ouroboros.sovereign.cross-runtime-parity"}}')"
            test "$INSTALLED_REVISION" = "$EXPECTED_REVISION"
            test "$INSTALLED_KAPPA_POS" = "$KAPPA_POS"
            test "$INSTALLED_CROSS_RUNTIME_PARITY" = "$CROSS_RUNTIME_PARITY"
            CONTAINER_REPO_DIGEST="$(
              run_root docker image inspect "$CONTAINER_IMAGE_ID" --format '{{json .RepoDigests}}' \
                | python3 -c 'import json,sys; expected=sys.argv[1]; values=json.load(sys.stdin); print(expected if expected in values else "")' "$EXPECTED_IMAGE_REFERENCE"
            )"
            test "$CONTAINER_REPO_DIGEST" = "$EXPECTED_IMAGE_REFERENCE"

            run_root test -S /run/sovereign-chatgpt-broker/operator.sock
            BROKER_SOCKET_HOST_STATE=visible
            run_root docker exec sovereign-chatgpt-mcp test -S /run/sovereign-chatgpt-broker/operator.sock
            BROKER_SOCKET_CONTAINER_STATE=visible
            run_root docker exec sovereign-chatgpt-mcp python -c 'import server; status=server.broker.status(); assert status.get("status") == "BROKER_READY", status'
            BROKER_RPC_STATE=ready
            run_root docker exec sovereign-chatgpt-mcp python /app/mcp_protocol_health.py --url http://127.0.0.1:8090/mcp --timeout-seconds 5
            MCP_PROTOCOL_STATE=ready
            run_root docker exec sovereign-chatgpt-mcp test -f /app/skills/sovereign-operational-governance/SKILL.md
            run_root docker exec sovereign-chatgpt-mcp test -f /app/skills/sovereign-operational-assurance/SKILL.md
            run_root docker exec sovereign-chatgpt-mcp python -c "import launcher; import server; import operational_governance_tools; import operational_assurance_tools; assert launcher.mcp is server.mcp; names=('mcp_self_update_schedule','mcp_self_update_status','repository_pr_status','repository_merge_pr','android_run_validation_suite','owner_approval_request_create','owner_approval_request_status','litellm_provider_route_activate','owner_approval_widget_open','controller_run_start','controller_run_list','controller_run_status','controller_run_external_event','controller_run_resume','a2a_live_canary','managed_compose_stack_plan','deploy_managed_compose_stack'); missing=[name for name in names if not callable(getattr(server,name,None))]; assert not missing, missing; tool_names={tool.name for tool in server.mcp._tool_manager.list_tools()}; resource_uris={str(resource.uri) for resource in server.mcp._resource_manager.list_resources()}; assert 'sovereign_cognitive_architecture_status' in tool_names, tool_names; required_operational={'operational_skill_inventory','mcp_tool_contract_registry','tool_recommend_for_mission','mcp_registry_snapshot_verify','evidence_graph_build','runtime_runbook_generate','ownership_codeowners_guard','compliance_evidence_export'}; assert required_operational.issubset(tool_names), sorted(required_operational-tool_names); required_assurance={'operational_assurance_skill_inventory','vps_capacity_resource_pressure_assess','runtime_dependency_health_matrix','outbox_queue_liveness_assess','scheduled_maintenance_coordinate','runtime_topology_change_audit','postgres_query_index_performance_assess','data_integrity_invariant_audit','data_repair_plan_build','vector_memory_consistency_assess','memory_poisoning_provenance_guard','learning_pattern_lifecycle_preview','data_retention_privacy_audit','multi_tenant_isolation_verify','mcp_schema_compatibility_audit','mcp_protocol_conformance_fuzz_plan','tool_permission_minimize','dynamic_execution_containment_audit','skill_capability_coverage_map','skill_lifecycle_deprecation_preview','skill_regression_benchmark','tool_idempotency_verify','owner_approval_policy_evaluate','secret_lifecycle_rotation_assess','secret_literal_triage','sbom_provenance_image_signing_verify','dependency_vulnerability_remediation_plan','authentication_chaos_negative_test_assess'}; assert required_assurance.issubset(tool_names), sorted(required_assurance-tool_names); assurance=operational_assurance_tools.operational_assurance_skill_inventory(); assert assurance.status == 'OPERATIONAL_ASSURANCE_SKILLS_READY', assurance; capacity=server.broker.call('runtime_capacity_snapshot', {}, timeout=90); assert capacity.get('status') in {'RUNTIME_CAPACITY_SNAPSHOT_READY','RUNTIME_CAPACITY_SNAPSHOT_DEGRADED'}, capacity; registry=operational_governance_tools.mcp_tool_contract_registry(include_schemas=False); assert registry.status == 'MCP_TOOL_REGISTRY_READY', registry; assert registry.toolCount == len(tool_names), (registry.toolCount,len(tool_names)); assert 'ui://sovereign/dev_dashboard.html' in resource_uris, resource_uris; assert 'ui://sovereign/owner_input.html' in resource_uris, resource_uris; boundaries=server.mcp_runtime_boundaries(); assert boundaries.get('llm_can_receive_protected_values') is False, boundaries; canary=server.broker.call('host_worker_canary', {}, timeout=10); assert canary.get('status') == 'HOST_WORKER_READY', canary; assert canary.get('execution_origin') == 'host_worker', canary; print({'tool_contract': True, 'cognitive_widget': True, 'owner_input_widget': True, 'self_update': True, 'pr_lifecycle': True, 'owner_approval': True, 'host_worker_canary': True})"
            INBOUND_MUTATION_STATE=forbidden
            COMMAND_WORKER_STATE="$(run_root systemctl is-active sovereign-chatgpt-command-worker.service)"
            BROKER_SERVICE_STATE="$(run_root systemctl is-active sovereign-chatgpt-broker.service)"
            TUNNEL_SERVICE_STATE=not_required
            test "$COMMAND_WORKER_STATE" = active
            test "$BROKER_SERVICE_STATE" = active

            run_root install -d -m 0750 "$STATUS_DIR"
            STATUS_WRITER="$RELEASE_DIR/write-mcp-status.py"
            cat > "$STATUS_WRITER" <<'PY'
            from pathlib import Path
            import hashlib
            import json
            import os
            import re
            import sys
            import time

            (
                status_path,
                revision,
                image_reference,
                image_id,
                kappa_pos,
                archive_sha256,
                container_state,
                mcp_protocol_state,
                broker_service_state,
                broker_rpc_state,
                broker_socket_host_state,
                broker_socket_container_state,
                command_worker_state,
                inbound_mutation_state,
                tunnel_service_state,
            ) = sys.argv[1:]

            checks = {
                'revision_verified': bool(re.fullmatch(r'[0-9a-f]{40}', revision)),
                'image_digest_verified': bool(re.fullmatch(r'ghcr\.io/[a-z0-9_.-]+/[a-z0-9_.-]+@sha256:[0-9a-f]{64}', image_reference)),
                'image_id_verified': bool(re.fullmatch(r'sha256:[0-9a-f]{64}', image_id)),
                'kappa_pos_verified': kappa_pos == '1000000',
                'cross_runtime_parity_proven': True,
                'archive_sha256_verified': bool(re.fullmatch(r'[0-9a-f]{64}', archive_sha256)),
                'container_healthy': container_state == 'running healthy',
                'mcp_protocol_ready': mcp_protocol_state == 'ready',
                'broker_active': broker_service_state == 'active',
                'broker_rpc_ready': broker_rpc_state == 'ready',
                'broker_socket_host_visible': broker_socket_host_state == 'visible',
                'broker_socket_container_visible': broker_socket_container_state == 'visible',
                'host_command_worker_active': command_worker_state == 'active',
                'inbound_mutation_forbidden': inbound_mutation_state == 'forbidden',
                'tunnel_not_required': tunnel_service_state == 'not_required',
            }
            evidence = {
                'revision': revision,
                'tunnel_mode': 'disabled',
                'image': image_reference,
                'image_id': image_id,
                'kappa_pos': int(kappa_pos),
                'parity_evidence_source': 'immutable_image_label_and_ci_vector_comparison',
                'archive_sha256': archive_sha256,
                **checks,
            }
            canonical = json.dumps(evidence, sort_keys=True, separators=(',', ':')).encode('utf-8')
            payload = {
                'ok': all(checks.values()),
                'status': 'UPDATED' if all(checks.values()) else 'FAILED',
                'detail': 'private ChatGPT MCP installed from measured GitHub Actions and VPS evidence; tunnel not required',
                **evidence,
                'evidence_sha256': hashlib.sha256(canonical).hexdigest(),
                'updated_at': int(time.time()),
            }
            if not payload['ok']:
                raise SystemExit(f'incomplete runtime evidence: {checks}')
            path = Path(status_path)
            temporary = path.with_suffix('.tmp')
            temporary.write_text(json.dumps(payload, sort_keys=True, separators=(',', ':')) + '\n', 'utf-8')
            os.chmod(temporary, 0o640)
            temporary.replace(path)
            PY
            chmod 0700 "$STATUS_WRITER"
            run_root python3 "$STATUS_WRITER" \
              "$STATUS_FILE" \
              "$INSTALLED_REVISION" \
              "$CONTAINER_REPO_DIGEST" \
              "$CONTAINER_IMAGE_ID" \
              "$INSTALLED_KAPPA_POS" \
              "$ARCHIVE_SHA256" \
              "$CONTAINER_STATE" \
              "$MCP_PROTOCOL_STATE" \
              "$BROKER_SERVICE_STATE" \
              "$BROKER_RPC_STATE" \
              "$BROKER_SOCKET_HOST_STATE" \
              "$BROKER_SOCKET_CONTAINER_STATE" \
              "$COMMAND_WORKER_STATE" \
              "$INBOUND_MUTATION_STATE" \
              "$TUNNEL_SERVICE_STATE"

            run_root python3 - "$STATUS_FILE" "$EXPECTED_REVISION" "$EXPECTED_IMAGE_REFERENCE" "$KAPPA_POS" <<'PY'
            from pathlib import Path
            import json
            import re
            import sys

            payload = json.loads(Path(sys.argv[1]).read_text('utf-8'))
            assert payload.get('ok') is True, payload
            assert payload.get('status') == 'UPDATED', payload
            assert payload.get('revision') == sys.argv[2], payload
            assert payload.get('image') == sys.argv[3], payload
            assert payload.get('kappa_pos') == int(sys.argv[4]), payload
            assert re.fullmatch(r'[0-9a-f]{64}', str(payload.get('evidence_sha256', ''))), payload
            PY

            printf 'MCP revision installed: %s\n' "$INSTALLED_REVISION"
            printf 'MCP image digest: %s\n' "$CONTAINER_REPO_DIGEST"
            printf 'MCP image id: %s\n' "$CONTAINER_IMAGE_ID"
            printf 'KappaPos: %s\n' "$INSTALLED_KAPPA_POS"
            printf 'Cross-runtime parity: %s\n' "$INSTALLED_CROSS_RUNTIME_PARITY"
            printf 'Release archive SHA-256: %s\n' "$ARCHIVE_SHA256"
            printf 'MCP container: %s\n' "$CONTAINER_STATE"
            printf 'MCP protocol ready: %s\n' "$MCP_PROTOCOL_STATE"
            printf 'Broker service: %s\n' "$BROKER_SERVICE_STATE"
            printf 'Broker RPC: %s\n' "$BROKER_RPC_STATE"
            printf 'Host command worker: %s\n' "$COMMAND_WORKER_STATE"
            printf 'Inbound mutation: %s\n' "$INBOUND_MUTATION_STATE"
            printf 'Tunnel requirement: %s\n' "$TUNNEL_SERVICE_STATE"

      - name: Reverify deployed evidence in fresh SSH session
        uses: appleboy/ssh-action@v1.2.5
        env:
          SUDO_PASSWORD: ${{ env.VPS_PASSWORD }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          command_timeout: 10m
          envs: SUDO_PASSWORD,KAPPA_POS,CROSS_RUNTIME_PARITY
          script: |
            set -Eeuo pipefail
            run_root() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
                return
              fi
              if sudo -n true >/dev/null 2>&1; then
                sudo -n "$@"
                return
              fi
              test -n "${SUDO_PASSWORD:-}" || { echo 'sudo password is unavailable for VPS verification.' >&2; exit 1; }
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' "$@"
            }
            EXPECTED_REVISION='${{ env.EXPECTED_REVISION }}'
            EXPECTED_IMAGE_REFERENCE='${{ env.IMAGE_REPOSITORY }}@${{ env.EXPECTED_IMAGE_DIGEST }}'
            KAPPA_POS='${{ env.KAPPA_POS }}'
            STATUS_FILE=/var/lib/sovereign-chatgpt-self-update/status.json
            CONTAINER_STATE="$(run_root docker inspect sovereign-chatgpt-mcp --format '{{.State.Status}} {{if .State.Health}}{{.State.Health.Status}}{{else}}no-health{{end}}')"
            CONTAINER_IMAGE_REFERENCE="$(run_root docker inspect sovereign-chatgpt-mcp --format '{{.Config.Image}}')"
            CONTAINER_IMAGE_ID="$(run_root docker inspect sovereign-chatgpt-mcp --format '{{.Image}}')"
            test "$CONTAINER_STATE" = 'running healthy'
            test "$CONTAINER_IMAGE_REFERENCE" = "$EXPECTED_IMAGE_REFERENCE"
            test "$(run_root docker image inspect "$CONTAINER_IMAGE_ID" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')" = "$EXPECTED_REVISION"
            test "$(run_root docker image inspect "$CONTAINER_IMAGE_ID" --format '{{index .Config.Labels "io.ouroboros.sovereign.kappa-pos"}}')" = "$KAPPA_POS"
            test "$(run_root docker image inspect "$CONTAINER_IMAGE_ID" --format '{{index .Config.Labels "io.ouroboros.sovereign.cross-runtime-parity"}}')" = "$CROSS_RUNTIME_PARITY"
            test "$(run_root systemctl is-active sovereign-chatgpt-command-worker.service)" = active
            test "$(run_root systemctl is-active sovereign-chatgpt-broker.service)" = active
            run_root docker exec sovereign-chatgpt-mcp python /app/mcp_protocol_health.py --url http://127.0.0.1:8090/mcp --timeout-seconds 5
            run_root python3 - "$STATUS_FILE" "$EXPECTED_REVISION" "$EXPECTED_IMAGE_REFERENCE" "$KAPPA_POS" <<'PY'
            from pathlib import Path
            import json
            import re
            import sys

            payload = json.loads(Path(sys.argv[1]).read_text('utf-8'))
            assert payload.get('ok') is True, payload
            assert payload.get('revision') == sys.argv[2], payload
            assert payload.get('image') == sys.argv[3], payload
            assert payload.get('kappa_pos') == int(sys.argv[4]), payload
            assert payload.get('cross_runtime_parity_proven') is True, payload
            assert payload.get('parity_evidence_source') == 'immutable_image_label_and_ci_vector_comparison', payload
            assert payload.get('container_healthy') is True, payload
            assert payload.get('mcp_protocol_ready') is True, payload
            assert payload.get('broker_rpc_ready') is True, payload
            assert payload.get('tunnel_mode') == 'disabled', payload
            assert payload.get('tunnel_not_required') is True, payload
            assert re.fullmatch(r'[0-9a-f]{64}', str(payload.get('evidence_sha256', ''))), payload
            print({'fresh_session_runtime_evidence': True, 'revision': payload['revision'], 'image': payload['image'], 'kappa_pos': payload['kappa_pos']})
            PY

  verify-memory-collection:
    name: Verify Memory Gateway to Milvus collection canary
    needs: deploy-vps
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment:
      name: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || secrets.SSH_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD || secrets.VPS_PW || secrets.SSH_PW || secrets.SSH_PASSWORD }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || secrets.SSH_PORT || '22' }}
      EXPECTED_REVISION: ${{ github.sha }}
    steps:
      - name: Run ephemeral Milvus collection lifecycle
        uses: appleboy/ssh-action@v1.2.5
        env:
          SUDO_PASSWORD: ${{ env.VPS_PASSWORD }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          command_timeout: 8m
          envs: SUDO_PASSWORD,EXPECTED_REVISION
          script: |
            set -Eeuo pipefail
            run_root() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
                return
              fi
              if sudo -n true >/dev/null 2>&1; then
                sudo -n "$@"
                return
              fi
              test -n "${SUDO_PASSWORD:-}" || { echo 'sudo password is unavailable for memory canary.' >&2; exit 1; }
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' "$@"
            }
            [[ "${EXPECTED_REVISION}" =~ ^[0-9a-f]{40}$ ]]
            run_root docker exec -i sovereign-chatgpt-mcp python - "$EXPECTED_REVISION" <<'PY'
            import hashlib
            import json
            import re
            import sys

            import server

            revision = sys.argv[1]
            result = server.broker.call(
                "memory_gateway_collection_canary",
                {},
                timeout=240,
            )
            print(json.dumps(result, sort_keys=True, separators=(",", ":")))
            assert result.get("ok") is True, result
            assert result.get("status") == "MEMORY_COLLECTION_CANARY_VERIFIED", result
            assert result.get("collectionCreated") is True, result
            assert result.get("recordInserted") is True, result
            assert result.get("queryReadbackVerified") is True, result
            assert result.get("vectorSearchVerified") is True, result
            assert result.get("collectionDropped") is True, result
            marker_sha256 = str(result.get("markerSha256") or "")
            assert re.fullmatch(r"[0-9a-f]{64}", marker_sha256), result
            assert result.get("responseContentReturned") is False, result
            assert result.get("secretValuesReturned") is False, result
            summary = {
                "status": result["status"],
                "revision": revision,
                "collectionCreated": True,
                "recordInserted": True,
                "queryReadbackVerified": True,
                "vectorSearchVerified": True,
                "collectionDropped": True,
                "markerSha256": marker_sha256,
                "responseContentReturned": False,
                "secretValuesReturned": False,
            }
            canonical = json.dumps(summary, sort_keys=True, separators=(",", ":")).encode("utf-8")
            summary["evidenceSha256"] = hashlib.sha256(canonical).hexdigest()
            print(json.dumps(summary, sort_keys=True, separators=(",", ":")))
            PY

  verify-document-pipeline:
    name: Verify Gotenberg to Tika live canary
    needs: deploy-vps
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment:
      name: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || secrets.SSH_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD || secrets.VPS_PW || secrets.SSH_PW || secrets.SSH_PASSWORD }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || secrets.SSH_PORT || '22' }}
      EXPECTED_REVISION: ${{ github.sha }}
    steps:
      - name: Generate PDF with Gotenberg and extract marker with Tika
        uses: appleboy/ssh-action@v1.2.5
        env:
          SUDO_PASSWORD: ${{ env.VPS_PASSWORD }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          command_timeout: 8m
          envs: SUDO_PASSWORD,EXPECTED_REVISION
          script: |
            set -Eeuo pipefail
            run_root() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
                return
              fi
              if sudo -n true >/dev/null 2>&1; then
                sudo -n "$@"
                return
              fi
              test -n "${SUDO_PASSWORD:-}" || { echo 'sudo password is unavailable for document canary.' >&2; exit 1; }
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' "$@"
            }
            [[ "${EXPECTED_REVISION}" =~ ^[0-9a-f]{40}$ ]]
            run_root docker exec -i sovereign-chatgpt-mcp python - "$EXPECTED_REVISION" <<'PY'
            import hashlib
            import json
            import sys

            import server

            revision = sys.argv[1]
            marker = f"SOVEREIGN_PDF_33MIB_RUNTIME_CANARY_{revision[:12]}"
            result = server.broker.call(
                "document_pipeline_live_canary",
                {"marker": marker},
                timeout=120,
            )
            assert result.get("ok") is True, result
            assert result.get("status") == "DOCUMENT_PIPELINE_LIVE_CANARY_VERIFIED", result
            gotenberg = result.get("gotenberg") or {}
            tika = result.get("tika") or {}
            assert int(gotenberg.get("httpStatus") or 0) == 200, result
            assert 200 <= int(gotenberg.get("pdfBytes") or 0) <= 33 * 1024 * 1024, result
            assert int(gotenberg.get("maxPdfBytes") or 0) == 33 * 1024 * 1024, result
            assert len(str(gotenberg.get("pdfSha256") or "")) == 64, result
            assert int(tika.get("httpStatus") or 0) == 200, result
            assert tika.get("markerVerified") is True, result
            assert int(tika.get("maxPdfBytes") or 0) == 33 * 1024 * 1024, result
            assert result.get("sourcePersisted") is False, result
            assert result.get("outputPersisted") is False, result
            assert result.get("documentContentReturned") is False, result
            assert result.get("secretValuesReturned") is False, result
            summary = {
                "status": result["status"],
                "revision": revision,
                "pdfBytes": int(gotenberg["pdfBytes"]),
                "maxPdfBytes": int(gotenberg["maxPdfBytes"]),
                "pdfSha256": str(gotenberg["pdfSha256"]),
                "gotenbergHttpStatus": int(gotenberg["httpStatus"]),
                "tikaHttpStatus": int(tika["httpStatus"]),
                "extractedCharacters": int(tika.get("extractedCharacters") or 0),
                "markerVerified": True,
                "sourcePersisted": False,
                "outputPersisted": False,
            }
            canonical = json.dumps(summary, sort_keys=True, separators=(",", ":")).encode("utf-8")
            summary["evidenceSha256"] = hashlib.sha256(canonical).hexdigest()
            print(json.dumps(summary, sort_keys=True, separators=(",", ":")))
            PY
