name: Sovereign ChatGPT MCP

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/sovereign-chatgpt-mcp/**'
      - '.github/workflows/sovereign-chatgpt-mcp.yml'
  push:
    branches: [main]
    paths:
      - 'tools/sovereign-chatgpt-mcp/**'
      - '.github/workflows/sovereign-chatgpt-mcp.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate MCP operator
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: tools/sovereign-chatgpt-mcp
    env:
      SOVEREIGN_MCP_WORKSPACE_ROOT: /tmp/sovereign-mcp-workspaces
      SOVEREIGN_MCP_HOST: 127.0.0.1
      SOVEREIGN_MCP_PORT: '8090'
      SOVEREIGN_MCP_REPOSITORY: OuroborosCollective/Sovereign-Studio-ato
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/sovereign-chatgpt-mcp/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Compile Python runtime
        run: python -m py_compile policy.py runtime.py database.py operations.py admin_mode.py github_admin.py self_update.py broker.py broker_client.py self_heal.py android_hardening.py tool_extensions.py launcher.py server.py tests/*.py

      - name: Validate fixed shell and systemd assets
        run: |
          set -euo pipefail
          bash -n deploy/deploy-sovereign-backend
          bash -n deploy/rollback-sovereign-backend
          bash -n deploy/bootstrap-database.sh
          bash -n deploy/install-secure-tunnel.sh
          bash -n deploy/self-update-chatgpt-mcp.sh
          bash -n deploy/install-on-vps.sh
          grep -q 'admin_mode.py' deploy/install-on-vps.sh
          grep -q 'github_admin.py' deploy/install-on-vps.sh
          grep -q 'android_hardening.py' deploy/install-on-vps.sh
          grep -q 'tool_extensions.py' deploy/install-on-vps.sh
          grep -q 'launcher.py' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_ADMIN_SQL' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_MAIN_PUSH' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_PR_MERGE' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_WORKFLOW_CONTROL' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_SELF_UPDATE' deploy/install-on-vps.sh
          grep -q '^ExecStart=/usr/bin/python3 /opt/sovereign-chatgpt-tools/broker/broker.py$' deploy/sovereign-chatgpt-broker.service
          grep -q '^EnvironmentFile=/opt/sovereign-chatgpt-tools/broker.env$' deploy/sovereign-chatgpt-broker.service
          grep -q '^ExecStart=/opt/sovereign-chatgpt-tools/bin/self-update-chatgpt-mcp$' deploy/sovereign-chatgpt-mcp-self-update.service
          grep -q '^StateDirectory=sovereign-chatgpt-self-update$' deploy/sovereign-chatgpt-mcp-self-update.service
          grep -q '^ExecStart=/usr/local/bin/tunnel-client run --profile ${TUNNEL_PROFILE}$' deploy/sovereign-openai-tunnel.service
          grep -q '^EnvironmentFile=/opt/sovereign-chatgpt-tools/tunnel.env$' deploy/sovereign-openai-tunnel.service

      - name: Run policy and runtime tests
        run: python -m pytest -q

      - name: Import MCP launcher and inspect contracts
        run: |
          python - <<'PY'
          import launcher
          import server
          import self_heal
          import tool_extensions
          assert launcher.mcp is server.mcp
          assert server.runtime.config.repository == 'OuroborosCollective/Sovereign-Studio-ato'
          assert server.broker.socket_path.name == 'operator.sock'
          assert self_heal.REPAIR_ENGINE is not None
          for name in (
              'postgres_admin_sql',
              'repository_push_main',
              'repository_pr_status',
              'repository_rerun_failed_workflows',
              'repository_merge_pr',
              'android_project_inventory',
              'android_failure_family_scan',
              'android_runtime_evidence_analyze',
              'android_repair_plan',
              'android_run_validation_suite',
              'android_artifact_inspect',
              'mcp_self_update_schedule',
              'mcp_self_update_status',
          ):
              assert callable(getattr(server, name)), name
          assert callable(tool_extensions.repository_dispatch_workflow)
          assert callable(tool_extensions.repository_workflow_run_status)
          print('MCP launcher, Android hardening, PR lifecycle, workflow control, admin and self-update contracts passed.')
          PY

      - name: Build unprivileged MCP container
        run: docker build --tag sovereign-chatgpt-mcp:${{ github.sha }} .

      - name: Assert Docker socket is absent from MCP container contract
        run: |
          set -euo pipefail
          if grep -RIn '/var/run/docker.sock' Dockerfile docker-compose.yml server.py launcher.py tool_extensions.py broker_client.py self_heal.py android_hardening.py; then
            echo 'MCP container must not receive the Docker socket.' >&2
            exit 1
          fi
          grep -q '/run/sovereign-chatgpt-broker' docker-compose.yml
          grep -q '/opt/android-sdk:/opt/android-sdk:ro' docker-compose.yml

      - name: Scan tracked files for forbidden private material
        run: |
          set -euo pipefail
          if grep -RInE --exclude='.env.example' --exclude='.tunnel.env.example' --exclude='*.pyc' \
            '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk-proj-[A-Za-z0-9_-]{20,})' .; then
            echo 'Forbidden secret-shaped material found.' >&2
            exit 1
          fi
