name: Sovereign ChatGPT MCP

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/sovereign-chatgpt-mcp/**'
      - '.github/workflows/sovereign-chatgpt-mcp.yml'
  push:
    branches: [main]
    paths:
      - 'tools/sovereign-chatgpt-mcp/**'
      - '.github/workflows/sovereign-chatgpt-mcp.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate MCP operator
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: tools/sovereign-chatgpt-mcp
    env:
      SOVEREIGN_MCP_WORKSPACE_ROOT: /tmp/sovereign-mcp-workspaces
      SOVEREIGN_MCP_HOST: 127.0.0.1
      SOVEREIGN_MCP_PORT: '8090'
      SOVEREIGN_MCP_REPOSITORY: OuroborosCollective/Sovereign-Studio-ato
      SOVEREIGN_ANDROID_NATIVE_BUILD_MODE: github_actions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/sovereign-chatgpt-mcp/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Compile Python runtime
        run: python -m py_compile policy.py runtime.py database.py command_contract.py command_queue.py command_worker.py operations.py admin_mode.py github_admin.py self_update.py broker.py broker_client.py owner_input_client.py self_heal.py android_hardening.py android_validation_router.py mcp_protocol_health.py server.py tool_extensions.py launcher.py

      - name: Validate fixed shell and systemd assets
        run: |
          set -euo pipefail
          bash -n deploy/deploy-sovereign-backend
          bash -n deploy/rollback-sovereign-backend
          bash -n deploy/bootstrap-database.sh
          bash -n deploy/install-secure-tunnel.sh
          bash -n deploy/self-update-chatgpt-mcp.sh
          bash -n deploy/install-on-vps.sh
          if grep -n 'curl ' deploy/deploy-sovereign-backend deploy/rollback-sovereign-backend deploy/install-secure-tunnel.sh deploy/sovereign-openai-tunnel.service; then
            echo 'Operator deployment path must not depend on curl.' >&2
            exit 1
          fi
          grep -q 'admin_mode.py' deploy/install-on-vps.sh
          grep -q 'github_admin.py' deploy/install-on-vps.sh
          grep -q 'android_hardening.py' deploy/install-on-vps.sh
          grep -q 'android_validation_router.py' deploy/install-on-vps.sh
          grep -q 'mcp_protocol_health.py' deploy/install-on-vps.sh
          grep -q 'command_contract.py' deploy/install-on-vps.sh
          grep -q 'command_queue.py' deploy/install-on-vps.sh
          grep -q 'command_worker.py' deploy/install-on-vps.sh
          grep -q 'owner_input_client.py' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_OWNER_REQUEST_KEY' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_BACKEND_INTERNAL_URL' deploy/install-on-vps.sh
          grep -q 'sovereign-chatgpt-command-worker.service' deploy/install-on-vps.sh
          grep -q 'tool_extensions.py' deploy/install-on-vps.sh
          grep -q 'launcher.py' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_ADMIN_SQL' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_MAIN_PUSH' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_PR_MERGE' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_WORKFLOW_CONTROL' deploy/install-on-vps.sh
          grep -q 'SOVEREIGN_MCP_ENABLE_SELF_UPDATE' deploy/install-on-vps.sh
          grep -q '^ExecStart=/usr/bin/python3 /opt/sovereign-chatgpt-tools/broker/broker.py$' deploy/sovereign-chatgpt-broker.service
          grep -q '^EnvironmentFile=/opt/sovereign-chatgpt-tools/broker.env$' deploy/sovereign-chatgpt-broker.service
          grep -q '^ExecStart=/usr/bin/python3 /opt/sovereign-chatgpt-tools/broker/command_worker.py$' deploy/sovereign-chatgpt-command-worker.service
          grep -q '^Environment=SOVEREIGN_MCP_COMMAND_QUEUE=/opt/sovereign-chatgpt-tools/command-queue$' deploy/sovereign-chatgpt-command-worker.service
          grep -q '^RuntimeDirectoryPreserve=yes$' deploy/sovereign-chatgpt-broker.service
          grep -q '^ExecStart=/opt/sovereign-chatgpt-tools/bin/self-update-chatgpt-mcp$' deploy/sovereign-chatgpt-mcp-self-update.service
          grep -q '^StateDirectory=sovereign-chatgpt-self-update$' deploy/sovereign-chatgpt-mcp-self-update.service
          grep -q '^ExecStartPre=/usr/bin/python3 /opt/sovereign-chatgpt-tools/mcp_protocol_health.py ' deploy/sovereign-openai-tunnel.service
          grep -q '^Restart=on-failure$' deploy/sovereign-openai-tunnel.service
          grep -q '^StartLimitIntervalSec=60$' deploy/sovereign-openai-tunnel.service
          grep -q '^StartLimitBurst=3$' deploy/sovereign-openai-tunnel.service
          grep -q 'http://127.0.0.1:8090/mcp' deploy/sovereign-openai-tunnel.service
          if grep -q 'curl ' deploy/sovereign-openai-tunnel.service; then
            echo 'Tunnel health check must not use curl.' >&2
            exit 1
          fi
          if grep -q 'for command in curl ' deploy/install-secure-tunnel.sh; then
            echo 'Tunnel installer must not require curl.' >&2
            exit 1
          fi
          grep -q '^ExecStart=/usr/local/bin/tunnel-client run --profile ${TUNNEL_PROFILE}$' deploy/sovereign-openai-tunnel.service
          grep -q '^EnvironmentFile=/opt/sovereign-chatgpt-tools/tunnel.env$' deploy/sovereign-openai-tunnel.service
          grep -q '^    image: ${SOVEREIGN_MCP_IMAGE:' docker-compose.yml
          grep -q 'docker pull "$MCP_TAGGED_IMAGE"' deploy/install-on-vps.sh
          grep -q 'org.opencontainers.image.revision' deploy/install-on-vps.sh
          if grep -q 'docker compose build' deploy/install-on-vps.sh; then
            echo 'The VPS must not build the MCP image.' >&2
            exit 1
          fi
          if grep -q '"pnpm", "install"' runtime.py; then
            echo 'The running MCP must not install Node dependencies.' >&2
            exit 1
          fi

      - name: Run policy and runtime tests
        run: python -m pytest -q

      - name: Import MCP launcher and inspect contracts
        run: |
          python - <<'PY'
          import launcher
          import server
          import self_heal
          import tool_extensions
          assert launcher.mcp is server.mcp
          assert server.runtime.config.repository == 'OuroborosCollective/Sovereign-Studio-ato'
          assert server.broker.socket_path.name == 'operator.sock'
          assert self_heal.REPAIR_ENGINE is not None
          assert getattr(server.android, '_native_validation_router_installed', False) is True
          for name in (
              'postgres_admin_sql',
              'repository_push_main',
              'repository_pr_status',
              'repository_rerun_failed_workflows',
              'repository_merge_pr',
              'android_project_inventory',
              'android_failure_family_scan',
              'android_runtime_evidence_analyze',
              'android_repair_plan',
              'android_run_validation_suite',
              'android_artifact_inspect',
              'mcp_self_update_schedule',
              'mcp_self_update_status',
              'mcp_control_plane_status',
              'mcp_host_command_status',
              'owner_approval_request_create',
              'owner_approval_request_status',
          ):
              assert callable(getattr(server, name)), name
          assert callable(tool_extensions.repository_dispatch_workflow)
          assert callable(tool_extensions.repository_workflow_run_status)
          print('MCP launcher, Android validation routing, PR lifecycle, workflow control, admin and self-update contracts passed.')
          PY

      - name: Build unprivileged MCP container
        run: docker build --tag sovereign-chatgpt-mcp:${{ github.sha }} .

      - name: Assert Docker socket is absent from MCP container contract
        run: |
          set -euo pipefail
          if grep -RIn '/var/run/docker.sock' Dockerfile docker-compose.yml server.py launcher.py tool_extensions.py command_contract.py command_queue.py broker_client.py self_heal.py android_hardening.py android_validation_router.py mcp_protocol_health.py; then
            echo 'MCP container must not receive the Docker socket.' >&2
            exit 1
          fi
          grep -q '/run/sovereign-chatgpt-broker' docker-compose.yml
          grep -q '/opt/sovereign-chatgpt-tools/command-queue:/opt/sovereign-chatgpt-tools/command-queue' docker-compose.yml
          grep -q '/opt/android-sdk:/opt/android-sdk:ro' docker-compose.yml

      - name: Scan tracked files for forbidden private material
        run: |
          set -euo pipefail
          if grep -RInE --exclude='.env.example' --exclude='.tunnel.env.example' --exclude='*.pyc' \
            '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk-proj-[A-Za-z0-9_-]{20,})' .; then
            echo 'Forbidden secret-shaped material found.' >&2
            exit 1
          fi

  publish-mcp-image:
    name: Publish immutable MCP image
    needs: validate
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish exact MCP revision
        uses: docker/build-push-action@v6
        with:
          context: tools/sovereign-chatgpt-mcp
          push: true
          tags: ghcr.io/ouroboroscollective/sovereign-chatgpt-mcp:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: true
          sbom: true

  deploy-vps:
    name: Bootstrap MCP on VPS
    needs: [validate, publish-mcp-image]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment:
      name: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || secrets.SSH_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD || secrets.VPS_PW || secrets.SSH_PW || secrets.SSH_PASSWORD }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || secrets.SSH_PORT || '22' }}
      RELEASE_DIR: /tmp/sovereign-chatgpt-mcp-${{ github.run_id }}-${{ github.run_attempt }}
      EXPECTED_REVISION: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate deploy parameters
        run: |
          set -euo pipefail
          test -n "${VPS_HOST:-}" || { echo 'VPS_HOST/SSH_HOST secret is not configured.' >&2; exit 1; }
          test -n "${VPS_USER:-}" || { echo 'VPS_USER/SSH_USER secret is not configured.' >&2; exit 1; }
          test -n "${VPS_PASSWORD:-}" || { echo 'VPS password secret is not configured.' >&2; exit 1; }
          [[ "${VPS_SSH_PORT}" =~ ^[0-9]+$ ]] || { echo 'VPS SSH port must be numeric.' >&2; exit 1; }
          [[ "${EXPECTED_REVISION}" =~ ^[0-9a-f]{40}$ ]] || { echo 'Expected revision must be a full commit SHA.' >&2; exit 1; }
          case "${RELEASE_DIR}" in
            /tmp/sovereign-chatgpt-mcp-*) ;;
            *) echo "Unsafe release directory: ${RELEASE_DIR}" >&2; exit 1 ;;
          esac

      - name: Create exact MCP release archive
        run: |
          set -euo pipefail
          tar -czf sovereign-chatgpt-mcp.tar.gz tools/sovereign-chatgpt-mcp
          tar -tzf sovereign-chatgpt-mcp.tar.gz >/dev/null
          printf '%s\n' "${EXPECTED_REVISION}" > sovereign-chatgpt-mcp.revision

      - name: Prepare remote release directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -eu
            RELEASE_DIR='${{ env.RELEASE_DIR }}'
            case "$RELEASE_DIR" in
              /tmp/sovereign-chatgpt-mcp-*) ;;
              *) echo "Unsafe release directory: $RELEASE_DIR" >&2; exit 1 ;;
            esac
            install -d -m 0700 "$RELEASE_DIR"
            rm -f "$RELEASE_DIR/sovereign-chatgpt-mcp.tar.gz" "$RELEASE_DIR/sovereign-chatgpt-mcp.revision"

      - name: Upload exact MCP release
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          source: 'sovereign-chatgpt-mcp.tar.gz,sovereign-chatgpt-mcp.revision'
          target: ${{ env.RELEASE_DIR }}
          overwrite: true

      - name: Install and verify private MCP on VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          SUDO_PASSWORD: ${{ env.VPS_PASSWORD }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          command_timeout: 35m
          envs: SUDO_PASSWORD
          script: |
            set -Eeuo pipefail
            run_root() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
                return
              fi
              if sudo -n true >/dev/null 2>&1; then
                sudo -n "$@"
                return
              fi
              test -n "${SUDO_PASSWORD:-}" || { echo 'sudo password is unavailable for VPS bootstrap.' >&2; exit 1; }
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' "$@"
            }
            RELEASE_DIR='${{ env.RELEASE_DIR }}'
            EXPECTED_REVISION='${{ env.EXPECTED_REVISION }}'
            ARCHIVE="$RELEASE_DIR/sovereign-chatgpt-mcp.tar.gz"
            REVISION_FILE="$RELEASE_DIR/sovereign-chatgpt-mcp.revision"
            WORK_DIR="$RELEASE_DIR/work"
            STATUS_DIR=/var/lib/sovereign-chatgpt-self-update
            STATUS_FILE="$STATUS_DIR/status.json"

            cleanup() {
              run_root rm -rf "$RELEASE_DIR" || true
            }
            trap cleanup EXIT

            case "$RELEASE_DIR" in
              /tmp/sovereign-chatgpt-mcp-*) ;;
              *) echo "Unsafe release directory: $RELEASE_DIR" >&2; exit 1 ;;
            esac
            [[ "$EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]] || { echo 'Invalid expected revision.' >&2; exit 1; }
            test -f "$ARCHIVE"
            test -f "$REVISION_FILE"
            test "$(tr -d '\r\n' < "$REVISION_FILE")" = "$EXPECTED_REVISION"
            tar -tzf "$ARCHIVE" >/dev/null
            rm -rf "$WORK_DIR"
            install -d -m 0700 "$WORK_DIR"
            tar -xzf "$ARCHIVE" -C "$WORK_DIR"

            SOURCE_DIR="$WORK_DIR/tools/sovereign-chatgpt-mcp"
            for required in Dockerfile docker-compose.yml command_contract.py command_queue.py command_worker.py owner_input_client.py launcher.py server.py mcp_protocol_health.py deploy/install-on-vps.sh deploy/sovereign-chatgpt-command-worker.service; do
              test -f "$SOURCE_DIR/$required" || { echo "Required MCP release file is missing: $required" >&2; exit 1; }
            done
            bash -n "$SOURCE_DIR/deploy/install-on-vps.sh"
            run_root env SOVEREIGN_MCP_EXPECTED_REVISION="$EXPECTED_REVISION" bash "$SOURCE_DIR/deploy/install-on-vps.sh"

            CONTAINER_STATE="$(run_root docker inspect sovereign-chatgpt-mcp --format '{{.State.Status}} {{if .State.Health}}{{.State.Health.Status}}{{else}}no-health{{end}}')"
            test "$CONTAINER_STATE" = 'running healthy'
            run_root test -S /run/sovereign-chatgpt-broker/operator.sock
            run_root docker exec sovereign-chatgpt-mcp test -S /run/sovereign-chatgpt-broker/operator.sock
            run_root docker exec sovereign-chatgpt-mcp python -c 'import server; status=server.broker.status(); assert status.get("status") == "BROKER_READY", status'
            run_root docker exec sovereign-chatgpt-mcp python /app/mcp_protocol_health.py --url http://127.0.0.1:8090/mcp --timeout-seconds 5
            run_root docker exec sovereign-chatgpt-mcp python -c "import server; names=('mcp_self_update_schedule','mcp_self_update_status','repository_pr_status','repository_merge_pr','android_run_validation_suite','owner_approval_request_create','owner_approval_request_status'); missing=[name for name in names if not callable(getattr(server,name,None))]; assert not missing, missing; boundaries=server.mcp_runtime_boundaries(); assert boundaries.get('llm_can_receive_protected_values') is False, boundaries; print({'tool_contract': True, 'self_update': True, 'pr_lifecycle': True, 'owner_approval': True})"
            run_root systemctl is-active --quiet sovereign-chatgpt-command-worker.service
            run_root systemctl is-active --quiet sovereign-chatgpt-broker.service
            run_root systemctl is-active --quiet sovereign-openai-tunnel.service

            run_root install -d -m 0750 "$STATUS_DIR"
            STATUS_WRITER="$RELEASE_DIR/write-mcp-status.py"
            cat > "$STATUS_WRITER" <<'PY'
            from pathlib import Path
            import json
            import os
            import sys
            import time

            path = Path(sys.argv[1])
            revision = sys.argv[2]
            payload = {
                'ok': True,
                'status': 'UPDATED',
                'revision': revision,
                'detail': 'private ChatGPT MCP installed by GitHub Actions bootstrap deploy',
                'mcp_protocol_ready': True,
                'broker_active': True,
                'broker_rpc_ready': True,
                'broker_socket_host_visible': True,
                'broker_socket_container_visible': True,
                'host_command_worker_active': True,
                'inbound_mutation_forbidden': True,
                'openai_tunnel_active': True,
                'updated_at': int(time.time()),
            }
            temporary = path.with_suffix('.tmp')
            temporary.write_text(json.dumps(payload, sort_keys=True) + '\n', 'utf-8')
            os.chmod(temporary, 0o640)
            temporary.replace(path)
            PY
            chmod 0700 "$STATUS_WRITER"
            run_root python3 "$STATUS_WRITER" "$STATUS_FILE" "$EXPECTED_REVISION"

            printf 'MCP revision installed: %s\n' "$EXPECTED_REVISION"
            printf 'MCP container: %s\n' "$CONTAINER_STATE"
            printf 'MCP protocol ready: true\n'
            printf 'Broker active: true\n'
            printf 'Broker RPC ready: true\n'
            printf 'Broker socket host visible: true\n'
            printf 'Broker socket container visible: true\n'
            printf 'Host command worker active: true\n'
            printf 'Inbound mutation forbidden: true\n'
            printf 'OpenAI tunnel active: true\n'
