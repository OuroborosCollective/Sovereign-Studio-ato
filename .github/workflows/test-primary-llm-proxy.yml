name: Test Primary LLM Proxy

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/test-primary-llm-proxy.yml
      - src/features/product/llm/primaryBridgeConfig.ts
      - src/features/product/llm/adapters/primaryBridgeAdapter.ts

env:
  PRIMARY_LLM_PROXY_URL: https://sovereign-llm-proxy.projectouroboroscollective.workers.dev
  PRIMARY_LLM_MODEL: deepseek-r1

jobs:
  smoke:
    name: Smoke test hosted primary LLM proxy
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Health endpoint diagnostic
        run: |
          set -euo pipefail
          status=$(curl -sS -o health.json -w "%{http_code}" "$PRIMARY_LLM_PROXY_URL/health" || true)
          echo "Health status: $status"
          cat health.json || true
          node - <<'NODE'
          const fs = require('fs');
          const body = fs.existsSync('health.json') ? fs.readFileSync('health.json', 'utf8').trim() : '';
          if (!body) {
            console.log('Health diagnostic returned no body; continuing to POST smoke test.');
            process.exit(0);
          }
          try {
            const payload = JSON.parse(body);
            console.log('Health diagnostic:', JSON.stringify({ ok: payload.ok, gateway: payload.gateway, model: payload.model, secretConfigured: payload.secretConfigured }));
          } catch {
            console.log('Health diagnostic was not JSON; continuing to POST smoke test.');
          }
          NODE

      - name: Chat completion endpoint
        run: |
          set -euo pipefail
          cat > payload.json <<JSON
          {
            "model": "$PRIMARY_LLM_MODEL",
            "messages": [
              { "role": "system", "content": "Reply with exactly one short sentence." },
              { "role": "user", "content": "Say Sovereign proxy works." }
            ],
            "temperature": 0,
            "max_tokens": 64,
            "reasoning_format": "parsed"
          }
          JSON
          http_status=$(curl -sS -X POST "$PRIMARY_LLM_PROXY_URL/v1/chat/completions" \
            -H "Content-Type: application/json" \
            --data @payload.json \
            -o response.json \
            -w "%{http_code}")
          echo "POST status: $http_status"
          cat response.json
          test "$http_status" -ge 200 && test "$http_status" -lt 300
          node - <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('response.json', 'utf8'));
          const text = payload?.choices?.[0]?.message?.content || payload?.output_text || payload?.response || '';
          if (!text || typeof text !== 'string') {
            throw new Error(`No assistant text returned: ${JSON.stringify(payload).slice(0, 500)}`);
          }
          console.log('LLM response text:', text.slice(0, 200));
          NODE
