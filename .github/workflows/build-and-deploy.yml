name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Deploy Backend → VPS
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://sovereign-backend.arelorian.de
    env:
      VPS_HOST: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || secrets.SSH_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD || secrets.VPS_PW || secrets.SSH_PW || secrets.SSH_PASSWORD }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || secrets.SSH_PORT || '22' }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      LLM_PROXY_KEY: ${{ secrets.LLM_PROXY_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy parameters
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST:-}" ]; then
            echo "VPS_HOST/SSH_HOST secret is not configured." >&2
            exit 1
          fi
          if [ -z "${VPS_USER:-}" ]; then
            echo "VPS_USER/SSH_USER secret is not configured." >&2
            exit 1
          fi
          if [ -z "${VPS_PASSWORD:-}" ]; then
            echo "VPS password secret is not configured. Expected VPS_PASSWORD, VPS_PW, SSH_PW, or SSH_PASSWORD." >&2
            exit 1
          fi
          if ! [[ "${VPS_SSH_PORT}" =~ ^[0-9]+$ ]]; then
            echo "VPS_SSH_PORT/SSH_PORT must be numeric." >&2
            exit 1
          fi

      - name: Upload app.py to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          source: "scripts/sovereign-backend/app.py"
          target: "/tmp/sovereign-backend-deploy"
          overwrite: true

      - name: Write .env to VPS
        uses: appleboy/ssh-action@master
        env:
          POSTGRES_HOST: ${{ env.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ env.POSTGRES_PORT }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          ADMIN_API_KEY: ${{ env.ADMIN_API_KEY }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          LLM_PROXY_KEY: ${{ env.LLM_PROXY_KEY }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          envs: POSTGRES_HOST,POSTGRES_PORT,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,ADMIN_API_KEY,JWT_SECRET,LLM_PROXY_KEY
          script_stop: true
          script: |
            set -euo pipefail
            EXISTING_ENV=/opt/sovereign-backend/.env
            EXISTING_TOOLCHAIN_BASE_URL=""
            EXISTING_TOOLCHAIN_API_KEY=""
            EXISTING_POSTGRES_HOST=""
            if [ -f "$EXISTING_ENV" ]; then
              EXISTING_TOOLCHAIN_BASE_URL="$(grep -E '^TOOLCHAIN_BASE_URL=' "$EXISTING_ENV" | tail -n 1 | cut -d= -f2- || true)"
              EXISTING_TOOLCHAIN_API_KEY="$(grep -E '^TOOLCHAIN_API_KEY=' "$EXISTING_ENV" | tail -n 1 | cut -d= -f2- || true)"
              EXISTING_POSTGRES_HOST="$(grep -E '^POSTGRES_HOST=' "$EXISTING_ENV" | tail -n 1 | cut -d= -f2- || true)"
            fi
            if [ -n "$EXISTING_POSTGRES_HOST" ] && [ "$EXISTING_POSTGRES_HOST" != "host.docker.internal" ]; then
              FINAL_POSTGRES_HOST="$EXISTING_POSTGRES_HOST"
            elif [ -n "${POSTGRES_HOST:-}" ]; then
              FINAL_POSTGRES_HOST="$POSTGRES_HOST"
            else
              FINAL_POSTGRES_HOST="supabase-db"
            fi
            cat > /opt/sovereign-backend/.env << ENVEOF
            POSTGRES_HOST=${FINAL_POSTGRES_HOST}
            POSTGRES_PORT=${POSTGRES_PORT}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            ADMIN_API_KEY=${ADMIN_API_KEY}
            JWT_SECRET=${JWT_SECRET}
            LLM_PROXY_KEY=${LLM_PROXY_KEY}
            FLASK_ENV=production
            OPENHANDS_API_URL=http://openhands-enterprise-openhands-1:8000
            ENVEOF
            if [ -n "$EXISTING_TOOLCHAIN_BASE_URL" ]; then
              printf 'TOOLCHAIN_BASE_URL=%s\n' "$EXISTING_TOOLCHAIN_BASE_URL" >> /opt/sovereign-backend/.env
            fi
            if [ -n "$EXISTING_TOOLCHAIN_API_KEY" ]; then
              printf 'TOOLCHAIN_API_KEY=%s\n' "$EXISTING_TOOLCHAIN_API_KEY" >> /opt/sovereign-backend/.env
            fi
            echo "POSTGRES_HOST set to: $(grep POSTGRES_HOST /opt/sovereign-backend/.env | cut -d= -f2)"

      - name: Copy app.py to VPS and rebuild
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            if [ -f /tmp/sovereign-backend-deploy/scripts/sovereign-backend/app.py ]; then
              cp /tmp/sovereign-backend-deploy/scripts/sovereign-backend/app.py /opt/sovereign-backend/app.py
            else
              echo "Uploaded app.py not found in expected path." >&2
              exit 1
            fi
            cd /opt/sovereign-backend
            docker compose build --no-cache
            docker compose up -d

      - name: Health check
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" \
              https://sovereign-backend.arelorian.de/api/admin/ping)
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "Backend health check failed" && exit 1
