name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Deploy Backend → VPS
    runs-on: ubuntu-latest
    env:
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS_HOST secret is not configured." >&2
            exit 1
          fi
          if ! ssh-keyscan -T 10 -p "${VPS_SSH_PORT}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "ssh-keyscan could not prefetch the VPS host key; continuing because SSH uses StrictHostKeyChecking=no." >&2
          fi

      - name: Write .env to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p "${VPS_SSH_PORT}" -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash << 'SSHEOF'
          cat > /opt/sovereign-backend/.env << ENVEOF
          POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          LLM_PROXY_KEY=${{ secrets.LLM_PROXY_KEY }}
          TOOLCHAIN_BASE_URL=${{ secrets.TOOLCHAIN_BASE_URL }}
          TOOLCHAIN_API_KEY=${{ secrets.TOOLCHAIN_API_KEY }}
          FLASK_ENV=production
          OPENHANDS_API_URL=http://openhands-enterprise-openhands-1:8000
          ENVEOF
          SSHEOF

      - name: Copy app.py to VPS and rebuild
        run: |
          # Copy latest backend source if it exists in the repo.
          scp -i ~/.ssh/deploy_key -P "${VPS_SSH_PORT}" -o StrictHostKeyChecking=no \
            scripts/sovereign-backend/app.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sovereign-backend/app.py 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -p "${VPS_SSH_PORT}" -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/sovereign-backend && docker compose build --no-cache && docker compose up -d"

      - name: Health check
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" \
              https://sovereign-backend.arelorian.de/api/admin/ping)
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "Backend health check failed" && exit 1
