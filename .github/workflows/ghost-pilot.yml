name: Ghost Pilot Android Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ghost-pilot:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Context
        id: context
        run: |
          STRINGS_PATH="android/app/src/main/res/values/strings.xml"
          APP_PATH="App.tsx"
          
          if [ -f "$STRINGS_PATH" ]; then
            cat "$STRINGS_PATH" > strings_extracted.txt
          else
            echo "Empty" > strings_extracted.txt
          fi
          
          if [ -f "$APP_PATH" ]; then
            cat "$APP_PATH" > app_extracted.txt
          else
            echo "Empty" > app_extracted.txt
          fi

      - name: Generate ADB Sequence via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          STRINGS_ESCAPED=$(jq -Rs . < strings_extracted.txt)
          APP_ESCAPED=$(jq -Rs . < app_extracted.txt)
          
          QUERY="Analyze the following Android strings and React Native code. Generate a sequence of 'adb shell input' commands (tap, text, keyevent) to navigate the app and attempt to trigger an ErrorBoundary. Return ONLY the shell commands, one per line.
          
          Strings: $STRINGS_ESCAPED
          Code: $APP_ESCAPED"
          
          # Create JSON payload without illegal characters
          printf '{"contents": [{"parts": [{"text": %s}]}]}' "$(echo "$QUERY" | jq -R .)" > payload.json
          
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @payload.json)
          
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' | grep "adb shell" > test_sequence.sh

      - name: Run Test on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Clear logs
            adb logcat -c
            
            # Start Logcat capture in background
            adb logcat *:E > emulator_error.log &
            LOGCAT_PID=$!
            
            echo "Starting generated test sequence..."
            chmod +x test_sequence.sh
            bash test_sequence.sh
            
            # Allow time for async errors to surface
            sleep 5
            
            kill $LOGCAT_PID
            
            # Scan for ErrorBoundary or Crashes
            if grep -Ei "ErrorBoundary|FATAL EXCEPTION|RuntimeError" emulator_error.log; then
              echo "FAIL: Error detected in logcat"
              grep -Ei "ErrorBoundary|FATAL EXCEPTION|RuntimeError" emulator_error.log
              exit 1
            else
              echo "SUCCESS: No ErrorBoundary events detected"
            fi