name: Ghost Pilot Android Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  GHOST_PILOT_APP_PACKAGE: com.arestudio.nocode.aab
  GHOST_PILOT_MIN_COMMANDS: '8'
  GHOST_PILOT_MIN_MEANINGFUL_COMMANDS: '4'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ghost-pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Sovereign Green Gate
        shell: bash
        run: |
          set -euo pipefail
          node scripts/check-guard-config.mjs
          pnpm run audit:sovereign
          pnpm run type-check
          pnpm run test:run
          pnpm run build

      - name: Build Android Debug APK
        shell: bash
        run: |
          set -euo pipefail
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Generate or Fallback ADB Sequence
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        shell: bash
        run: bash .github/scripts/ghost-pilot-generate-sequence.sh

      - name: Run Test on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          force-avd-creation: false
          disable-animations: true
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
          script: |
            # 🛡️ Sentinel: Dash (/usr/bin/sh) does not support 'set -o pipefail'.
            # Using 'set -e' for basic error handling compatibility.
            set -e

            adb wait-for-device
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb logcat -c

            adb logcat *:E > emulator_error.log 2>&1 &
            LOGCAT_PID=$!

            echo "Starting Ghost Pilot sequence..."
            chmod +x test_sequence.sh
            bash test_sequence.sh || true

            sleep 5
            kill "$LOGCAT_PID" || true

            echo "=== ERROR SCAN ==="
            if grep -Ei "ErrorBoundary|FATAL EXCEPTION|AndroidRuntime|RuntimeError|CRASH|com\.facebook\.react" emulator_error.log; then
              echo "❌ App fatal runtime error detected"
              grep -Ei "ErrorBoundary|FATAL EXCEPTION|AndroidRuntime|RuntimeError|CRASH|com\.facebook\.react" emulator_error.log | head -n 40
              exit 1
            fi

            if grep -Ei "ANR in ${GHOST_PILOT_APP_PACKAGE}" emulator_error.log; then
              echo "❌ App ANR detected"
              grep -Ei "ANR in ${GHOST_PILOT_APP_PACKAGE}" emulator_error.log | head -n 40
              exit 1
            fi

            echo "✅ No critical app crash detected"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghost-pilot-artifacts
          path: |
            emulator_error.log
            test_sequence.sh
            payload.json
            response.json
            response.*.json
            model_used.txt
            ghost_pilot_status.txt
            strings_extracted.txt
            app_extracted.txt
            android/app/build/outputs/apk/debug/app-debug.apk
