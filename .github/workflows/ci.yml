name: Sovereign CI Pipeline
on:
  push:
    branches:
    - main
    - master
    - develop
    paths:
    - src/**
    - backend/**
    - e2e/**
    - tests/**
    - scripts/check-backend-python-runtime.py
    - scripts/sovereign-backend/requirements.txt
    - .github/actions/setup-backend-python/**
    - .github/workflows/ci.yml
  pull_request:
    branches:
    - main
    - master
    - develop
    paths:
    - src/**
    - backend/**
    - e2e/**
    - tests/**
    - scripts/check-backend-python-runtime.py
    - scripts/sovereign-backend/requirements.txt
    - .github/actions/setup-backend-python/**
    - .github/workflows/ci.yml
  workflow_dispatch: null
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_CONFIG_LEGACY_PEER_DEPS: true
  PNPM_VERSION: "9.12.2"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quality-gate:
    name: Code Quality and Testing
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install pnpm
      shell: bash
      run: |
        npm install -g pnpm@${PNPM_VERSION}
        pnpm --version
    - name: Get pnpm store directory
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
    - name: Cache pnpm modules
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
    - name: Install Dependencies
      run: pnpm install
    - name: Type Check
      run: pnpm run type-check
    - name: Run Release Gate Tests
      run: pnpm run test:release-gate
      env:
        CI: true
    - name: Build Web Assets
      run: pnpm run build:web
    - name: Upload Web Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: www-dist
        path: dist/
        retention-days: 1
  backend-tests:
    name: Backend OAuth Security Tests (Live Path)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Setup verified backend Python runtime
      uses: ./.github/actions/setup-backend-python
      with:
        python-version: '3.11'
    - name: Run Live-Path OAuth Security Tests
      run: |
        cd backend
        python -m pytest tests/test_oauth_security.py -v
    - name: Run App OAuth Contract Tests
      run: |
        cd backend
        python -m pytest tests/test_oauth_contract.py -v
  android-build:
    name: Android Build Verification
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install pnpm
      shell: bash
      run: |
        npm install -g pnpm@${PNPM_VERSION}
        pnpm --version
    - name: Get pnpm store directory
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
    - name: Cache pnpm modules
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
    - name: Install Dependencies
      run: pnpm install
    - name: Download Web Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: www-dist
        path: dist/
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: temurin
        cache: gradle
    - name: Capacitor Sync
      run: npx cap sync android
    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install pnpm
      shell: bash
      run: |
        npm install -g pnpm@${PNPM_VERSION}
        pnpm --version
    - name: Run audit
      run: |
        pnpm audit --audit-level=moderate || true
        echo "Security audit completed (warnings above do not block merging)"
  sovereign-agent-tests:
    name: Sovereign Agent Runtime Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Setup verified backend Python runtime
      uses: ./.github/actions/setup-backend-python
      with:
        python-version: '3.11'
    - name: Compile Check
      run: |
        cd backend
        python -m py_compile \
          agent_runtime/routes.py \
          agent_runtime/tool_runner.py \
          agent_runtime/tool_events.py \
          agent_runtime/event_mapping_compat.py \
          agent_runtime/mcp_integration.py \
          agent_runtime/agent_tool_creator.py \
          agent_runtime/contracts.py \
          agent_runtime/job_lifecycle.py \
          agent_runtime/job_store.py \
          agent_runtime/workspace.py \
          agent_runtime/workspace_policy.py \
          agent_runtime/tools/base.py \
          agent_runtime/tools/file_tool.py \
          agent_runtime/tools/shell_tool.py \
          agent_runtime/tools/git_tool.py \
          agent_runtime/tools/diff_tool.py \
          agent_runtime/tools/test_tool.py \
          agent_runtime/cognitive_swarm_agents.py \
          agent_runtime/cognitive_swarm_routes.py \
          agent_runtime/cognitive_run_store.py \
          ../scripts/sovereign-backend/controller_board.py
    - name: Run Cognitive Swarm Build Preflight
      run: |
        cd backend
        python - <<'PY'
        import os
        import secrets
        import tempfile
        from pathlib import Path

        from agent_runtime.cognitive_swarm_agents import (
            DEFAULT_MODEL,
            agents_sdk_status,
            build_cognitive_swarm,
            ensure_openai_runtime_key,
        )

        status = agents_sdk_status()
        if not status["available"]:
            raise RuntimeError(f"OpenAI Agents SDK unavailable: {status['error']}")
        with tempfile.TemporaryDirectory(prefix="sovereign-litellm-preflight-") as owner_root:
            key_path = Path(owner_root) / "litellm_master_key.txt"
            key_path.write_text(secrets.token_urlsafe(32), encoding="utf-8")
            key_path.chmod(0o600)
            os.environ["SOVEREIGN_OWNER_INPUT_ROOT"] = owner_root
            os.environ["LITELLM_MASTER_KEY_FILE"] = str(key_path)
            os.environ["LITELLM_BASE_URL"] = "http://litellm:4000"
            if not ensure_openai_runtime_key():
                raise RuntimeError("Internal LiteLLM Agents SDK configuration failed.")
            swarm = build_cognitive_swarm(model=DEFAULT_MODEL)
        if swarm.agent_count != 12:
            raise RuntimeError(f"Unexpected cognitive swarm size: {swarm.agent_count}")
        print("Cognitive swarm build preflight passed: 12 agents")
        PY
    - name: Run Agent Tests
      run: |
        cd backend
        python -m pytest \
          tests/test_agent_job_contract.py \
          tests/test_agent_workspace_provisioner.py \
          tests/test_agent_job_lifecycle.py \
          tests/test_agent_runtime_routes.py \
          tests/test_agent_tool_policy.py \
          tests/test_agent_internal_tools.py \
          tests/test_agent_tool_routes.py \
          tests/test_agent_mcp_integration.py \
          tests/test_agent_tool_creator.py \
          tests/test_agent_event_mapping_compat.py \
          tests/test_cognitive_swarm_agents.py \
          tests/test_cognitive_swarm_routes.py \
          ../scripts/sovereign-backend/tests/test_controller_board_contract.py \
          -v \
          --junitxml=agent-test-results.xml
    - name: Upload Agent Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sovereign-agent-test-results-${{ github.run_attempt }}
        path: backend/agent-test-results.xml
        if-no-files-found: error
        retention-days: 3
