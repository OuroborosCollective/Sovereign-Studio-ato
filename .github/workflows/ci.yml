name: Sovereign CI Pipeline

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'backend/**'
      - 'e2e/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'backend/**'
      - 'e2e/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_CONFIG_LEGACY_PEER_DEPS: true
  PNPM_VERSION: 10

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Code Quality and Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@${PNPM_VERSION}
          pnpm --version

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Type Check
        run: pnpm run type-check

      - name: Run Release Gate Tests
        run: pnpm run test:release-gate
        env:
          CI: true

      - name: Build Web Assets
        run: pnpm run build:web

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: www-dist
          path: dist/
          retention-days: 1

  backend-tests:
    name: Backend OAuth Security Tests (Live Path)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pytest cryptography pyjwt psycopg2-binary flask flask-cors requests -q

      - name: Run Live-Path OAuth Security Tests
        run: |
          cd backend
          # Live-Path Tests (importieren security_oauth.py)
          python -m pytest tests/test_oauth_security.py -v
          
      - name: Run App OAuth Contract Tests
        run: |
          cd backend
          python -m pytest tests/test_oauth_contract.py -v

  android-build:
    name: Android Build Verification
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@${PNPM_VERSION}
          pnpm --version

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Download Web Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: www-dist
          path: dist/

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@${PNPM_VERSION}
          pnpm --version

      - name: Run audit
        run: |
          pnpm audit --audit-level=moderate || true
          echo "Security audit completed (warnings above do not block merging)"
