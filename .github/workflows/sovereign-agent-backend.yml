name: Sovereign Agent Backend

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'scripts/sovereign-backend/**'
      - 'scripts/sovereign-agent-internal-live-path.contract.mjs'
      - '.github/workflows/sovereign-agent-backend.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'scripts/sovereign-backend/**'
      - 'scripts/sovereign-agent-internal-live-path.contract.mjs'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compile Agent Runtime
        run: |
          cd scripts/sovereign-backend
          python -m py_compile \
            agent_runtime/routes.py \
            agent_runtime/tool_runner.py \
            agent_runtime/tool_events.py \
            agent_runtime/mcp_integration.py \
            agent_runtime/agent_tool_creator.py \
            agent_runtime/contracts.py \
            agent_runtime/job_lifecycle.py \
            agent_runtime/job_store.py \
            agent_runtime/workspace.py \
            agent_runtime/workspace_policy.py

      - name: Compile Tools
        run: |
          cd scripts/sovereign-backend
          python -m py_compile \
            agent_runtime/tools/base.py \
            agent_runtime/tools/file_tool.py \
            agent_runtime/tools/shell_tool.py \
            agent_runtime/tools/git_tool.py \
            agent_runtime/tools/diff_tool.py \
            agent_runtime/tools/test_tool.py \
            agent_runtime/tools/__init__.py

      - name: Validate migrations and internal live-path contract
        run: |
          bash -n scripts/sovereign-backend/auto-migrate.sh
          node --test scripts/sovereign-agent-internal-live-path.contract.mjs

  agent-tests:
    name: Agent Runtime Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pytest flask cryptography pyjwt psycopg2-binary -q

      - name: Run Agent Runtime Compilation Tests
        run: |
          cd scripts/sovereign-backend
          python -m py_compile agent_runtime/*.py agent_runtime/tools/*.py

  deploy-vps:
    name: Deploy to VPS
    needs: [compile-check, agent-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://sovereign-backend.arelorian.de
    env:
      VPS_HOST: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || secrets.SSH_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD || secrets.VPS_PW || secrets.SSH_PW || secrets.SSH_PASSWORD }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || secrets.SSH_PORT || '22' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate deploy parameters
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST:-}" ]; then
            echo "VPS_HOST/SSH_HOST secret is not configured." >&2
            exit 1
          fi
          if [ -z "${VPS_USER:-}" ]; then
            echo "VPS_USER/SSH_USER secret is not configured." >&2
            exit 1
          fi
          if [ -z "${VPS_PASSWORD:-}" ]; then
            echo "VPS password secret is not configured. Expected VPS_PASSWORD, VPS_PW, SSH_PW, or SSH_PASSWORD." >&2
            exit 1
          fi
          if ! [[ "${VPS_SSH_PORT}" =~ ^[0-9]+$ ]]; then
            echo "VPS_SSH_PORT/SSH_PORT must be numeric." >&2
            exit 1
          fi

      - name: Create tar archive
        run: |
          tar -czf sovereign-backend.tar.gz scripts/sovereign-backend

      - name: Upload to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          source: "sovereign-backend.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            tar -xzf /tmp/sovereign-backend.tar.gz -C /tmp/
            docker stop sovereign-backend 2>/dev/null || true
            sleep 5
            cd /tmp/scripts/sovereign-backend
            docker build -t sovereign-backend:latest .
            docker rm sovereign-backend 2>/dev/null || true
            docker run -d --name sovereign-backend --restart unless-stopped --env-file /opt/sovereign-backend/.env -p 127.0.0.1:8788:8788 sovereign-backend:latest
            sleep 25
            HEALTH=$(curl -s http://127.0.0.1:8788/health)
            echo "Health: $HEALTH"
            if echo "$HEALTH" | grep -q '"ok":true'; then
              echo "✅ Deployment successful!"
            else
              echo "❌ Health check failed"
              docker logs sovereign-backend --tail 20
              exit 1
            fi

      - name: Verify Routes
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_SSH_PORT }}
          script_stop: true
          script: |
            docker exec sovereign-backend python3 -c 'from app import app; routes = [r.rule for r in app.url_map.iter_rules() if "agent" in r.rule]; print(f"Agent routes: {len(routes)}"); [print(f"  - {r}") for r in sorted(routes)]'

  smoke-test:
    name: VPS Smoke Tests
    needs: deploy-vps
    runs-on: ubuntu-latest
    env:
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Test Health Endpoint
        run: |
          HEALTH=$(curl -s https://sovereign-backend.arelorian.de/health)
          echo "Health: $HEALTH"

          if ! echo "$HEALTH" | grep -q '"ok":true'; then
            echo "❌ Health check failed"
            exit 1
          fi

          echo "✅ All smoke tests passed"
