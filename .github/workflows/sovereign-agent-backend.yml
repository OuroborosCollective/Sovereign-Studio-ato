name: Sovereign Agent Backend

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'scripts/sovereign-backend/**'
      - '.github/workflows/sovereign-agent-backend.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'scripts/sovereign-backend/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Agent Runtime
        run: |
          cd scripts/sovereign-backend
          python -m py_compile \
            agent_runtime/routes.py \
            agent_runtime/tool_runner.py \
            agent_runtime/tool_events.py \
            agent_runtime/mcp_integration.py \
            agent_runtime/agent_tool_creator.py \
            agent_runtime/contracts.py \
            agent_runtime/job_lifecycle.py \
            agent_runtime/job_store.py \
            agent_runtime/workspace.py \
            agent_runtime/workspace_policy.py

      - name: Compile Tools
        run: |
          cd scripts/sovereign-backend
          python -m py_compile \
            agent_runtime/tools/base.py \
            agent_runtime/tools/file_tool.py \
            agent_runtime/tools/shell_tool.py \
            agent_runtime/tools/git_tool.py \
            agent_runtime/tools/diff_tool.py \
            agent_runtime/tools/test_tool.py \
            agent_runtime/tools/__init__.py

  agent-tests:
    name: Agent Runtime Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pytest flask cryptography pyjwt psycopg2-binary -q

      - name: Run Agent Runtime Compilation Tests
        run: |
          cd scripts/sovereign-backend
          python -m py_compile agent_runtime/*.py agent_runtime/tools/*.py

  deploy-vps:
    name: Deploy to VPS
    needs: [compile-check, agent-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://sovereign-backend.arelorian.de
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install SSH Client
        run: |
          apt-get update && apt-get install -y openssh-client sshpass

      - name: Upload Backend to VPS
        run: |
          export SSHPASS="${{ secrets.VPS_PASSWORD }}"
          sshpass -e scp -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=15 \
            -P "${{ env.VPS_SSH_PORT }}" \
            -r scripts/sovereign-backend/agent_runtime \
            scripts/sovereign-backend/app.py \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/tmp/

      - name: Deploy to Container
        run: |
          export SSHPASS="${{ secrets.VPS_PASSWORD }}"
          sshpass -e ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 \
            -p "${{ env.VPS_SSH_PORT }}" \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'SSHEOF'
            set -e
            echo "Stopping container..."
            docker stop sovereign-backend 2>/dev/null || true
            sleep 5
            
            echo "Copying agent_runtime..."
            docker cp /tmp/agent_runtime sovereign-backend:/app/
            
            echo "Copying app.py..."
            docker cp /tmp/app.py sovereign-backend:/app/
            
            echo "Starting container..."
            docker start sovereign-backend
            
            echo "Waiting for startup..."
            sleep 25
            
            echo "Checking health..."
            HEALTH=$(curl -s http://127.0.0.1:8788/health)
            echo "Health: $HEALTH"
            
            if echo "$HEALTH" | grep -q '"ok":true'; then
              echo "✅ Deployment successful!"
            else
              echo "❌ Health check failed"
              docker logs sovereign-backend --tail 20
              exit 1
            fi
          SSHEOF

      - name: Verify Routes
        run: |
          export SSHPASS="${{ secrets.VPS_PASSWORD }}"
          sshpass -e ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 \
            -p "${{ env.VPS_SSH_PORT }}" \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "docker exec sovereign-backend python3 -c 'from app import app; routes = [r.rule for r in app.url_map.iter_rules() if \"agent\" in r.rule]; print(f\"Agent routes: {len(routes)}\"); [print(f\"  - {r}\") for r in sorted(routes)]'"

  smoke-test:
    name: VPS Smoke Tests
    needs: deploy-vps
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Smoke Tests
        run: |
          # Get test user ID from VPS
          VPS_USER="root"
          VPS_PASSWORD="${{ secrets.VPS_PASSWORD }}"
          VPS_SSH_PORT="${{ secrets.VPS_SSH_PORT || '22' }}"
          
          USER_ID=$(sshpass -e ssh -o StrictHostKeyChecking=no -o BatchMode=yes \
            -p "$VPS_SSH_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "docker exec supabase-db psql -U postgres -d postgres -t -c 'SELECT id FROM admin_users LIMIT 1;'" 2>/dev/null | tr -d '[:space:]')
          
          echo "Test user ID: $USER_ID"
          
          # Test health
          HEALTH=$(curl -s https://sovereign-backend.arelorian.de/health)
          echo "Health: $HEALTH"
          
          if ! echo "$HEALTH" | grep -q '"ok":true'; then
            echo "❌ Health check failed"
            exit 1
          fi
          
          echo "✅ All smoke tests passed"
