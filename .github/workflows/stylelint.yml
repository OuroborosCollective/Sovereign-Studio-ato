name: stylelint
on:
  pull_request:
    paths:
      - '**/*.css'
      - '.github/workflows/stylelint.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
          run_install: true
      - name: Add stylelint
        run: pnpm add -DW stylelint@15.10.3 stylelint-config-standard@34.0.0
      - name: Run stylelint
        run: pnpm stylelint "src/**/*.css"
