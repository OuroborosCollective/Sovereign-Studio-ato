name: 🧠 OpenHands Second Squad

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

env:
  SQUAD_NAME: "OpenHands Second Squad"
  DISABLED_REASON: "Disabled because the workflow TODO sweep detected its own marker strings and generated duplicate issues. Re-enable only after the marker parser ignores this workflow file or builds the marker string without storing the exact marker literal in YAML."

jobs:
  disabled-until-marker-parser-is-safe:
    name: 🧯 Disabled until marker parser is safe
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report disabled state
        run: |
          set -euo pipefail
          echo "${SQUAD_NAME} is intentionally disabled."
          echo "${DISABLED_REASON}"
          echo "No issue sweep, resolver run, branch publish or Draft PR publish was attempted."
