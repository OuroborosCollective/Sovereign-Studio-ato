# This workflow integrates Pyre with GitHub's
# Code Scanning feature.
#
# Pyre is a performant type checker for Python compliant with
# PEP 484. Pyre can analyze codebases with millions of lines
# of code incrementally – providing instantaneous feedback
# to developers as they write code.
#
# See https://pyre-check.org

name: Pyre

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
    contents: read
    security-events: write

jobs:
  pyre:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pyre
        run: pip install pyre-check

      - name: Run Pyre
        id: pyre
        run: |
          pyre analyze --output-directory .pyre || true

      - name: Check for SARIF output
        id: check_sarif
        run: |
          if ls .pyre/*.sarif 1>/dev/null 2>&1; then
            echo "sarif_exists=true" >> $GITHUB_OUTPUT
          else
            echo "sarif_exists=false" >> $GITHUB_OUTPUT
            echo "No SARIF files found - Pyre analysis produced no results"
          fi

      - name: Upload Pyre SARIF
        uses: actions/upload-artifact@v4
        if: always() && steps.check_sarif.outputs.sarif_exists == 'true'
        with:
          name: pyre-sarif
          path: .pyre/*.sarif
          retention-days: 30

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.check_sarif.outputs.sarif_exists == 'true'
        with:
          sarif_file: .pyre/*.sarif
          category: pyre
