name: "Quarantined: Zero-Touch Master Workflow"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quarantined:
    name: Block unsafe zero-touch automation
    runs-on: ubuntu-latest
    steps:
      - name: Explain quarantine
        run: |
          echo "This legacy zero-touch workflow is intentionally quarantined."
          echo "Reason: it combined scheduled tester recruitment, simulated engagement, external AI autofix actions, and automatic Play release behavior."
          echo "Sovereign rules require real runtime results, no fake engagement, no unreviewed auto-release, and no hidden automation that can publish or create PRs without explicit review."
          echo "If any part is needed later, rebuild it as a reviewed runtime-backed workflow with tests, explicit approval gates, and no fake success claims."
          exit 1
