name: Sovereign Backend Immutable Image

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/sovereign-backend/**'
      - 'tools/sovereign-chatgpt-mcp/**'
      - 'src/features/admin/**'
      - 'src/SovereignAppWrapper.tsx'
      - 'src/main.tsx'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - '.github/workflows/sovereign-backend-image.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/ouroboroscollective/sovereign-backend
  SOVEREIGN_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  build:
    name: Build immutable backend image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact authoritative revision
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOVEREIGN_REVISION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.2 --activate

      - name: Install frozen web dependencies
        run: pnpm install --frozen-lockfile

      - name: Build revision-bound React admin
        env:
          VITE_ADMIN_API_BASE: ''
          VITE_SOVEREIGN_SOURCE_REVISION: ${{ env.SOVEREIGN_REVISION }}
        run: pnpm run build:web

      - name: Stage canonical admin artifact for backend image
        run: |
          set -euo pipefail
          test -f dist/index.html
          rm -rf scripts/sovereign-backend/admin-dist
          cp -a dist scripts/sovereign-backend/admin-dist
          grep -Rqs 'CANONICAL_REACT_ADMIN' scripts/sovereign-backend/admin-dist
          grep -Rqs '${{ env.SOVEREIGN_REVISION }}' scripts/sovereign-backend/admin-dist
          grep -Rqs 'Free Revolver' scripts/sovereign-backend/admin-dist

      - name: Compile backend before image build
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/sovereign-backend/app.py \
            scripts/sovereign-backend/litellm_runtime.py \
            scripts/sovereign-backend/runner.py \
            scripts/sovereign-backend/security_oauth.py \
            scripts/sovereign-backend/security_runtime.py \
            scripts/sovereign-backend/vector_embedding.py \
            scripts/sovereign-backend/knowledge_library.py \
            scripts/sovereign-backend/are_inference.py \
            scripts/sovereign-backend/enterprise_platform/*.py \
            scripts/sovereign-backend/agent_runtime/*.py \
            scripts/sovereign-backend/agent_runtime/tools/*.py
          bash -n scripts/sovereign-backend/auto-migrate.sh

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish exact revision image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: scripts/sovereign-backend
          file: scripts/sovereign-backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_NAME }}:${{ env.SOVEREIGN_REVISION }}
          build-args: |
            SOVEREIGN_SOURCE_REVISION=${{ env.SOVEREIGN_REVISION }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.SOVEREIGN_REVISION }}
            org.opencontainers.image.title=sovereign-backend
          load: ${{ github.event_name == 'pull_request' }}
          provenance: ${{ github.event_name == 'pull_request' && 'false' || 'mode=max' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify canonical admin inside PR image
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          docker run --rm --entrypoint python "${IMAGE_NAME}:${SOVEREIGN_REVISION}" -c '
          from pathlib import Path
          root = Path("/app/admin-dist")
          assert (root / "index.html").is_file()
          rendered = "\n".join(path.read_text("utf-8", errors="ignore") for path in root.rglob("*") if path.is_file())
          assert "CANONICAL_REACT_ADMIN" in rendered
          assert "Free Revolver" in rendered
          '

      - name: Report immutable image evidence
        run: |
          {
            echo '### Sovereign backend image'
            echo '- Revision: `${{ env.SOVEREIGN_REVISION }}`'
            if [ '${{ github.event_name }}' = 'pull_request' ]; then
              echo '- Published: `false` (PR validation only)'
            else
              echo '- Published: `true`'
              echo '- Tag: `${{ env.IMAGE_NAME }}:${{ env.SOVEREIGN_REVISION }}`'
              echo '- Digest: `${{ steps.image.outputs.digest }}`'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
