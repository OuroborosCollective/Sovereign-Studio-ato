name: "Quarantined: Zero-Touch Recruitment Workflow"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quarantined:
    name: Block unsafe tester recruitment automation
    runs-on: ubuntu-latest
    steps:
      - name: Explain quarantine
        run: |
          echo "This legacy recruitment workflow is intentionally quarantined."
          echo "Reason: automatic tester acquisition and success claims such as recruited testers must not run as unattended CI automation."
          echo "Sovereign rules require real evidence, no fake success, no spam-like outreach, and no hidden growth automation."
          echo "If tester coordination is needed later, rebuild it as a reviewed, opt-in, policy-safe process with explicit human approval."
          exit 1
