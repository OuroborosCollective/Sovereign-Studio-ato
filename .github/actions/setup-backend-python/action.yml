name: Setup Sovereign backend Python
description: Install and verify the single Sovereign backend test runtime contract.

inputs:
  python-version:
    description: Python version used by backend tests.
    required: false
    default: "3.11"

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          backend/requirements-test.txt
          scripts/sovereign-backend/requirements.txt

    - name: Install backend test runtime
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install --requirement backend/requirements-test.txt

    - name: Verify dependency graph
      shell: bash
      run: |
        set -euo pipefail
        python -m pip check
        python scripts/check-backend-python-runtime.py
