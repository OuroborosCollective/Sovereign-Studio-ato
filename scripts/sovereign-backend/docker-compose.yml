# =============================================================================
# Sovereign Backend Docker Compose Configuration
# =============================================================================
# This configuration deploys the Sovereign Backend with automatic database
# migrations on startup.
#
# Networks:
# - supabase_default: Network for PostgreSQL database access
# - areloria_arelorian-network: Network for Areloria services
# - sovereign-private: Internal-only LiteLLM routing network
# =============================================================================

services:
  sovereign-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SOVEREIGN_SOURCE_REVISION: ${SOVEREIGN_SOURCE_REVISION:-unverified}
    container_name: sovereign-backend
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    stop_grace_period: 30s
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    ports:
      - "127.0.0.1:8788:8787"
    env_file:
      - .env
      - /opt/sovereign-chatgpt-tools/backend-runtime.env
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY_FILE: /opt/sovereign-owner-managed/litellm_master_key.txt
      SOVEREIGN_RUNTIME_ENVIRONMENT: production
      # Source revision is baked into the image; do not override it at runtime.
      SOVEREIGN_IMAGE_DIGEST: ${SOVEREIGN_IMAGE_DIGEST:-unverified}
      SOVEREIGN_MAX_REQUEST_BYTES: "67108864"
    volumes:
      - /opt/secure:/opt/secure:ro
      - /opt/sovereign-owner-managed:/opt/sovereign-owner-managed:rw
    restart: unless-stopped
    networks:
      - supabase_default
      - areloria_arelorian-network
      - sovereign-private
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/health/ready', timeout=8)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  supabase_default:
    external: true
  areloria_arelorian-network:
    external: true
  sovereign-private:
    external: true
