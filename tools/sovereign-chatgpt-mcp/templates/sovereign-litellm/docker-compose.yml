services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    volumes:
      - litellm_db:/var/lib/postgresql/data
    networks:
      - sovereign-private

  litellm:
    image: docker.litellm.ai/berriai/litellm:v1.89.4
    command: ["--config=/app/config.yaml", "--port", "4000"]
    environment:
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?LITELLM_SALT_KEY is required}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    expose:
      - "4000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=5)"
      interval: 15s
      timeout: 6s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sovereign-private

networks:
  sovereign-private:
    external: true

volumes:
  litellm_db:
