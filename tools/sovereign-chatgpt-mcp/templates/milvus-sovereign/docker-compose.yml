services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - /opt/milvus-sovereign/volumes/etcd:/etcd
    networks:
      - milvus-storage
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command:
      - minio
      - server
      - /minio_data
      - --console-address
      - ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY_ID:?MINIO access key is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_ACCESS_KEY:?MINIO secret key is required}
    volumes:
      - /opt/milvus-sovereign/volumes/minio:/minio_data
    networks:
      - milvus-storage
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.27
    command:
      - milvus
      - run
      - standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY_ID:?MINIO access key is required}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY:?MINIO secret key is required}
      MQ_TYPE: woodpecker
    volumes:
      - /opt/milvus-sovereign/volumes/milvus:/var/lib/milvus
    networks:
      milvus-storage: {}
      memory-gateway:
        ipv4_address: ${MILVUS_COMPATIBILITY_IP:?Milvus compatibility IP is required}
        aliases:
          - milvus-standalone
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

networks:
  milvus-storage:
    internal: true
  memory-gateway:
    external: true
    name: ${MILVUS_GATEWAY_NETWORK:?Milvus gateway network is required}
