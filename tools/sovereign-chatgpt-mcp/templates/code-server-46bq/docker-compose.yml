services:
  code-server:
    image: lscr.io/linuxserver/code-server@sha256:dfc5e74083f43f3cb217fedfead149f32b319ee663744351c001bdc5e4245441
    restart: unless-stopped
    environment:
      PUID: ${PUID:-10001}
      PGID: ${PGID:-10001}
      TZ: ${TZ:-Europe/Berlin}
      PASSWORD: ${PASSWORD:-}
      HASHED_PASSWORD: ${HASHED_PASSWORD:-}
      SUDO_PASSWORD: ${SUDO_PASSWORD:-}
      SUDO_PASSWORD_HASH: ${SUDO_PASSWORD_HASH:-}
      PROXY_DOMAIN: ${PROXY_DOMAIN:-}
      DEFAULT_WORKSPACE: ${DEFAULT_WORKSPACE:-/config/sovereign-agent-workspaces}
    volumes:
      - code-server-config:/config
      - type: bind
        source: /opt/sovereign-agent-workspaces
        target: /config/sovereign-agent-workspaces
    ports:
      - "127.0.0.1:32782:8443"

volumes:
  code-server-config:
    name: code-server-46bq_code-server-config
