services:
  sovereign-chatgpt-mcp:
    image: ${SOVEREIGN_MCP_IMAGE:?SOVEREIGN_MCP_IMAGE must be an immutable GHCR digest}
    container_name: sovereign-chatgpt-mcp
    restart: unless-stopped
    env_file:
      - /opt/sovereign-chatgpt-tools/.env
      - /opt/sovereign-chatgpt-tools/runtime.env
    environment:
      SOVEREIGN_MCP_HOST: 0.0.0.0
      SOVEREIGN_MCP_PORT: 8090
      SOVEREIGN_MCP_ALLOW_PUBLIC: "1"
      SOVEREIGN_MCP_WORKSPACE_ROOT: /opt/sovereign-chatgpt-tools/workspaces
      SOVEREIGN_MCP_BROKER_SOCKET: /run/sovereign-chatgpt-broker/operator.sock
      SOVEREIGN_MCP_COMMAND_QUEUE: /opt/sovereign-chatgpt-tools/command-queue
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_HOME: /opt/android-sdk
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - /opt/sovereign-chatgpt-tools/workspaces:/opt/sovereign-chatgpt-tools/workspaces
      - /opt/sovereign-chatgpt-tools/command-queue:/opt/sovereign-chatgpt-tools/command-queue
      - /opt/android-sdk:/opt/android-sdk:ro
      - /run/sovereign-chatgpt-broker:/run/sovereign-chatgpt-broker
    group_add:
      - "${BROKER_GID:?BROKER_GID must match the sovereign-mcp host group}"
    networks:
      - supabase_default
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  supabase_default:
    external: true
