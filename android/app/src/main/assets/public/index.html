<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0c0a09" />
<title>Sovereign Studio</title>
<style>
body{margin:0;background:#0c0a09;color:#f5f5f4;font-family:system-ui,-apple-system,sans-serif}.app{min-height:100vh;padding:18px;background:radial-gradient(circle at top,#312e81,#1c1917 42%,#0c0a09)}.card{border:1px solid #574522;background:#1c1917;border-radius:18px;padding:16px;margin:12px 0}h1,h2{color:#fbbf24}textarea,input{width:100%;box-sizing:border-box;background:#020617;color:#f5f5f4;border:1px solid #44403c;border-radius:12px;padding:10px}textarea{min-height:120px}button{border:0;border-radius:12px;background:#f59e0b;color:#1c1917;font-weight:900;padding:12px;margin-top:8px}pre{white-space:pre-wrap;background:#020617;color:#bbf7d0;border-radius:12px;padding:12px}.log{background:#111827;border-radius:12px;padding:10px;margin-top:8px;color:#d6d3d1}
</style>
</head>
<body>
<main class="app">
<section class="card"><h1>Sovereign Studio bereit</h1><p>Android startet jetzt ohne fehlende Bundle-Dateien.</p><p>No-Key Route: mlvoca, Pollinations, optionale eigene Keys.</p></section>
<section class="card"><h2>Idee oder Auftrag</h2><input id="repo" value="OuroborosCollective/Sovereign-Studio-ato"><textarea id="idea">Baue Chat, Dateiuebersicht, Live-Code, Workflow-Analyse und Auto-Fix.</textarea><button id="start">Start</button></section>
<section class="card"><h2>Live Code</h2><pre id="code"></pre><button id="check">Workflow pruefen</button><button id="fix">Fix anzeigen</button></section>
<section class="card"><h2>History</h2><div id="logs"></div></section>
</main>
<script>
(function(){var logs=[];function el(id){return document.getElementById(id)}function log(t){logs.unshift(t);el('logs').innerHTML=logs.map(function(x){return '<div class="log">'+x+'</div>'}).join('')}function render(){el('code').textContent='export const workflow = { route: ["mlvoca","pollinations","optional"], center: "chat-editor-status", greenGate: ["audit","typecheck","test","build"] };'}el('start').onclick=function(){render();log('Auftrag gestartet')};el('check').onclick=function(){log('Pruefung vorbereitet')};el('fix').onclick=function(){el('code').textContent+='\n// visibleFix: true';log('Fix sichtbar')};render();log('App bereit')})();
</script>
</body>
</html>
