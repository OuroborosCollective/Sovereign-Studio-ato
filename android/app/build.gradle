import java.util.Locale

apply plugin: 'com.android.application'

boolean hasText(value) {
    return value != null && value.toString().trim().length() > 0
}

int parsePositiveVersionCode(value, String sourceName) {
    String normalized = value == null ? '' : value.toString().trim()
    if (!(normalized ==~ /[1-9][0-9]*/)) {
        throw new GradleException("${sourceName} must be a positive integer versionCode, got '${normalized ?: 'missing'}'.")
    }

    try {
        return Integer.parseInt(normalized)
    } catch (NumberFormatException ignored) {
        throw new GradleException("${sourceName} is outside Android versionCode integer range: '${normalized}'.")
    }
}

def releaseVersionCodeSource = project.hasProperty('versionCode') ? project.getProperty('versionCode') : System.getenv('ANDROID_VERSION_CODE') ?: '1'
def releaseVersionCode = parsePositiveVersionCode(releaseVersionCodeSource, 'versionCode')

def releaseVersionName = project.hasProperty('versionName') ? project.getProperty('versionName') : System.getenv('ANDROID_VERSION_NAME') ?: '1.0.0-dev'
releaseVersionName = releaseVersionName.toString().trim()
if (!hasText(releaseVersionName)) {
    throw new GradleException('versionName must not be empty.')
}

def releaseStoreFile = project.findProperty('android.injected.signing.store.file') ?: System.getenv('ANDROID_KEYSTORE_PATH')
def releaseStorePassword = project.findProperty('android.injected.signing.store.password') ?: System.getenv('ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = project.findProperty('android.injected.signing.key.alias') ?: System.getenv('ANDROID_KEY_ALIAS')
def releaseKeyPassword = project.findProperty('android.injected.signing.key.password') ?: System.getenv('ANDROID_KEY_PASSWORD') ?: releaseStorePassword
def releaseSigningConfigured = [releaseStoreFile, releaseStorePassword, releaseKeyAlias, releaseKeyPassword].every { hasText(it) }

tasks.register('verifyAndroidWebAssets') {
    group = 'verification'
    description = 'Verifies that Capacitor has synced the real Vite dist into Android assets.'

    doLast {
        def publicDir = file('src/main/assets/public')
        def indexFile = file('src/main/assets/public/index.html')

        if (!publicDir.isDirectory() || !indexFile.isFile() || indexFile.length() <= 0) {
            throw new GradleException(
                'Android WebView assets are missing. Run "pnpm run build:web" and "npx cap sync android" before Gradle packaging.'
            )
        }
    }
}

preBuild.dependsOn verifyAndroidWebAssets

gradle.taskGraph.whenReady { taskGraph ->
    def releaseTaskRequested = taskGraph.allTasks.any { task ->
        task.name.toLowerCase(Locale.ROOT).contains('release')
    }

    if (releaseTaskRequested) {
        if (!releaseSigningConfigured) {
            throw new GradleException(
                'Release signing is required for AAB/APK artifacts. Set ANDROID_KEYSTORE_PATH, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS and ANDROID_KEY_PASSWORD.'
            )
        }

        def keyFile = file(releaseStoreFile)
        if (!keyFile.isFile() || keyFile.length() <= 0) {
            throw new GradleException("Release keystore file is missing or empty: ${keyFile}")
        }
    }
}

android {
    namespace "com.arestudio.nocode.aab"
    compileSdk rootProject.ext.compileSdkVersion

    aaptOptions {
        cruncherEnabled = false
    }

    defaultConfig {
        applicationId "com.arestudio.nocode.aab"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode releaseVersionCode
        versionName releaseVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        manifestPlaceholders = [
            appAuthRedirectScheme: 'com.arestudio.nocode.aab',
            usesCleartextTraffic: 'false'
        ]
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platforms/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (releaseSigningConfigured) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        debug {
            manifestPlaceholders = [
                appAuthRedirectScheme: 'com.arestudio.nocode.aab',
                usesCleartextTraffic: 'true'
            ]
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            manifestPlaceholders = [
                appAuthRedirectScheme: 'com.arestudio.nocode.aab',
                usesCleartextTraffic: 'false'
            ]
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.google.android.gms:play-services-auth:21.2.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
