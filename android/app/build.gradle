apply plugin: 'com.android.application'

def releaseVersionCodeStr = project.hasProperty('versionCode') ? project.getProperty('versionCode') : System.getenv('ANDROID_VERSION_CODE') ?: "1"
def releaseVersionCode = releaseVersionCodeStr as Integer

def releaseVersionName = project.hasProperty('versionName') ? project.getProperty('versionName') : System.getenv('ANDROID_VERSION_NAME') ?: "1.0.0-dev"
releaseVersionName = releaseVersionName.toString()

def releaseStoreFile = project.findProperty('android.injected.signing.store.file') ?: System.getenv('ANDROID_KEYSTORE_PATH')
def releaseStorePassword = project.findProperty('android.injected.signing.store.password') ?: System.getenv('ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = project.findProperty('android.injected.signing.key.alias') ?: System.getenv('ANDROID_KEY_ALIAS')
def releaseKeyPassword = project.findProperty('android.injected.signing.key.password') ?: System.getenv('ANDROID_KEY_PASSWORD')
def releaseSigningConfigured = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

tasks.register('buildWebAssetsForAndroid', Exec) {
    workingDir rootProject.projectDir.parentFile
    if (System.getProperty('os.name').toLowerCase().contains('windows')) {
        commandLine 'cmd', '/c', 'npm', 'run', 'build:web'
    } else {
        commandLine 'npm', 'run', 'build:web'
    }
}

preBuild.dependsOn buildWebAssetsForAndroid

android {
    namespace "com.arestudio.nocode.aab"
    compileSdk 34

    aaptOptions {
        cruncherEnabled = false
    }

    defaultConfig {
        applicationId "com.arestudio.nocode.aab"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion 34
        versionCode releaseVersionCode
        versionName releaseVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        manifestPlaceholders = [
            appAuthRedirectScheme: 'com.arestudio.nocode.aab',
            usesCleartextTraffic: 'false'
        ]
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platforms/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (releaseSigningConfigured) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        debug {
            manifestPlaceholders = [
                appAuthRedirectScheme: 'com.arestudio.nocode.aab',
                usesCleartextTraffic: 'true'
            ]
        }
        release {
            if (releaseSigningConfigured) {
                signingConfig signingConfigs.release
            } else {
                logger.lifecycle('Release signing is not configured. Signed Play Store artifacts require ANDROID_KEYSTORE_PATH, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS and ANDROID_KEY_PASSWORD.')
            }
            minifyEnabled true
            shrinkResources true
            manifestPlaceholders = [
                appAuthRedirectScheme: 'com.arestudio.nocode.aab',
                usesCleartextTraffic: 'false'
            ]
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.google.android.gms:play-services-auth:21.2.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
