<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barrierefreie Webseite</title>
</head>
<body>
    <header>
        <h1>Beispielseite</h1>
    </header>
    <main>
        <section>
            <p>Inhalt der Seite.</p>
            <!-- Button mit sichtbarem Label -->
            <button type="button">Absenden</button>
            
            <!-- Button mit aria-label für Icon-Buttons -->
            <button type="button" aria-label="Menü öffnen">
                <span aria-hidden="true">☰</span>
            </button>

            <!-- Button mit aria-label für Schließen-Funktion -->
            <button type="button" aria-label="Schließen">
                <span aria-hidden="true">&times;</span>
            </button>
        </section>
    </main>
</body>
</html>
